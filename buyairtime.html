<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Airtime</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:25px;
text-align:center;
}

.balance-box{
background:#a00000;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
}

label{
display:block;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

input,select{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

.amount-box{
background:#a00000;
padding:18px;
border-radius:15px;
margin-bottom:15px;
cursor:pointer;
font-size:20px;
font-weight:bold;
border:3px solid transparent;
text-align:center;
}

.active-amount{
border:3px solid white;
}

.buy-btn{
width:100%;
padding:22px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:70px;
height:70px;
border:8px solid white;
border-top:8px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loading-text{
margin-top:20px;
font-size:24px;
font-weight:bold;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.toast{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:white;
color:#7a0000;
padding:18px 25px;
border-radius:15px;
font-size:20px;
font-weight:bold;
display:none;
z-index:99999;
}

.receipt-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

.receipt-card{
background:white;
color:#7a0000;
padding:25px;
border-radius:25px;
width:100%;
max-width:400px;
}

.receipt-title{
font-size:30px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.receipt-item{
font-size:18px;
margin-bottom:15px;
line-height:1.5;
}

.success{
color:green;
font-weight:bold;
}

.close-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7a0000;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){

window.location.href = "login.html";

}

</script>

<div class="toast"
id="toast">
Airtime Purchase Successful ✅
</div>

<div class="loader"
id="loader">

<div class="spinner"></div>

<div class="loading-text">
Processing...
</div>

</div>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📞 Buy Airtime
</div>

<div class="balance-box"
id="walletBalance">
Wallet: ₦0.00
</div>

<label>Select Network</label>

<select id="network">

<option value="MTN">MTN</option>
<option value="Airtel">Airtel</option>
<option value="Glo">Glo</option>
<option value="9mobile">9mobile</option>

</select>

<label>Phone Number</label>

<input type="number"
id="phone"
placeholder="Enter phone number">

<label>Select Airtime Amount</label>

<div class="amount-box"
onclick="selectAmount(this,100)">
₦100
</div>

<div class="amount-box"
onclick="selectAmount(this,200)">
₦200
</div>

<div class="amount-box"
onclick="selectAmount(this,500)">
₦500
</div>

<div class="amount-box"
onclick="selectAmount(this,1000)">
₦1000
</div>

<div class="amount-box"
onclick="selectAmount(this,2000)">
₦2000
</div>

<input type="number"
id="customAmount"
placeholder="Or enter custom amount">

<button class="buy-btn"
onclick="buyAirtime()">
Purchase Airtime
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<div class="receipt-modal"
id="receiptModal">

<div class="receipt-card">

<div class="receipt-title">
✅ Transaction Receipt
</div>

<div class="receipt-item"
id="receiptNetwork"></div>

<div class="receipt-item"
id="receiptPhone"></div>

<div class="receipt-item"
id="receiptAmount"></div>

<div class="receipt-item"
id="receiptID"></div>

<div class="receipt-item"
id="receiptDate"></div>

<div class="receipt-item success">
Status: Successful
</div>

<button class="close-btn"
onclick="closeReceipt()">
Done
</button>

</div>

</div>

<script>

let wallet =
parseFloat(localStorage.getItem(
"walletBalance"
)) || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"Wallet: ₦" +
wallet.toFixed(2);

let selectedAmount = 0;

function selectAmount(element,amount){

document.querySelectorAll(
".amount-box"
).forEach(function(box){

box.classList.remove(
"active-amount"
);

});

element.classList.add(
"active-amount"
);

selectedAmount = amount;

document.getElementById(
"customAmount"
).value = "";

}

function showLoader(){

document.getElementById(
"loader"
).style.display = "flex";

}

function hideLoader(){

document.getElementById(
"loader"
).style.display = "none";

}

function showToast(message){

let toast =
document.getElementById(
"toast"
);

toast.innerHTML = message;

toast.style.display = "block";

setTimeout(function(){

toast.style.display = "none";

},3000);

}

function buyAirtime(){

let network =
document.getElementById(
"network"
).value;

let phone =
document.getElementById(
"phone"
).value;

let customAmount =
document.getElementById(
"customAmount"
).value;

let amount =
selectedAmount;

if(customAmount !== ""){

amount =
parseFloat(customAmount);

}

if(phone === ""){

showToast("Enter phone number");

return;

}

if(amount <= 0 || isNaN(amount)){

showToast("Enter valid amount");

return;

}

if(wallet < amount){

showToast("Insufficient balance");

return;

}

showLoader();

setTimeout(function(){

wallet -= amount;

localStorage.setItem(
"walletBalance",
wallet
);

let transactions =
JSON.parse(localStorage.getItem(
"transactions"
)) || [];

let date =
new Date().toLocaleString();

transactions.push({
text:
"📞 " +
network +
" Airtime for " +
phone +
" - ₦" +
amount,
date:date
});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

hideLoader();

showToast(
network +
" Airtime Purchase Successful"
);

let transactionID =
"AT" +
Math.floor(Math.random()*100000000);

document.getElementById(
"receiptNetwork"
).innerHTML =
"Network: " + network;

document.getElementById(
"receiptPhone"
).innerHTML =
"Phone: " + phone;

document.getElementById(
"receiptAmount"
).innerHTML =
"Amount: ₦" + amount;

document.getElementById(
"receiptID"
).innerHTML =
"Transaction ID: " +
transactionID;

document.getElementById(
"receiptDate"
).innerHTML =
"Date: " + date;

setTimeout(function(){

document.getElementById(
"receiptModal"
).style.display =
"flex";

},1500);

},2000);

}

function closeReceipt(){

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>

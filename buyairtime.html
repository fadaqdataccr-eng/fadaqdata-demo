<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Airtime</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:20px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin:30px 0;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
}

.balance{
font-size:40px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

select,input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-top:20px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.amountbtn{
background:#b00000;
padding:18px;
border-radius:15px;
margin-top:15px;
text-align:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
justify-content:space-around;
}

.navbtn{
background:white;
padding:15px 30px;
border-radius:18px;
color:#7a0000;
font-weight:bold;
text-decoration:none;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<h2>
📞 Buy Airtime
</h2>

<div class="balance"
id="wallet">
₦0.00
</div>

<select id="network">

<option value="MTN">
MTN
</option>

<option value="Airtel">
Airtel
</option>

<option value="Glo">
Glo
</option>

<option value="9mobile">
9mobile
</option>

</select>

<input type="text"
id="phone"
placeholder="Phone Number">

<div class="amountbtn"
onclick="setAmount(100)">
₦100
</div>

<div class="amountbtn"
onclick="setAmount(200)">
₦200
</div>

<div class="amountbtn"
onclick="setAmount(500)">
₦500
</div>

<div class="amountbtn"
onclick="setAmount(1000)">
₦1000
</div>

<div class="amountbtn"
onclick="setAmount(2000)">
₦2000
</div>

<button onclick="buyAirtime()">
Purchase Airtime
</button>

</div>

</div>

<div class="bottomnav">

<a href="dashboard.html"
class="navbtn">
🏠 Home
</a>

<a href="profile.html"
class="navbtn">
👤 Profile
</a>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
arrayUnion
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser;

let selectedAmount = 0;

window.setAmount =
function(amount){

selectedAmount = amount;

};

onAuthStateChanged(auth,
async(user)=>{

if(user){

currentUser = user;

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

document.getElementById(
"wallet"
).innerHTML =
"₦" + docSnap.data().wallet;

}

}else{

window.location.href =
"login.html";

}

});

window.buyAirtime =
async function(){

let network =
document.getElementById(
"network"
).value;

let phone =
document.getElementById(
"phone"
).value;

if(phone === ""){

alert(
"Enter phone number"
);

return;

}

if(selectedAmount <= 0){

alert(
"Select airtime amount"
);

return;

}

const docRef =
doc(db,"users",currentUser.uid);

const docSnap =
await getDoc(docRef);

let wallet =
docSnap.data().wallet || 0;

if(wallet < selectedAmount){

alert(
"Insufficient balance"
);

return;

}

let newBalance =
wallet - selectedAmount;

await updateDoc(docRef,{

wallet:newBalance,

transactions:arrayUnion({

type:"Airtime Purchase",

network:network,

phone:phone,

amount:selectedAmount,

date:new Date().toLocaleString()

})

});

alert(
"Airtime Purchase Successful ✅"
);

window.location.href =
"dashboard.html";

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Airtime</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:25px;
padding-bottom:120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:30px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.title{
font-size:45px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.balance-box{
background:#a00000;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

label{
display:block;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

input,select{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

.amount-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:25px;
}

.amount-btn{
padding:20px;
border:none;
border-radius:18px;
background:#a00000;
color:white;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.active-amount{
background:white;
color:#7a0000;
}

.buy-btn{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.receipt-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

.receipt-card{
background:white;
color:#7a0000;
padding:25px;
border-radius:25px;
width:100%;
max-width:400px;
}

.receipt-title{
font-size:32px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
}

.receipt-item{
font-size:20px;
margin-bottom:18px;
line-height:1.5;
}

.success{
color:green;
font-weight:bold;
}

.done-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7a0000;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("loggedIn") !== "true"){

window.location.href =
"login.html";

}

</script>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📞 Buy Airtime
</div>

<div class="balance-box"
id="walletBalance">
Wallet: ₦0.00
</div>

<label>Select Network</label>

<select id="network">

<option value="MTN">MTN</option>
<option value="Airtel">Airtel</option>
<option value="Glo">Glo</option>
<option value="9mobile">9mobile</option>

</select>

<label>Phone Number</label>

<input type="number"
id="phone"
placeholder="Enter phone number">

<label>Select Airtime Amount</label>

<div class="amount-grid">

<button class="amount-btn"
onclick="selectAmount(100,this)">
₦100
</button>

<button class="amount-btn"
onclick="selectAmount(200,this)">
₦200
</button>

<button class="amount-btn"
onclick="selectAmount(500,this)">
₦500
</button>

<button class="amount-btn"
onclick="selectAmount(1000,this)">
₦1000
</button>

<button class="amount-btn"
onclick="selectAmount(2000,this)">
₦2000
</button>

<button class="amount-btn"
onclick="selectAmount(5000,this)">
₦5000
</button>

</div>

<button class="buy-btn"
onclick="buyAirtime()">
Purchase Airtime
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<div class="receipt-modal"
id="receiptModal">

<div class="receipt-card">

<div class="receipt-title">
✅ Airtime Receipt
</div>

<div class="receipt-item"
id="receiptNetwork"></div>

<div class="receipt-item"
id="receiptPhone"></div>

<div class="receipt-item"
id="receiptAmount"></div>

<div class="receipt-item"
id="receiptID"></div>

<div class="receipt-item"
id="receiptDate"></div>

<div class="receipt-item success">
Status: Successful
</div>

<button class="done-btn"
onclick="closeReceipt()">
Done
</button>

</div>

</div>

<script>

let wallet =
parseFloat(
localStorage.getItem(
"walletBalance"
)
) || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"Wallet: ₦" +
wallet.toFixed(2);

let selectedAmount = 0;

function selectAmount(amount,button){

selectedAmount = amount;

let buttons =
document.querySelectorAll(
".amount-btn"
);

buttons.forEach(function(btn){

btn.classList.remove(
"active-amount"
);

});

button.classList.add(
"active-amount"
);

}

function buyAirtime(){

let network =
document.getElementById(
"network"
).value;

let phone =
document.getElementById(
"phone"
).value;

if(phone === ""){

alert(
"Enter phone number"
);

return;

}

if(selectedAmount <= 0){

alert(
"Select airtime amount"
);

return;

}

if(wallet < selectedAmount){

alert(
"Insufficient balance"
);

return;

}

wallet -= selectedAmount;

localStorage.setItem(
"walletBalance",
wallet
);

let transactions =
JSON.parse(
localStorage.getItem(
"transactions"
)
) || [];

let transactionID =
"FD" +
Math.floor(
Math.random()*100000000
);

let transactionDate =
new Date().toLocaleString();

transactions.push({

text:
"📞 Airtime purchased for " +
phone +
" - ₦" +
selectedAmount,

date:
transactionDate,

amount:selectedAmount,

type:"Airtime Purchase",

status:"Successful",

id:transactionID

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

document.getElementById(
"receiptNetwork"
).innerHTML =
"Network: " + network;

document.getElementById(
"receiptPhone"
).innerHTML =
"Phone: " + phone;

document.getElementById(
"receiptAmount"
).innerHTML =
"Amount: ₦" + selectedAmount;

document.getElementById(
"receiptID"
).innerHTML =
"Transaction ID: " +
transactionID;

document.getElementById(
"receiptDate"
).innerHTML =
"Date: " +
transactionDate;

document.getElementById(
"receiptModal"
).style.display =
"flex";

}

function closeReceipt(){

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>

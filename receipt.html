<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Receipt</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:#7a0000;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin:30px 0;
color:white;
}

.card{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.title{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:35px;
}

.row{
margin-bottom:22px;
font-size:18px;
line-height:1.5;
}

.label{
font-weight:bold;
}

.status{
background:green;
color:white;
padding:15px;
border-radius:15px;
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:25px;
}

.donebtn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#8B0000;
color:white;
font-size:24px;
font-weight:bold;
margin-top:30px;
cursor:pointer;
}

.refbox{
background:#f5f5f5;
padding:15px;
border-radius:15px;
margin-top:25px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
Transaction Receipt
</div>

<div class="row">
<span class="label">Type:</span>
<span id="type"></span>
</div>

<div class="row">
<span class="label">Network:</span>
<span id="network"></span>
</div>

<div class="row">
<span class="label">Phone:</span>
<span id="phone"></span>
</div>

<div class="row">
<span class="label">Amount:</span>
₦<span id="amount"></span>
</div>

<div class="row">
<span class="label">Date:</span>
<span id="date"></span>
</div>

<div class="refbox">

<div class="row">
<span class="label">Transaction ID:</span>
<br>
<span id="trxid"></span>
</div>

<div class="row">
<span class="label">Reference No:</span>
<br>
<span id="ref"></span>
</div>

</div>

<div class="status">
Successful ✅
</div>

<button
class="donebtn"
onclick="goHome()">
Done
</button>

</div>

</div>

<script>

const receipt =
JSON.parse(
localStorage.getItem("receipt")
);

document.getElementById(
"type"
).innerText =
receipt.type || "N/A";

document.getElementById(
"network"
).innerText =
receipt.network || "N/A";

document.getElementById(
"phone"
).innerText =
receipt.phone || "N/A";

document.getElementById(
"amount"
).innerText =
receipt.amount || "0";

document.getElementById(
"date"
).innerText =
receipt.date || "N/A";

function generateID(){

return "FDQ" +
Math.floor(
Math.random()*999999999
);

}

document.getElementById(
"trxid"
).innerText =
generateID();

document.getElementById(
"ref"
).innerText =
"REF" +
Date.now();

function goHome(){

window.location.href =
"dashboard.html";

}

</script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>

<title>Receipt</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#5c0000;
padding:20px;
color:white;

}

.receipt-card{

background:#7a0000;
border-radius:20px;
padding:25px;
margin-top:30px;

box-shadow:0 0 20px rgba(0,0,0,0.3);

}

.logo{

text-align:center;
font-size:35px;
font-weight:bold;
margin-bottom:20px;

}

.title{

text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:25px;

}

.networkLogo{

text-align:center;
margin-bottom:20px;

}

.networkLogo img{

width:90px;
height:90px;
background:white;
padding:10px;
border-radius:50%;
object-fit:contain;

}

.amount{

text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:20px;

}

.status{

background:green;
padding:12px;
border-radius:30px;
text-align:center;
font-weight:bold;
margin-bottom:30px;
font-size:18px;

}

.row{

display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,0.1);

}

.label{

opacity:0.7;

}

.value{

font-weight:bold;
text-align:right;

}

button{

width:100%;
padding:18px;
margin-top:30px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
background:white;

}

</style>

</head>

<body>

<div class="receipt-card">

<div class="logo">
FadaqData
</div>

<div class="title">
Transaction Receipt
</div>

<div class="networkLogo">

<img id="networkLogo" src="">

</div>

<div class="amount" id="amount">
₦0
</div>

<div class="status">
SUCCESSFUL
</div>

<div id="details"></div>

<button
onclick="window.location.href='history.html'">

Back To History

</button>

</div>

<script>

let data =
JSON.parse(localStorage.getItem("receipt"));

let transactionId =
"FDQ" + Date.now();

let reference =
Math.random().toString(36)
.substring(2,12)
.toUpperCase();

document.getElementById("amount").innerHTML =
"₦" + data.amount;

// NETWORK LOGOS

let logo = "";

if(data.network === "MTN"){

logo =
"https://upload.wikimedia.org/wikipedia/commons/9/93/New-mtn-logo.jpg";

}

else if(data.network === "GLO"){

logo =
"https://upload.wikimedia.org/wikipedia/commons/8/8d/Glo_logo.png";

}

else if(data.network === "AIRTEL"){

logo =
"https://upload.wikimedia.org/wikipedia/commons/7/7b/Airtel_logo.png";

}

else if(data.network === "9MOBILE"){

logo =
"https://upload.wikimedia.org/wikipedia/en/5/5d/9mobile_logo.svg";

}

document.getElementById("networkLogo").src =
logo;

// RECEIPT DETAILS

document.getElementById("details").innerHTML = `

<div class="row">
<div class="label">Network</div>
<div class="value">${data.network}</div>
</div>

<div class="row">
<div class="label">Phone</div>
<div class="value">${data.phone}</div>
</div>

<div class="row">
<div class="label">Plan</div>
<div class="value">${data.plan}</div>
</div>

<div class="row">
<div class="label">Date</div>
<div class="value">${data.date}</div>
</div>

<div class="row">
<div class="label">Transaction ID</div>
<div class="value">${transactionId}</div>
</div>

<div class="row">
<div class="label">Reference ID</div>
<div class="value">${reference}</div>
</div>

`;

</script>

</body>
</html>

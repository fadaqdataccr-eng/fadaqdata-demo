<!DOCTYPE html>
<html>
<head>
<title>Receipt</title>

<style>

body{
background:#5c0000;
font-family:Arial;
color:white;
padding:20px;
}

.card{
background:#7a0000;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
margin-top:40px;
}

h1,h2,p{
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1>Transaction Receipt</h1>

<div id="receipt"></div>

<button onclick="window.location.href='history.html'">
Back To History
</button>

</div>

<script>

let data =
JSON.parse(localStorage.getItem("receipt"));

document.getElementById("receipt").innerHTML = `

<h2>${data.network}</h2>

<h1>₦${data.amount}</h1>

<p><b>Phone:</b> ${data.phone}</p>

<p><b>Plan:</b> ${data.plan}</p>

<p><b>Date:</b> ${data.date}</p>

<p style="color:lightgreen;">
SUCCESSFUL
</p>

`;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Receipt</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:30px 0;
}

.logo{
font-size:50px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
color:#7a0000;
padding:25px;
border-radius:25px;
}

.title{
font-size:35px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.item{
margin-bottom:20px;
font-size:20px;
line-height:1.6;
}

.label{
font-weight:bold;
}

.status{
background:green;
color:white;
padding:12px;
border-radius:15px;
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:20px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7a0000;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:25px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
Transaction Receipt
</div>

<div class="item">

<span class="label">
Type:
</span>

<span id="type">
-
</span>

</div>

<div class="item">

<span class="label">
Network:
</span>

<span id="network">
-
</span>

</div>

<div class="item">

<span class="label">
Phone:
</span>

<span id="phone">
-
</span>

</div>

<div class="item">

<span class="label">
Amount:
</span>

<span id="amount">
-
</span>

</div>

<div class="item">

<span class="label">
Date:
</span>

<span id="date">
-
</span>

</div>

<div class="status">
Successful ✅
</div>

<button onclick="goBack()">
Done
</button>

</div>

</div>

<script>

let receipt =
JSON.parse(
localStorage.getItem(
"receipt"
)
);

if(!receipt){

window.location.href =
"history.html";

}

document.getElementById(
"type"
).innerHTML =
receipt.type || "-";

document.getElementById(
"network"
).innerHTML =
receipt.network || "-";

document.getElementById(
"phone"
).innerHTML =
receipt.phone || "-";

document.getElementById(
"amount"
).innerHTML =
"₦" + receipt.amount;

document.getElementById(
"date"
).innerHTML =
receipt.date || "-";

function goBack(){

window.location.href =
"history.html";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Receipt</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#5c0000;
padding:20px;
color:white;
}

.receipt-card{

background:#7a0000;
border-radius:20px;
padding:25px;
margin-top:30px;

box-shadow:0 0 20px rgba(0,0,0,0.3);

}

.logo{

text-align:center;
font-size:35px;
font-weight:bold;
margin-bottom:20px;

}

.title{

text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:30px;

}

.amount{

text-align:center;
font-size:50px;
font-weight:bold;
margin-bottom:20px;

}

.status{

background:green;
padding:10px;
border-radius:30px;
text-align:center;
font-weight:bold;
margin-bottom:25px;

}

.row{

display:flex;
justify-content:space-between;
margin-top:18px;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.1);

}

.label{
opacity:0.7;
}

.value{
font-weight:bold;
}

button{

width:100%;
padding:18px;
margin-top:30px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
background:white;

}

</style>
</head>

<body>

<div class="receipt-card">

<div class="logo">
FadaqData
</div>

<div class="title">
Transaction Receipt
</div>

<div class="amount" id="amount">
₦0
</div>

<div class="status">
SUCCESSFUL
</div>

<div id="details"></div>

<button onclick="window.location.href='history.html'">
Back To History
</button>

</div>

<script>

let data =
JSON.parse(localStorage.getItem("receipt"));

let transactionId =
"FDQ" + Date.now();

let reference =
Math.random().toString(36)
.substring(2,12).toUpperCase();

document.getElementById("amount").innerHTML =
"₦" + data.amount;

document.getElementById("details").innerHTML = `

<div class="row">
<div class="label">Network</div>
<div class="value">${data.network}</div>
</div>

<div class="row">
<div class="label">Phone</div>
<div class="value">${data.phone}</div>
</div>

<div class="row">
<div class="label">Plan</div>
<div class="value">${data.plan}</div>
</div>

<div class="row">
<div class="label">Date</div>
<div class="value">${data.date}</div>
</div>

<div class="row">
<div class="label">Transaction ID</div>
<div class="value">${transactionId}</div>
</div>

<div class="row">
<div class="label">Reference ID</div>
<div class="value">${reference}</div>
</div>

`;

</script>

</body>
</html>

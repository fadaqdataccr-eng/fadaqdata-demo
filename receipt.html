<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Receipt</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

.card{
background:#7a0000;
padding:20px;
border-radius:20px;
margin-top:40px;
}

h1{
text-align:center;
}

.item{
margin-top:20px;
font-size:20px;
}

.label{
font-weight:bold;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.success{
text-align:center;
font-size:60px;
}

</style>

</head>

<body>

<div class="card">

<div class="success">
✅
</div>

<h1>Transaction Receipt</h1>

<div class="item">
<span class="label">Network:</span>
<span id="network"></span>
</div>

<div class="item">
<span class="label">Phone:</span>
<span id="phone"></span>
</div>

<div class="item">
<span class="label">Plan:</span>
<span id="plan"></span>
</div>

<div class="item">
<span class="label">Amount:</span>
₦<span id="amount"></span>
</div>

<div class="item">
<span class="label">Reference:</span>
<span id="reference"></span>
</div>

<div class="item">
<span class="label">Date:</span>
<span id="date"></span>
</div>

<button onclick="window.location.href='dashboard.html'">
Back To Dashboard
</button>

</div>

<script>

const receipt =
JSON.parse(
localStorage.getItem("lastReceipt")
);

if(!receipt){

window.location.href =
"dashboard.html";

}

document.getElementById("network")
.innerHTML =
receipt.network;

document.getElementById("phone")
.innerHTML =
receipt.phone;

document.getElementById("plan")
.innerHTML =
receipt.plan;

document.getElementById("amount")
.innerHTML =
receipt.amount;

document.getElementById("reference")
.innerHTML =
receipt.reference;

document.getElementById("date")
.innerHTML =
receipt.date;

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transaction Receipt</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:40px;
}

.receipt-card{
background:red;
padding:30px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.success{
text-align:center;
font-size:70px;
margin-bottom:20px;
}

.title{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:25px;
}

.detail{
background:#cc0000;
padding:18px;
border-radius:18px;
margin-bottom:15px;
font-size:18px;
line-height:1.7;
}

.label{
font-weight:bold;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:22px;
font-weight:bold;
text-decoration:none;
text-align:center;
box-sizing:border-box;
margin-top:25px;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="receipt-card">

<div class="success">
✅
</div>

<div class="title">
Transaction Receipt
</div>

<div
class="detail"
id="receiptDetails"
>
Loading receipt...
</div>

<a
href="history.html"
class="btn"
>
📜 View History
</a>

<a
href="dashboard.html"
class="btn"
>
🏠 Back To Dashboard
</a>

</div>

</div>

<div class="bottom-nav">

<a
href="dashboard.html"
class="nav-btn"
>
🏠 Home
</a>

<a
href="profile.html"
class="nav-btn"
>
👤 Profile
</a>

</div>

<script>

// LOGIN CHECK
const user =
JSON.parse(
localStorage.getItem("loggedInUser")
);

if(!user){

window.location.href =
"login.html";

}

// GET RECEIPT
const receipt =
JSON.parse(
localStorage.getItem("lastReceipt")
);

const receiptDetails =
document.getElementById(
"receiptDetails"
);

if(!receipt){

receiptDetails.innerHTML =
"No Receipt Found";

}else{

receiptDetails.innerHTML = `

<div>
<span class="label">
Transaction ID:
</span><br>
${receipt.id || "N/A"}
</div>

<br>

<div>
<span class="label">
Type:
</span><br>
${receipt.type || "N/A"}
</div>

<br>

<div>
<span class="label">
Network:
</span><br>
${receipt.network || "N/A"}
</div>

<br>

<div>
<span class="label">
Phone Number:
</span><br>
${receipt.phone || "N/A"}
</div>

<br>

<div>
<span class="label">
Amount:
</span><br>
${receipt.amount || "N/A"}
</div>

<br>

<div>
<span class="label">
Status:
</span><br>
${receipt.status || "Successful"}
</div>

<br>

<div>
<span class="label">
Reference:
</span><br>
${receipt.reference || "N/A"}
</div>

<br>

<div>
<span class="label">
Date:
</span><br>
${receipt.date || "N/A"}
</div>

`;

}

</script>

</body>
</html>

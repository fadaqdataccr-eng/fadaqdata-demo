<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transaction Receipt</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:450px;
}

.card{
background:white;
color:#7a0000;
padding:30px;
border-radius:25px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.title{
font-size:34px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.item{
font-size:21px;
margin-bottom:20px;
line-height:1.5;
word-break:break-word;
}

.label{
font-weight:bold;
}

.success{
color:green;
font-weight:bold;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7a0000;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("loggedIn") !== "true"){

window.location.href =
"login.html";

}

</script>

<div class="container">

<div class="card">

<div class="logo">
FadaqData
</div>

<div class="title">
✅ Transaction Receipt
</div>

<div class="item">
<span class="label">
Description:
</span>

<span id="receiptText">
-
</span>
</div>

<div class="item">
<span class="label">
Amount:
</span>

<span id="receiptAmount">
-
</span>
</div>

<div class="item">
<span class="label">
Type:
</span>

<span id="receiptType">
-
</span>
</div>

<div class="item">
<span class="label">
Transaction ID:
</span>

<span id="receiptID">
-
</span>
</div>

<div class="item">
<span class="label">
Date:
</span>

<span id="receiptDate">
-
</span>
</div>

<div class="item success">
Status: Successful
</div>

<button class="btn"
onclick="goBack()">
Done
</button>

</div>

</div>

<script>

let transaction =
JSON.parse(
localStorage.getItem(
"selectedTransaction"
)
);

if(!transaction){

window.location.href =
"dashboard.html";

}

document.getElementById(
"receiptText"
).innerHTML =
transaction.text || "-";

document.getElementById(
"receiptAmount"
).innerHTML =
"₦" +
(
transaction.amount || 0
);

document.getElementById(
"receiptType"
).innerHTML =
transaction.type || "-";

document.getElementById(
"receiptID"
).innerHTML =
transaction.id || "-";

document.getElementById(
"receiptDate"
).innerHTML =
transaction.date || "-";

function goBack(){

window.location.href =
"dashboard.html";

}

</script>

</body>
</html>

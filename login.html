<!DOCTYPE html>
<html>
<head>

<title>Login - FadaqData</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#2b0d00;
color:white;
}

h1{
text-align:center;
font-size:45px;
margin-top:40px;
}

.box{
background:#6b1f08;
padding:25px;
border-radius:25px;
margin-top:40px;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
background:gold;
font-size:18px;
font-weight:bold;
}

p{
text-align:center;
margin-top:20px;
}

a{
color:gold;
text-decoration:none;
}

</style>

</head>

<body>

<h1>FadaqData</h1>

<div class="box">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p>
Don't have account?
<a href="register.html">
Register
</a>
</p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",
authDomain: "fadaqdata-3bd14.firebaseapp.com",
projectId: "fadaqdata-3bd14",
storageBucket: "fadaqdata-3bd14.firebasestorage.app",
messagingSenderId: "609845657857",
appId: "1:609845657857:web:48817ce972c054e203db00"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(email == "" || password == ""){
alert("Fill all fields");
return;
}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

window.location.href =
"dashboard.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>

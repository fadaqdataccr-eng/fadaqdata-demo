<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
background:#2b160d;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;

border-radius:8px;
box-sizing:border-box;
}

a{
text-decoration:none;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>Login</h1>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<a href="dashboard.html">
<button type="button">Login</button>
</a>

</div>

</body>
</html>

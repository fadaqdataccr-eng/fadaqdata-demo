<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#4b0000;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
}

.card{
background:#8b1300;
padding:25px;
border-radius:20px;
margin-top:40px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
margin-top:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
margin-top:20px;
background:gold;
cursor:pointer;
}

a{
color:gold;
text-decoration:none;
}

p{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p>
Don't have account?
<a href="register.html">
Register
</a>
</p>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

function login(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

if(email == "" || password == ""){

alert("Fill all fields");

return;

}

auth.signInWithEmailAndPassword(email,password)

.then(function(){

alert("Login Successful");

window.location.href = "dashboard.html";

})

.catch(function(error){

alert(error.message);

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
margin:0;
padding:0;
background:#990000;
font-family:Arial;
color:white;
}

.container{
padding:20px;
text-align:center;
}

.logo{
font-size:70px;
font-weight:bold;
margin-top:120px;
}

.card{
background:#cc0000;
padding:25px;
border-radius:25px;
margin-top:40px;
}

input{
width:90%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
margin-top:20px;
outline:none;
}

button{
width:95%;
padding:18px;
border:none;
border-radius:15px;
font-size:25px;
font-weight:bold;
margin-top:25px;
background:white;
color:#660000;
cursor:pointer;
}

a{
color:white;
font-size:20px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<h1>Login</h1>

<input
type="email"
id="email"
placeholder="Email Address"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button onclick="loginUser()">
Login
</button>

<br><br>

<a href="signup.html">
Don't have account? Signup
</a>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.firestore();

async function loginUser(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(!email || !password){

alert("Enter Email and Password");

return;

}

try{

const result =
await auth.signInWithEmailAndPassword(
email,
password
);

const uid = result.user.uid;

const userDoc =
await db.collection("users")
.doc(uid)
.get();

if(userDoc.exists){

const userData =
userDoc.data();

localStorage.setItem(
"user",
JSON.stringify({

uid:uid,

email:email,

name:userData.name || "User"

})
);

window.location.href =
"dashboard.html";

}else{

alert("User data not found");

}

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>

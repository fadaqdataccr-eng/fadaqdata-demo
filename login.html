<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding-top:80px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:50px;
}

.card{
background:red;
padding:35px 25px;
border-radius:25px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card h1{
text-align:center;
margin-bottom:35px;
}

input{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:22px;
font-weight:bold;
color:#6b0000;
cursor:pointer;
}

.signup{
text-align:center;
margin-top:25px;
font-size:18px;
}

.signup a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">FadaqData</div>

<div class="card">

<h1>Login</h1>

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">
Login
</button>

<div class="signup">
Don't have account?
<a href="signup.html">Signup</a>
</div>

</div>

</div>

<script>

function loginUser(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

let users =
JSON.parse(localStorage.getItem("users")) || [];

const foundUser = users.find(user =>

user.email === email &&
user.password === password

);

if(foundUser){

localStorage.setItem(
"loggedInUser",
JSON.stringify(foundUser)
);

if(localStorage.getItem("walletBalance") === null){

localStorage.setItem(
"walletBalance",
0
);

}

window.location.href = "dashboard.html";

}else{

alert("Invalid Email or Password");

}

}

</script>

</body>
</html>

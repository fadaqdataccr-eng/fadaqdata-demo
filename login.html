<!DOCTYPE html>
<html>
<head>
<title>FadaqData Login</title>

<style>

body{
background:#8B0000;
font-family:Arial;
padding:20px;
color:white;
}

.container{
background:#c00000;
padding:25px;
border-radius:20px;
margin-top:50px;
}

h1{
text-align:center;
font-size:50px;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
font-size:22px;
font-weight:bold;
background:white;
color:#8B0000;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
font-weight:bold;
}

.bottom{
text-align:center;
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<h1>FadaqData</h1>

<div class="container">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="bottom">
Don't have account?
<a href="signup.html">Signup</a>
</div>

</div>

<script>

function login(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

let savedEmail =
localStorage.getItem("userEmail");

let savedPassword =
localStorage.getItem("userPassword");

if(email == savedEmail && password == savedPassword){

localStorage.setItem("isLoggedIn", "true");

alert("Login successful");

window.location.href = "dashboard.html";

}else{

alert("Incorrect email or password");

}

}

</script>

</body>
</html>

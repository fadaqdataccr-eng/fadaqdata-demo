<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding-top:120px;
}

.logo{
font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:50px;
}

.card{
background:#c00000;
padding:30px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
font-size:45px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:18px;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom{
text-align:center;
margin-top:20px;
font-size:18px;
}

.bottom a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
Login
</div>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="bottom">

Don't have account?

<a href="signup.html">
Signup
</a>

</div>

</div>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

window.login =
function(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

window.location.href =
"dashboard.html";

})

.catch((error)=>{

alert(error.message);

});

};

</script>

</body>
</html>

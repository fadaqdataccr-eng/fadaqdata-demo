<!DOCTYPE html>
<html>

<head>

<title>FadaqData Login</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:0;
color:white;
}

.container{
width:90%;
margin:auto;
margin-top:80px;
}

.card{
background:#7a0000;
padding:20px;
border-radius:20px;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
box-sizing:border-box;
background:white;
color:black;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
}

h1{
text-align:center;
font-size:50px;
}

h2{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>FadaqData</h1>

<div class="card">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email"
/>

<input
type="password"
id="password"
placeholder="Enter Password"
/>

<button onclick="login()">
Login
</button>

</div>

</div>

<script>

function login(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

if(
email === "fadaqdataccr@gmail.com"
&&
password === "1234"
){

window.location.href =
"dashboard.html";

}else{

alert("Invalid Email or Password");

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:400px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
}

.title{
font-size:30px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:20px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.link{
text-align:center;
margin-top:20px;
font-size:16px;
}

.link a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
Login
</div>

<input type="email"
id="email"
placeholder="Email Address">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="link">

Don't have account?

<a href="signup.html">
Signup
</a>

</div>

</div>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

window.login =
async function(){

let email =
document.getElementById(
"email"
).value;

let password =
document.getElementById(
"password"
).value;

if(
email === "" ||
password === ""
){

alert(
"Fill all fields"
);

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert(
"Login Successful ✅"
);

window.location.href =
"dashboard.html";

}

catch(error){

alert(
error.message
);

}

};

</script>

</body>
</html>

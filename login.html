<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadaqData Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f3f3;
    min-height:100vh;
}

.top-header{
    background:linear-gradient(to right,#5b0000,#c40000);
    padding:35px 25px 90px;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
    color:white;
}

.logo{
    font-size:45px;
    font-weight:900;
}

.tagline{
    margin-top:10px;
    font-size:18px;
    line-height:1.5;
}

.login-container{
    margin-top:-50px;
    padding:20px;
}

.login-box{
    background:white;
    border-radius:30px;
    padding:30px 25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.login-title{
    text-align:center;
    font-size:38px;
    font-weight:bold;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-top:10px;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:18px;
    border:2px solid #eee;
    border-radius:15px;
    font-size:16px;
    outline:none;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:15px;
}

.row a{
    color:#7a0000;
    text-decoration:none;
    font-weight:bold;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#5b0000,#c40000);
    color:white;
    font-size:20px;
    font-weight:bold;
}

.or{
    text-align:center;
    margin:25px 0;
    color:gray;
    font-weight:bold;
}

.google-btn{
    width:100%;
    padding:16px;
    border:2px solid #eee;
    border-radius:15px;
    background:white;
    font-size:18px;
    font-weight:bold;
}

.register{
    text-align:center;
    margin-top:30px;
    font-size:16px;
}

.register a{
    color:#7a0000;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="top-header">

    <div class="logo">FadaqData</div>

    <div class="tagline">
        Fadaqdata Your Data, Your Way – Anytime, Anywhere.
    </div>

</div>

<div class="login-container">

    <div class="login-box">

        <div class="login-title">
            Welcome Back! 👋
        </div>

        <div class="subtitle">
            Login to continue to your account
        </div>

        <form>

            <div class="input-group">
                <input type="text" placeholder="Email, Username or Phone Number">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password">
            </div>

            <div class="row">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button class="login-btn">
                Login
            </button>

        </form>

        <div class="or">OR</div>

        <button class="google-btn">
            Continue with Google
        </button>

        <div class="register">
            Don’t have an account?
            <a href="#">Register</a>
        </div>

    </div>

</div>

</body>
</html>

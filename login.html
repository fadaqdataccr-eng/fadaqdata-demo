<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding-top:120px;
}

.logo{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:50px;
}

.card{
    background:#e60000;
    padding:35px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:35px;
}

input{
    width:100%;
    padding:20px;
    margin-bottom:25px;
    border:none;
    border-radius:18px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#6b0000;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.bottom-text{
    text-align:center;
    margin-top:25px;
    font-size:18px;
}

.bottom-text a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        FadaqData
    </div>

    <div class="card">

        <div class="title">
            Login
        </div>

        <input type="email"
            id="email"
            placeholder="Email Address">

        <input type="password"
            id="password"
            placeholder="Password">

        <button onclick="loginUser()">
            Login
        </button>

        <div class="bottom-text">
            Don't have account?
            <a href="signup.html">
                Signup
            </a>
        </div>

    </div>

</div>

<script>

function loginUser(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value.trim();

    let users =
    JSON.parse(localStorage.getItem("users")) || [];

    const user = users.find(
        u => u.email === email &&
        u.password === password
    );

    if(!user){
        alert("Invalid Email or Password");
        return;
    }

    /* SAVE LOGIN SESSION */
    localStorage.setItem(
        "currentUser",
        JSON.stringify(user)
    );

    /* GO TO DASHBOARD */
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>

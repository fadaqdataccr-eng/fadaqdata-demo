<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#4b0000;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:40px;
}

.card{
background:#8b1300;
padding:30px;
border-radius:25px;
margin-top:40px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
margin-top:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
margin-top:20px;
background:gold;
color:black;
cursor:pointer;
}

.link{
text-align:center;
margin-top:20px;
font-size:18px;
}

a{
color:white;
}

</style>

</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">

<h1>Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="link">
Don't have account?
<a href="register.html">Register</a>
</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

try {

if(firebase.apps.length === 0){

firebase.initializeApp(firebaseConfig);

}

} catch(err){

console.log(err);

}

const auth = firebase.auth();

document
.getElementById("loginForm")
.addEventListener("submit", function(e){

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

auth.signInWithEmailAndPassword(email, password)

.then(function(){

window.location.href = "dashboard.html";

})

.catch(function(error){

alert(error.message);

});

});

</script>

</body>
</html>

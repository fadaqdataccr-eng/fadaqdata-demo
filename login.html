<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadaqData Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:55px;
    color:#4b0000;
    font-weight:900;
}

.logo p{
    color:#4b0000;
    font-size:20px;
    margin-top:10px;
    line-height:1.5;
}

.login-box{
    background:white;
    border-radius:30px;
    padding:30px 25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.login-box h2{
    text-align:center;
    font-size:38px;
    margin-bottom:10px;
}

.login-box .subtitle{
    text-align:center;
    color:gray;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:18px;
    border:2px solid #eee;
    border-radius:15px;
    font-size:16px;
    outline:none;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:15px;
}

.row a{
    text-decoration:none;
    color:#4b0000;
    font-weight:bold;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#4b0000,#8b0000);
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.or{
    text-align:center;
    margin:25px 0;
    color:gray;
    font-weight:bold;
}

.google-btn{
    width:100%;
    padding:16px;
    border:2px solid #eee;
    border-radius:15px;
    background:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.register{
    text-align:center;
    margin-top:30px;
    font-size:17px;
}

.register a{
    color:#4b0000;
    font-weight:bold;
    text-decoration:none;
}

.wave{
    height:70px;
    margin-top:30px;
    border-radius:0 0 30px 30px;
    background:linear-gradient(to right,#4b0000,#8b0000);
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>FadaqData</h1>
        <p>Fadaqdata Your Data, Your Way – Anytime, Anywhere.</p>
    </div>

    <div class="login-box">

        <h2>Welcome Back! 👋</h2>
        <p class="subtitle">Login to continue to your account</p>

        <div class="input-group">
            <input type="text" placeholder="Email, Username or Phone Number">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password">
        </div>

        <div class="row">
            <label>
                <input type="checkbox"> Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn">Login</button>

        <div class="or">OR</div>

        <button class="google-btn">
            Continue with Google
        </button>

        <div class="register">
            Don't have an account?
            <a href="#">Register</a>
        </div>

    </div>

    <div class="wave"></div>

</div>

</body>
</html>

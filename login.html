<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

.box{
margin-top:120px;
background:#7a0000;
padding:20px;
border-radius:20px;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

h1,h2{
text-align:center;
}

</style>
</head>

<body>

<h1>FadaqData</h1>

<div class="box">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Email"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

if(
email === "fadaqdataccr@gmail.com"
&&
password === "1234"
){

localStorage.setItem("loggedIn","true");

window.location.href = "dashboard.html";

}else{

alert("Invalid Email or Password");

}

}

</script>

</body>
</html>

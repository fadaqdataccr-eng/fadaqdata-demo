<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Airtime</title>

<style>

body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding:40px 0 120px;
}

.logo{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:40px;
}

.card{
    background:#e60000;
    padding:30px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
    font-size:30px;
    font-weight:bold;
    text-align:center;
    margin-bottom:30px;
}

.balance{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:30px;
}

select,
input{
    width:100%;
    padding:20px;
    border:none;
    border-radius:18px;
    font-size:18px;
    margin-bottom:22px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#6b0000;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
}

.nav-btn{
    background:white;
    color:#6b0000;
    padding:18px 35px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        FadaqData
    </div>

    <div class="card">

        <div class="title">
            📞 Buy Airtime
        </div>

        <div class="balance"
            id="walletBalance">
            ₦0
        </div>

        <form id="buyForm">

            <select id="network">

                <option value="MTN">
                    MTN
                </option>

                <option value="Airtel">
                    Airtel
                </option>

                <option value="Glo">
                    Glo
                </option>

                <option value="9mobile">
                    9mobile
                </option>

            </select>

            <input type="number"
                id="amount"
                placeholder="Amount">

            <input type="number"
                id="phone"
                placeholder="Phone Number">

            <button type="submit">
                Buy Airtime
            </button>

        </form>

    </div>

</div>

<div class="bottom-nav">

    <a href="dashboard.html"
        class="nav-btn">
        🏠 Home
    </a>

    <a href="profile.html"
        class="nav-btn">
        👤 Profile
    </a>

</div>

<script>

/* LOGIN CHECK */
const loggedInUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!loggedInUser){
    window.location.href = "login.html";
}

/* USERS */
let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND USER */
let userIndex = users.findIndex(
    user => user.email === loggedInUser.email
);

if(userIndex === -1){
    window.location.href = "login.html";
}

let currentUser = users[userIndex];

/* SHOW BALANCE */
const walletBalance =
document.getElementById("walletBalance");

function updateBalance(){

    walletBalance.innerText =
    "₦" + (currentUser.balance || 0);
}

updateBalance();

/* BUY AIRTIME */
document.getElementById("buyForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const network =
    document.getElementById("network").value;

    const amount =
    parseInt(document.getElementById("amount").value);

    const phone =
    document.getElementById("phone").value;

    if(phone.length < 11){
        alert("Enter valid phone number");
        return;
    }

    if(!amount || amount < 50){
        alert("Minimum airtime is ₦50");
        return;
    }

    if(currentUser.balance < amount){
        alert("Insufficient Balance");
        return;
    }

    /* DEDUCT */
    currentUser.balance -= amount;

    /* TRANSACTION */
    if(!currentUser.transactions){
        currentUser.transactions = [];
    }

    currentUser.transactions.unshift({

        type:"Airtime Purchase",

        network:network,

        phone:phone,

        amount:amount,

        reference:"TRX" + Date.now(),

        date:new Date().toLocaleString()

    });

    /* UPDATE USERS */
    users[userIndex] = currentUser;

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    localStorage.setItem(
        "currentUser",
        JSON.stringify(currentUser)
    );

    /* RECEIPT */
    localStorage.setItem(
        "receipt",
        JSON.stringify(
            currentUser.transactions[0]
        )
    );

    updateBalance();

    window.location.href =
    "receipt.html";

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Data</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.card{
background:red;
padding:30px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.balanceBox{
background:#cc0000;
padding:30px;
border-radius:20px;
text-align:center;
margin-bottom:25px;
}

.balance{
font-size:70px;
font-weight:bold;
margin-top:10px;
}

select,input,button{
width:100%;
padding:20px;
margin-top:20px;
border:none;
border-radius:15px;
font-size:20px;
box-sizing:border-box;
}

button{
background:white;
color:#5c0000;
font-weight:bold;
cursor:pointer;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.navBtn{
background:white;
padding:15px 35px;
border-radius:18px;
font-size:18px;
font-weight:bold;
text-decoration:none;
color:#5c0000;
}

#status{
text-align:center;
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">FadaqData</div>

<div class="card">

<div class="balanceBox">
<h2>Wallet Balance 👁️</h2>
<div class="balance" id="balance">₦0</div>
</div>

<select id="network">
<option value="1">MTN</option>
<option value="2">AIRTEL</option>
<option value="3">GLO</option>
<option value="4">9MOBILE</option>
</select>

<select id="plan">

<option value="85" data-price="100">
MTN 500MB - ₦100
</option>

<option value="86" data-price="400">
MTN 1GB - ₦400
</option>

<option value="109" data-price="430">
GLO 1GB - ₦430
</option>

</select>

<input
type="number"
id="phone"
placeholder="Enter Phone Number"
>

<button onclick="buyData()">
Buy Data
</button>

<p id="status"></p>

</div>

</div>

<div class="bottomNav">
<a href="dashboard.html" class="navBtn">🏠 Home</a>
<a href="profile.html" class="navBtn">👤 Profile</a>
</div>

<script>

let balance =
parseInt(localStorage.getItem("walletBalance")) || 0;

document.getElementById("balance").innerHTML =
"₦" + balance;

async function buyData(){

let phone =
document.getElementById("phone").value;

let network =
document.getElementById("network").value;

let planSelect =
document.getElementById("plan");

let plan =
planSelect.value;

let price =
parseInt(
planSelect.options[planSelect.selectedIndex]
.getAttribute("data-price")
);

if(phone.length < 11){
alert("Enter Valid Phone Number");
return;
}

if(balance < price){
alert("Insufficient Balance");
return;
}

document.getElementById("status").innerHTML =
"Processing Purchase...";

try{

const response = await fetch(
"https://fadaqdata-demo.onrender.com/buy-data",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

network:network,

phone:phone,

ref:"DATA"+Date.now(),

data_plan:plan,

ported_number:true

})

});

const data = await response.json();

console.log(data);

if(
data.status === "success" ||
data.Status === "successful"
){

balance = balance - price;

localStorage.setItem(
"walletBalance",
balance
);

document.getElementById("balance").innerHTML =
"₦" + balance;

let history =
JSON.parse(
localStorage.getItem("transactions")
) || [];

history.unshift({

type:"Data Purchase",

amount:price,

phone:phone,

plan:planSelect.options[
planSelect.selectedIndex
].text,

date:new Date().toLocaleString()

});

localStorage.setItem(
"transactions",
JSON.stringify(history)
);

alert("Data Purchase Successful");

document.getElementById("status").innerHTML =
"Purchase Successful";

}else{

alert("Purchase Failed");

document.getElementById("status").innerHTML =
"Purchase Failed";

}

}catch(error){

console.log(error);

alert("Network Error");

document.getElementById("status").innerHTML =
"Network Error";

}

}

</script>

</body>
</html>

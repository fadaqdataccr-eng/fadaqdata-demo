<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Airtime</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:40px;
}

.card{
background:red;
padding:25px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.balance-box{
background:#cc0000;
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:25px;
}

.balance-title{
font-size:22px;
margin-bottom:10px;
}

.balance{
font-size:65px;
font-weight:bold;
}

select,input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:18px;
margin-top:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="balance-box">

<div class="balance-title">
Wallet Balance 👁️
</div>

<div
class="balance"
id="walletBalance"
>
₦0
</div>

</div>

<select id="network">

<option value="MTN">
MTN
</option>

<option value="AIRTEL">
AIRTEL
</option>

<option value="GLO">
GLO
</option>

<option value="9MOBILE">
9MOBILE
</option>

</select>

<input
type="number"
id="phone"
placeholder="Enter Phone Number"
>

<input
type="number"
id="amount"
placeholder="Enter Airtime Amount"
>

<button onclick="buyAirtime()">
Buy Airtime
</button>

</div>

</div>

<div class="bottom-nav">

<a
href="dashboard.html"
class="nav-btn"
>
🏠 Home
</a>

<a
href="profile.html"
class="nav-btn"
>
👤 Profile
</a>

</div>

<script>

// LOGIN CHECK
const user =
JSON.parse(
localStorage.getItem("loggedInUser")
);

if(!user){

window.location.href =
"login.html";

}

// WALLET
let balance =
parseInt(
localStorage.getItem("walletBalance")
) || 100;

document.getElementById(
"walletBalance"
).innerText =
"₦" + balance.toLocaleString();

// BUY AIRTIME
function buyAirtime(){

const network =
document.getElementById("network").value;

const phone =
document.getElementById("phone").value;

const amount =
parseInt(
document.getElementById("amount").value
);

// VALIDATION
if(!network || !phone || !amount){

alert("Please fill all fields");
return;

}

if(amount < 50){

alert("Minimum airtime is ₦50");
return;

}

if(balance < amount){

alert("Insufficient wallet balance");
return;

}

// DEDUCT BALANCE
balance -= amount;

localStorage.setItem(
"walletBalance",
balance
);

// SAVE TRANSACTION
let transactions =
JSON.parse(
localStorage.getItem("transactions")
) || [];

transactions.unshift({

id:"TRX" + Date.now(),

type:"Airtime Purchase",

network:network,

phone:phone,

amount:"₦" + amount,

status:"Successful",

reference:"AIR" + Date.now(),

date:new Date().toLocaleString()

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

// UPDATE BALANCE
document.getElementById(
"walletBalance"
).innerText =
"₦" + balance.toLocaleString();

alert(
"Airtime Purchase Successful"
);

// REDIRECT
window.location.href =
"history.html";

}

</script>

</body>
</html>

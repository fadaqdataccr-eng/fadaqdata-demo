<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buy Airtime</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

.card{
background:#7a0000;
padding:20px;
border-radius:20px;
margin-top:40px;
}

h2{
text-align:center;
}

.balance{
text-align:center;
font-size:35px;
font-weight:bold;
margin-bottom:20px;
}

select,input,button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div
class="balance"
id="balance"
>
₦100
</div>

<h2>Buy Airtime</h2>

<select id="network">

<option value="1">
MTN
</option>

<option value="2">
GLO
</option>

<option value="4">
Airtel
</option>

<option value="6">
9mobile
</option>

</select>

<input
type="number"
id="phone"
placeholder="Phone Number"
/>

<input
type="number"
id="amount"
placeholder="Amount"
/>

<button onclick="buyAirtime()">
Buy Airtime
</button>

<button onclick="window.location.href='dashboard.html'">
Back To Dashboard
</button>

</div>

<script>

if(localStorage.getItem("loggedIn") !== "true"){

window.location.href =
"login.html";

}

if(!localStorage.getItem("walletBalance")){

localStorage.setItem(
"walletBalance",
"100"
);

}

function loadBalance(){

document.getElementById("balance")
.innerHTML =
"₦" +
localStorage.getItem("walletBalance");

}

loadBalance();

async function buyAirtime(){

const network =
document.getElementById("network").value;

const phone =
document.getElementById("phone").value;

const amount =
document.getElementById("amount").value;

if(!network || !phone || !amount){

alert("All fields required");

return;

}

let wallet =
parseInt(
localStorage.getItem("walletBalance")
);

if(wallet < amount){

alert("Insufficient balance");

return;

}

try{

const response =
await fetch(
"https://fadaqdata-server.onrender.com/buy-airtime",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

network:network,

phone:phone,

amount:amount

})

}
);

const data =
await response.json();

console.log(data);

if(
data.status === "success"
||

data.Status === "successful"
){

wallet -= parseInt(amount);

localStorage.setItem(
"walletBalance",
wallet
);

let networkName = "MTN";

if(network == "2"){
networkName = "GLO";
}

if(network == "4"){
networkName = "Airtel";
}

if(network == "6"){
networkName = "9mobile";
}

const receipt = {

network:networkName,

phone:phone,

plan:"Airtime Purchase",

amount:amount,

reference:
data.reference ||
"FDQ" + Date.now(),

date:new Date().toLocaleString()

};

// SAVE RECEIPT
localStorage.setItem(
"lastReceipt",
JSON.stringify(receipt)
);

// SAVE HISTORY
const transactions =
JSON.parse(
localStorage.getItem("transactions")
) || [];

transactions.push(receipt);

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

alert("Airtime Purchase Successful");

window.location.href =
"receipt.html";

}else{

alert(
data.message ||
"Transaction Failed"
);

}

}catch(error){

console.log(error);

alert("Network Error");

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadaqData Airtime</title>

<style>

body{
margin:0;
padding:0;
background:#7a0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#a80000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

.balance{
font-size:50px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
}

select,
input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
margin-bottom:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.white{
background:white;
color:#7a0000;
}

.red{
background:#ff1a1a;
color:white;
}

.success{
background:#008000;
padding:18px;
border-radius:18px;
margin-top:20px;
font-size:20px;
display:none;
text-align:center;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#7a0000;
box-sizing:border-box;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📞 Airtime Purchase
</div>

<div class="balance">
₦<span id="walletBalance">0.00</span>
</div>

<select id="network">

<option value="">
Select Network
</option>

<option value="MTN">
MTN
</option>

<option value="Airtel">
Airtel
</option>

<option value="Glo">
Glo
</option>

<option value="9mobile">
9mobile
</option>

</select>

<input
type="number"
id="phone"
placeholder="Enter Phone Number">

<input
type="number"
id="amount"
placeholder="Enter Airtime Amount">

<button class="white"
onclick="buyAirtime()">
Buy Airtime
</button>

<div class="success" id="successBox">
Airtime purchase successful 🎉
</div>

<button class="red"
onclick="window.location.href='dashboard.html'">
Back To Dashboard
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

let balance =
parseFloat(localStorage.getItem("walletBalance")) || 0;

document.getElementById("walletBalance").innerHTML =
balance.toFixed(2);

function buyAirtime(){

let network =
document.getElementById("network").value;

let phone =
document.getElementById("phone").value;

let amount =
document.getElementById("amount").value;

if(network === "" || phone === "" || amount === ""){

alert("Fill all fields");

return;

}

amount = parseFloat(amount);

if(balance < amount){

alert("Insufficient wallet balance");

return;

}

balance -= amount;

localStorage.setItem(
"walletBalance",
balance
);

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

transactions.push(
"Airtime purchase: " +
network +
" ₦" +
amount +
" for " +
phone
);

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

document.getElementById("walletBalance").innerHTML =
balance.toFixed(2);

document.getElementById("successBox").style.display =
"block";

setTimeout(function(){

window.location.href = "dashboard.html";

},2000);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Buy Airtime - FadaqData</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
background:#8B0000;
font-family:Arial;
color:white;
}

.logo{
text-align:center;
font-size:50px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#cc0000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.wallet{
background:#b30000;
padding:18px;
border-radius:15px;
font-size:22px;
font-weight:bold;
margin-bottom:25px;
text-align:center;
}

label{
display:block;
margin-bottom:10px;
font-size:20px;
font-weight:bold;
}

select,input{
width:100%;
padding:18px;
border:none;
border-radius:12px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#8B0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
display:flex;
gap:15px;
margin-top:25px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
background:white;
color:#8B0000;
}

</style>
</head>

<body>

<div class="logo">
📞 Buy Airtime
</div>

<div class="card">

<div class="wallet">
Wallet: ₦<span id="walletBalance">0</span>
</div>

<label>Select Network</label>

<select id="network">

<option>MTN</option>
<option>Airtel</option>
<option>Glo</option>
<option>9mobile</option>

</select>

<label>Phone Number</label>

<input type="number"
id="phone"
placeholder="Enter phone number">

<label>Amount</label>

<input type="number"
id="amount"
placeholder="Enter airtime amount">

<button onclick="buyAirtime()">
Purchase Airtime
</button>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<!-- RECEIPT POPUP -->

<div id="receiptPopup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:white;
width:85%;
padding:25px;
border-radius:20px;
color:#8B0000;
">

<h2 style="text-align:center;">
✅ Airtime Receipt
</h2>

<p id="receiptDetails"></p>

<button onclick="closeReceipt()"
style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#8B0000;
color:white;
font-size:18px;
font-weight:bold;
margin-top:20px;
">
Done
</button>

</div>

</div>

<script>

let wallet =
Number(localStorage.getItem("walletBalance")) || 0;

document.getElementById("walletBalance")
.innerHTML = wallet.toFixed(2);

function buyAirtime(){

let network =
document.getElementById("network").value;

let phone =
document.getElementById("phone").value;

let amount =
Number(document.getElementById("amount").value);

if(phone === "" || amount <= 0){

alert("Fill all fields");
return;

}

let wallet =
Number(localStorage.getItem("walletBalance")) || 0;

if(amount > wallet){

alert("Insufficient wallet balance");
return;

}

wallet -= amount;

localStorage.setItem("walletBalance", wallet);

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

let transactionText =
"📞 Airtime purchased for " +
phone +
" - ₦" + amount;

let date =
new Date().toLocaleString();

transactions.push({

text:transactionText,
date:date

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

document.getElementById("walletBalance")
.innerHTML = wallet.toFixed(2);

document.getElementById("receiptPopup")
.style.display = "flex";

document.getElementById("receiptDetails")
.innerHTML = `

<p><b>Network:</b> ${network}</p>

<p><b>Phone:</b> ${phone}</p>

<p><b>Amount:</b> ₦${amount}</p>

<p><b>Transaction ID:</b>
FD${Math.floor(Math.random()*999999999)}
</p>

<p><b>Date:</b> ${date}</p>

<p>
<b>Status:</b>
<span style="color:green;">
Successful
</span>
</p>

`;

}

function closeReceipt(){

document.getElementById("receiptPopup")
.style.display = "none";

window.location.href = "dashboard.html";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>FadaqData</title>

<style>

body{

background:#5b0000;
font-family:Arial;
margin:0;
padding:0;
color:white;

}

.container{

width:90%;
margin:auto;
margin-top:80px;

}

.card{

background:#7a0000;
padding:20px;
border-radius:20px;

}

input{

width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;

}

button{

width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;

}

h1{

text-align:center;
font-size:60px;

}

</style>

</head>

<body>

<div class="container">

<h1>FadaqData</h1>

<div class="card">

<h2 style="text-align:center;">
Login
</h2>

<input
type="email"
id="email"
placeholder="Email"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button onclick="login()">
Login
</button>

</div>

</div>

<script>

function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(
email === "fadaqdataccr@gmail.com" &&
password === "1234"
){

window.location.href =
"dashboard.html";

}else{

alert("Invalid Email or Password");

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Data</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:25px;
text-align:center;
}

.balance-box{
background:#a00000;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
}

label{
display:block;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

input,select{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

.plan-box{
background:#a00000;
padding:18px;
border-radius:15px;
margin-bottom:15px;
cursor:pointer;
font-size:20px;
font-weight:bold;
border:3px solid transparent;
}

.active-plan{
border:3px solid white;
}

.buy-btn{
width:100%;
padding:22px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.receipt-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

.receipt-card{
background:white;
color:#7a0000;
padding:25px;
border-radius:25px;
width:100%;
max-width:400px;
}

.receipt-title{
font-size:30px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.receipt-item{
font-size:18px;
margin-bottom:15px;
line-height:1.5;
}

.success{
color:green;
font-weight:bold;
}

.close-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7a0000;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){

window.location.href = "login.html";

}

</script>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📶 Buy Data
</div>

<div class="balance-box"
id="walletBalance">
Wallet: ₦0.00
</div>

<label>Select Network</label>

<select id="network">

<option value="MTN">MTN</option>

<option value="Airtel">Airtel</option>

<option value="Glo">Glo</option>

<option value="9mobile">9mobile</option>

</select>

<label>Phone Number</label>

<input type="number"
id="phone"
placeholder="Enter phone number">

<label>Select Data Plan</label>

<div class="plan-box"
onclick="selectPlan(this,300,'1GB')">
1GB — ₦300
</div>

<div class="plan-box"
onclick="selectPlan(this,500,'2GB')">
2GB — ₦500
</div>

<div class="plan-box"
onclick="selectPlan(this,1000,'5GB')">
5GB — ₦1000
</div>

<div class="plan-box"
onclick="selectPlan(this,2000,'10GB')">
10GB — ₦2000
</div>

<button class="buy-btn"
onclick="buyData()">
Purchase Data
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<div class="receipt-modal"
id="receiptModal">

<div class="receipt-card">

<div class="receipt-title">
✅ Transaction Receipt
</div>

<div class="receipt-item"
id="receiptNetwork">
</div>

<div class="receipt-item"
id="receiptPlan">
</div>

<div class="receipt-item"
id="receiptPhone">
</div>

<div class="receipt-item"
id="receiptAmount">
</div>

<div class="receipt-item"
id="receiptID">
</div>

<div class="receipt-item"
id="receiptDate">
</div>

<div class="receipt-item success">
Status: Successful
</div>

<button class="close-btn"
onclick="closeReceipt()">
Done
</button>

</div>

</div>

<script>

let wallet =
parseFloat(localStorage.getItem(
"walletBalance"
)) || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"Wallet: ₦" +
wallet.toFixed(2);

let selectedAmount = 0;
let selectedPlan = "";

function selectPlan(element,amount,plan){

document.querySelectorAll(
".plan-box"
).forEach(function(box){

box.classList.remove(
"active-plan"
);

});

element.classList.add(
"active-plan"
);

selectedAmount = amount;
selectedPlan = plan;

}

function buyData(){

let network =
document.getElementById(
"network"
).value;

let phone =
document.getElementById(
"phone"
).value;

if(phone === ""){

alert("Enter phone number");

return;

}

if(selectedAmount === 0){

alert("Select data plan");

return;

}

if(wallet < selectedAmount){

alert("Insufficient balance");

return;

}

wallet -= selectedAmount;

localStorage.setItem(
"walletBalance",
wallet
);

let transactions =
JSON.parse(localStorage.getItem(
"transactions"
)) || [];

let date =
new Date().toLocaleString();

transactions.unshift(

"📶 " +
network +
" " +
selectedPlan +
" for " +
phone +
" - ₦" +
selectedAmount +
"<br><small>" +
date +
"</small>"

);

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

let transactionID =
"FD" +
Math.floor(Math.random()*100000000);

document.getElementById(
"receiptNetwork"
).innerHTML =
"Network: " + network;

document.getElementById(
"receiptPlan"
).innerHTML =
"Plan: " + selectedPlan;

document.getElementById(
"receiptPhone"
).innerHTML =
"Phone: " + phone;

document.getElementById(
"receiptAmount"
).innerHTML =
"Amount: ₦" + selectedAmount;

document.getElementById(
"receiptID"
).innerHTML =
"Transaction ID: " +
transactionID;

document.getElementById(
"receiptDate"
).innerHTML =
"Date: " + date;

document.getElementById(
"receiptModal"
).style.display =
"flex";

}

function closeReceipt(){

window.location.href =
"dashboard.html";

}

</script>

</body>
  </html>

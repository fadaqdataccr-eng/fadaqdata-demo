<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Data</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin:30px 0;
}

.card{
background:#c00000;
padding:30px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:25px;
}

.balance{
font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

select,
input{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:18px;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
justify-content:space-around;
}

.navbtn{
background:white;
padding:15px 30px;
border-radius:18px;
color:#7a0000;
font-weight:bold;
text-decoration:none;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📶 Buy Data
</div>

<div class="balance"
id="balance">
₦0
</div>

<select id="network">

<option value="MTN">
MTN
</option>

<option value="Airtel">
Airtel
</option>

<option value="Glo">
Glo
</option>

<option value="9mobile">
9mobile
</option>

</select>

<select id="plan">

<option value="1200">
1GB - ₦1200
</option>

<option value="2500">
2GB - ₦2500
</option>

<option value="5000">
5GB - ₦5000
</option>

</select>

<input
type="number"
id="phone"
placeholder="Enter Phone Number">

<button onclick="buyData()">
Buy Data
</button>

</div>

</div>

<div class="bottomnav">

<a href="dashboard.html"
class="navbtn">
🏠 Home
</a>

<a href="profile.html"
class="navbtn">
👤 Profile
</a>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser;
let wallet = 0;

onAuthStateChanged(auth,
async(user)=>{

if(user){

currentUser = user;

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

wallet =
docSnap.data().wallet || 0;

document.getElementById(
"balance"
).innerText =
"₦" + wallet;

}

}else{

window.location.href =
"login.html";

}

});

window.buyData =
async function(){

const network =
document.getElementById(
"network"
).value;

const amount =
parseInt(
document.getElementById(
"plan"
).value
);

const phone =
document.getElementById(
"phone"
).value;

if(phone.length < 11){

alert(
"Enter Valid Phone Number"
);

return;

}

if(wallet < amount){

alert(
"Insufficient Balance"
);

return;

}

wallet -= amount;

const docRef =
doc(db,"users",currentUser.uid);

const docSnap =
await getDoc(docRef);

let transactions =
docSnap.data().transactions || [];

transactions.push({

type:"Data Purchase",

network:network,

phone:phone,

amount:amount,

date:new Date().toLocaleString()

});

await updateDoc(docRef,{

wallet:wallet,

transactions:transactions

});

localStorage.setItem(
"receipt",
JSON.stringify({
type:"Data Purchase",
network:network,
phone:phone,
amount:amount,
date:new Date().toLocaleString()
})
);

window.location.href =
"receipt.html";

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Buy Data</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:25px;
padding-bottom:120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:30px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.title{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.balance-box{
background:#a00000;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

label{
display:block;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

input,select{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

.buy-btn{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.receipt-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

.receipt-card{
background:white;
color:#7a0000;
padding:25px;
border-radius:25px;
width:100%;
max-width:400px;
}

.receipt-title{
font-size:32px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
}

.receipt-item{
font-size:20px;
margin-bottom:18px;
line-height:1.5;
}

.success{
color:green;
font-weight:bold;
}

.done-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7a0000;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📶 Buy Data
</div>

<div class="balance-box"
id="walletBalance">
Wallet: ₦0.00
</div>

<label>Select Network</label>

<select id="network">

<option value="MTN">MTN</option>
<option value="Airtel">Airtel</option>
<option value="Glo">Glo</option>
<option value="9mobile">9mobile</option>

</select>

<label>Select Plan</label>

<select id="plan"
onchange="updateAmount()">

<option value="500MB">500MB - ₦100</option>
<option value="1GB">1GB - ₦300</option>
<option value="2GB">2GB - ₦500</option>
<option value="5GB">5GB - ₦1200</option>

</select>

<label>Phone Number</label>

<input type="number"
id="phone"
placeholder="Enter phone number">

<label>Amount</label>

<input type="text"
id="amount"
readonly
style="
background:#eee;
font-weight:bold;
">

<button class="buy-btn"
onclick="buyData()">
Purchase Data
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<div class="receipt-modal"
id="receiptModal">

<div class="receipt-card">

<div class="receipt-title">
✅ Data Receipt
</div>

<div class="receipt-item"
id="receiptNetwork"></div>

<div class="receipt-item"
id="receiptPlan"></div>

<div class="receipt-item"
id="receiptPhone"></div>

<div class="receipt-item"
id="receiptAmount"></div>

<div class="receipt-item"
id="receiptID"></div>

<div class="receipt-item"
id="receiptDate"></div>

<div class="receipt-item success">
Status: Successful
</div>

<button class="done-btn"
onclick="closeReceipt()">
Done
</button>

</div>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
arrayUnion
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjT",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;
let currentWallet = 0;

onAuthStateChanged(auth,
async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

currentWallet =
data.wallet || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"Wallet: ₦" +
currentWallet.toFixed(2);

}

});

window.updateAmount =
function(){

let plan =
document.getElementById(
"plan"
).value;

let amountField =
document.getElementById(
"amount"
);

if(plan === "500MB"){
amountField.value = 100;
}

else if(plan === "1GB"){
amountField.value = 300;
}

else if(plan === "2GB"){
amountField.value = 500;
}

else if(plan === "5GB"){
amountField.value = 1200;
}

};

window.buyData =
async function(){

let network =
document.getElementById(
"network"
).value;

let plan =
document.getElementById(
"plan"
).value;

let phone =
document.getElementById(
"phone"
).value;

let amount =
parseFloat(
document.getElementById(
"amount"
).value
);

if(phone === ""){

alert(
"Enter phone number"
);

return;

}

if(currentWallet < amount){

alert(
"Insufficient balance"
);

return;

}

let newWallet =
currentWallet - amount;

let transactionID =
"FD" +
Math.floor(
Math.random()*100000000
);

let transactionDate =
new Date().toLocaleString();

let transaction = {

text:
"📶 " +
network +
" Data for " +
phone +
" - ₦" +
amount,

date:
transactionDate,

amount:amount,

type:"Data Purchase",

status:"Successful",

id:transactionID

};

await updateDoc(
doc(db,"users",currentUser.uid),
{

wallet:newWallet,

transactions:
arrayUnion(transaction)

}

);

document.getElementById(
"receiptNetwork"
).innerHTML =
"Network: " + network;

document.getElementById(
"receiptPlan"
).innerHTML =
"Plan: " + plan;

document.getElementById(
"receiptPhone"
).innerHTML =
"Phone: " + phone;

document.getElementById(
"receiptAmount"
).innerHTML =
"Amount: ₦" + amount;

document.getElementById(
"receiptID"
).innerHTML =
"Transaction ID: " +
transactionID;

document.getElementById(
"receiptDate"
).innerHTML =
"Date: " +
transactionDate;

document.getElementById(
"receiptModal"
).style.display =
"flex";

};

window.closeReceipt =
function(){

window.location.href =
"dashboard.html";

};

updateAmount();

</script>

</body>
  </html>

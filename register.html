<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
background:#2b160d;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
width:320px;
background:#5a2410;
padding:25px;
border-radius:15px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>

<script>

function register(){

let username=
document.getElementById("username").value;

let password=
document.getElementById("password").value;

localStorage.setItem(
"username",
username
);

localStorage.setItem(
"password",
password
);

alert(
"Registration successful"
);

window.location.href=
"login.html";

}

</script>

</head>

<body>

<div class="box">

<h1>Register</h1>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

</div>

</body>
</html>

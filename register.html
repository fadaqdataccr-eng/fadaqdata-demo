<!DOCTYPE html>
<html>
<head>
  <title>Register - FadaqData</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      padding:20px;
      font-family:Arial;
      background:#2b0d00;
      color:white;
    }

    h1{
      text-align:center;
      margin-top:40px;
      font-size:40px;
    }

    .box{
      background:#6b1f08;
      padding:25px;
      border-radius:20px;
      margin-top:40px;
    }

    input{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:12px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      border:none;
      border-radius:12px;
      background:gold;
      font-size:18px;
      font-weight:bold;
    }

    a{
      color:gold;
      text-decoration:none;
    }

    p{
      text-align:center;
    }
  </style>
</head>

<body>

<h1>FadaqData</h1>

<div class="box">

  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">

  <input type="email" id="email" placeholder="Email Address">

  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <p>
    Already have account?
    <a href="login.html">Login</a>
  </p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",
  authDomain: "fadaqdata-3bd14.firebaseapp.com",
  projectId: "fadaqdata-3bd14",
  storageBucket: "fadaqdata-3bd14.firebasestorage.app",
  messagingSenderId: "609845657857",
  appId: "1:609845657857:web:48817ce972c054e203db00"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.register = async function(){

  const name = document.getElementById("name").value;

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;

  if(name == "" || email == "" || password == ""){
    alert("Fill all fields");
    return;
  }

  try{

    const userCredential =
    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      name:name,
      email:email,
      balance:0,
      transactions:0
    });

    alert("Registration Successful");

    window.location.href = "login.html";

  }catch(error){

    alert(error.message);

  }

}

</script>

</body>
</html>

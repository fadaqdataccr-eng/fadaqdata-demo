<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
background:#2b160d;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:80%;
max-width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>Register</h1>

<input type="text" placeholder="Username">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Register</button>

</div>

</body>
</html>

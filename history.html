<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transaction History</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:20px 0 100px;
}

.logo{
font-size:50px;
font-weight:bold;
text-align:center;
margin:30px 0;
}

.card{
background:#c00000;
padding:20px;
border-radius:20px;
margin-bottom:20px;
cursor:pointer;
}

.type{
font-size:22px;
font-weight:bold;
}

.amount{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.date{
margin-top:10px;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div id="history">

</div>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

onAuthStateChanged(auth,
async(user)=>{

if(user){

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

let transactions =
docSnap.data().transactions || [];

let historyDiv =
document.getElementById(
"history"
);

historyDiv.innerHTML = "";

transactions.reverse().forEach((trx,index)=>{

historyDiv.innerHTML += `

<div class="card"
onclick="viewReceipt(${index})">

<div class="type">
${trx.type}
</div>

<div class="amount">
₦${trx.amount}
</div>

<div class="date">
${trx.date}
</div>

</div>

`;

});

window.transactions =
transactions;

}

}else{

window.location.href =
"login.html";

}

});

window.viewReceipt =
function(index){

localStorage.setItem(
"receipt",
JSON.stringify(
window.transactions[index]
)
);

window.location.href =
"receipt.html";

};

</script>

</body>
</html>

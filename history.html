<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transaction History</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:500px;
margin:auto;
padding:40px 0 120px;
}

.logo{
text-align:center;
font-size:50px;
font-weight:bold;
margin-bottom:40px;
}

.card{
background:red;
padding:20px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

.transaction{
background:#cc0000;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}

.type{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.details{
font-size:17px;
line-height:1.6;
}

.empty{
text-align:center;
font-size:20px;
padding:30px 0;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
📜 Transaction History
</div>

<div id="historyContainer">

<div class="empty">
No Transactions Yet
</div>

</div>

</div>

</div>

<div class="bottom-nav">

<a
href="dashboard.html"
class="nav-btn"
>
🏠 Home
</a>

<a
href="profile.html"
class="nav-btn"
>
👤 Profile
</a>

</div>

<script>

// LOGIN CHECK
const user =
JSON.parse(
localStorage.getItem("loggedInUser")
);

if(!user){

window.location.href =
"login.html";

}

// GET TRANSACTIONS
let transactions =
JSON.parse(
localStorage.getItem("transactions")
) || [];

const historyContainer =
document.getElementById(
"historyContainer"
);

// EMPTY
if(transactions.length === 0){

historyContainer.innerHTML =

'<div class="empty">No Transactions Yet</div>';

}else{

historyContainer.innerHTML = "";

// LOOP
transactions.forEach(transaction => {

historyContainer.innerHTML += `

<div class="transaction">

<div class="type">
${transaction.type}
</div>

<div class="details">

${transaction.network ?
`Network: ${transaction.network}<br>` : ""}

${transaction.plan ?
`Plan: ${transaction.plan}<br>` : ""}

${transaction.phone ?
`Phone: ${transaction.phone}<br>` : ""}

Amount: ${transaction.amount}<br>

Status: ${transaction.status}<br>

${transaction.reference ?
`Reference: ${transaction.reference}<br>` : ""}

Date: ${transaction.date}

</div>

</div>

`;

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transaction History</title>

<style>

body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding:40px 0 120px;
}

.logo{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:40px;
}

.title{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-bottom:30px;
}

.card{
    background:#e60000;
    padding:20px;
    border-radius:20px;
    margin-bottom:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    cursor:pointer;
}

.type{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.amount{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.date{
    font-size:16px;
}

.empty{
    text-align:center;
    font-size:22px;
    margin-top:50px;
}

.bottom-nav{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
}

.nav-btn{
    background:white;
    color:#6b0000;
    padding:18px 35px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        FadaqData
    </div>

    <div class="title">
        📜 Transaction History
    </div>

    <div id="historyContainer">

    </div>

</div>

<div class="bottom-nav">

    <a href="dashboard.html"
        class="nav-btn">
        🏠 Home
    </a>

    <a href="profile.html"
        class="nav-btn">
        👤 Profile
    </a>

</div>

<script>

/* LOGIN CHECK */
const loggedInUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!loggedInUser){
    window.location.href = "login.html";
}

/* USERS */
let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND USER */
let userIndex = users.findIndex(
    user => user.email === loggedInUser.email
);

if(userIndex === -1){
    window.location.href = "login.html";
}

let currentUser = users[userIndex];

/* TRANSACTIONS */
const historyContainer =
document.getElementById("historyContainer");

if(
    !currentUser.transactions ||
    currentUser.transactions.length === 0
){

    historyContainer.innerHTML =

    '<div class="empty">No Transactions Yet</div>';

}else{

    currentUser.transactions.forEach(
    (trx,index)=>{

        historyContainer.innerHTML += `

        <div class="card"
            onclick="openReceipt(${index})">

            <div class="type">
                ${trx.type}
            </div>

            <div class="amount">
                ₦${trx.amount}
            </div>

            <div class="date">
                ${trx.date}
            </div>

        </div>

        `;

    });

}

/* OPEN RECEIPT */
function openReceipt(index){

    localStorage.setItem(
        "receipt",
        JSON.stringify(
            currentUser.transactions[index]
        )
    );

    window.location.href =
    "receipt.html";
}

</script>

</body>
</html>

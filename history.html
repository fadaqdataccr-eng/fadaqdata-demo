<!DOCTYPE html>
<html>
<head>

<title>History</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#5b0000;
padding:20px;
color:white;

}

.title{

text-align:center;
font-size:35px;
font-weight:bold;
margin-top:20px;
margin-bottom:30px;

}

.historyCard{

background:#7a0000;
padding:22px;
border-radius:20px;
margin-bottom:20px;

box-shadow:
0 0 20px rgba(0,0,0,0.25);

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.network{

font-size:25px;
font-weight:bold;

}

.amount{

font-size:30px;
font-weight:bold;

}

.line{

margin-top:10px;
opacity:0.9;
font-size:16px;

}

button{

width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:18px;
font-weight:bold;
color:#7a0000;
margin-top:20px;

}

.empty{

text-align:center;
margin-top:100px;
opacity:0.7;
font-size:20px;

}

</style>

</head>

<body>

<div class="title">
Transaction History
</div>

<div id="history"></div>

<button
onclick="window.location.href='dashboard.html'">

Back To Dashboard

</button>

<script>

let history =
JSON.parse(localStorage.getItem("transactions")) || [];

let container =
document.getElementById("history");

if(history.length === 0){

container.innerHTML =

`<div class="empty">
No Transactions Yet
</div>`;

}

else{

history.reverse().forEach((item,index)=>{

container.innerHTML += `

<div class="historyCard"

onclick="viewReceipt(${index})">

<div class="top">

<div class="network">
${item.network}
</div>

<div class="amount">
₦${item.amount}
</div>

</div>

<div class="line">
📱 ${item.phone}
</div>

<div class="line">
📦 ${item.plan}
</div>

<div class="line">
🕒 ${item.date}
</div>

</div>

`;

});

}

function viewReceipt(index){

localStorage.setItem(
"receipt",
JSON.stringify(history[index])
);

window.location.href =
"receipt.html";

}

</script>

</body>
</html>

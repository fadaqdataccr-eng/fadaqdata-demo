<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadaqData Profile</title>

<style>

body{
margin:0;
padding:0;
background:#8b0000;
font-family:Arial, sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:100px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#b30000;
padding:30px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.profile-icon{
width:150px;
height:150px;
background:gold;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
margin:auto;
margin-bottom:20px;
}

.center{
text-align:center;
}

.name{
font-size:50px;
font-weight:bold;
margin-bottom:10px;
}

.email{
font-size:22px;
opacity:0.9;
margin-bottom:25px;
word-break:break-word;
}

.info-box{
background:#a00000;
padding:20px;
border-radius:18px;
margin-top:15px;
font-size:28px;
}

button{
width:100%;
padding:22px;
border:none;
border-radius:18px;
font-size:32px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.yellow{
background:gold;
color:black;
}

.red{
background:red;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#8b0000;
padding:10px;
gap:10px;
box-sizing:border-box;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:gold;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="profile-icon">
👤
</div>

<div class="center">

<div class="name" id="customerName">
User
</div>

<div class="email" id="customerEmail">
example@gmail.com
</div>

</div>

<div class="info-box">
💰 Wallet Balance:
₦<span id="walletBalance">0.00</span>
</div>

<div class="info-box">
🧾 Total Transactions:
<span id="totalTransactions">0</span>
</div>

<button class="yellow"
onclick="window.location.href='dashboard.html'">
🏠 Back To Dashboard
</button>

<button class="red" onclick="logout()">
Logout
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn">
👤 Profile
</button>

</div>

<script>

let email = localStorage.getItem("userEmail");

if(email === null || email === ""){
email = "customer@gmail.com";
}

document.getElementById("customerEmail").innerHTML = email;

let username = email.split("@")[0];

document.getElementById("customerName").innerHTML = username;

let wallet =
localStorage.getItem("walletBalance");

if(wallet === null){
wallet = 0;
}

document.getElementById("walletBalance").innerHTML = wallet;

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

document.getElementById("totalTransactions").innerHTML =
transactions.length;

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "index.html";

}

</script>

</body>
</html>

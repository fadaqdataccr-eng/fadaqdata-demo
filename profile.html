<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:40px;
}

.card{
background:red;
padding:30px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
text-align:center;
}

.avatar{
font-size:100px;
margin-bottom:15px;
}

.name{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.email{
font-size:18px;
margin-bottom:25px;
word-break:break-word;
}

.balance-box{
background:#cc0000;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

.balance-title{
font-size:22px;
margin-bottom:10px;
}

.balance{
font-size:60px;
font-weight:bold;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:22px;
font-weight:bold;
text-decoration:none;
text-align:center;
box-sizing:border-box;
margin-top:18px;
cursor:pointer;
}

.logout-btn{
background:black;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="avatar">
👤
</div>

<div
class="name"
id="userName"
>
User Name
</div>

<div
class="email"
id="userEmail"
>
user@email.com
</div>

<div class="balance-box">

<div class="balance-title">
Wallet Balance 👁️
</div>

<div
class="balance"
id="walletBalance"
>
₦0
</div>

</div>

<a
href="history.html"
class="btn"
>
📜 Transaction History
</a>

<a
href="fund-wallet.html"
class="btn"
>
💳 Fund Wallet
</a>

<button
class="btn logout-btn"
onclick="logout()"
>
🚪 Logout
</button>

</div>

</div>

<div class="bottom-nav">

<a
href="dashboard.html"
class="nav-btn"
>
🏠 Home
</a>

<a
href="profile.html"
class="nav-btn"
>
👤 Profile
</a>

</div>

<script>

// LOGIN CHECK
const user =
JSON.parse(
localStorage.getItem("loggedInUser")
);

if(!user){

window.location.href =
"login.html";

}

// USER INFO
document.getElementById(
"userName"
).innerText =
user.name;

document.getElementById(
"userEmail"
).innerText =
user.email;

// WALLET BALANCE
let balance =
localStorage.getItem("walletBalance");

if(balance === null){

balance = 100;

localStorage.setItem(
"walletBalance",
100
);

}

document.getElementById(
"walletBalance"
).innerText =
"₦" + Number(balance).toLocaleString();

// LOGOUT
function logout(){

localStorage.removeItem(
"loggedInUser"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.profile-icon{
width:140px;
height:140px;
background:white;
color:#8B0000;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
margin:auto;
margin-bottom:20px;
}

.name{
font-size:35px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.email{
font-size:20px;
text-align:center;
margin-bottom:30px;
word-break:break-word;
}

.info-box{
background:#a00000;
padding:20px;
border-radius:18px;
margin-bottom:20px;
font-size:22px;
font-weight:bold;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.white{
background:white;
color:#8B0000;
}

.red{
background:red;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="profile-icon">
👤
</div>

<div class="name"
id="fullname">
User
</div>

<div class="email"
id="email">
user@email.com
</div>

<div class="info-box">
💰 Wallet Balance:
<span id="walletBalance">
₦0.00
</span>
</div>

<div class="info-box">
🧾 Total Transactions:
<span id="transactionCount">
0
</span>
</div>

<button class="white"
onclick="window.location.href='dashboard.html'">
🏠 Dashboard
</button>

<button class="red"
onclick="logout()">
Logout
</button>

</div>

</div>

<div class="bottom-nav">

<button class="white nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="white nav-btn">
👤 Profile
</button>

</div>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){

window.location.href = "login.html";

}

let fullname =
localStorage.getItem("userFullname");

let email =
localStorage.getItem("userEmail");

let wallet =
parseFloat(localStorage.getItem(
"walletBalance"
)) || 0;

let transactions =
JSON.parse(localStorage.getItem(
"transactions"
)) || [];

document.getElementById(
"fullname"
).innerHTML = fullname;

document.getElementById(
"email"
).innerHTML = email;

document.getElementById(
"walletBalance"
).innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById(
"transactionCount"
).innerHTML =
transactions.length;

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>

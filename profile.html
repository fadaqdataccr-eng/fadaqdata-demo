<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

body{
margin:0;
padding:0;
background:#990000;
font-family:Arial;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
text-align:center;
}

.logo{
font-size:70px;
font-weight:bold;
margin-top:40px;
}

.card{
background:#cc0000;
padding:25px;
border-radius:25px;
margin-top:30px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.avatar{
font-size:120px;
}

.name{
font-size:35px;
font-weight:bold;
margin-top:10px;
}

.email{
font-size:22px;
margin-top:10px;
}

.balance-box{
background:#bb0000;
padding:25px;
border-radius:20px;
margin-top:30px;
}

.balance{
font-size:60px;
font-weight:bold;
margin-top:20px;
}

.eye{
font-size:30px;
cursor:pointer;
}

.btn{
display:block;
width:100%;
padding:20px;
border:none;
border-radius:18px;
margin-top:25px;
font-size:25px;
font-weight:bold;
background:white;
color:#660000;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#990000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 35px;
border-radius:15px;
font-weight:bold;
color:#660000;
text-decoration:none;
font-size:25px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="avatar">
👤
</div>

<div class="name" id="username">
User
</div>

<div class="email" id="email">
email@gmail.com
</div>

<div class="balance-box">

<h2>
Wallet Balance
<span class="eye" onclick="toggleBalance()">
👁️
</span>
</h2>

<div class="balance" id="wallet">
₦0
</div>

</div>

<button
class="btn"
onclick="window.location.href='history.html'"
>
📜 Transaction History
</button>

<button
class="btn"
onclick="logoutUser()"
>
🚪 Logout
</button>

</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="nav-btn">
🏠 Home
</a>

<a href="profile.html" class="nav-btn">
👤 Profile
</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const user =
JSON.parse(localStorage.getItem("user"));

if(!user){

window.location.href = "login.html";

}

document.getElementById("username").innerHTML =
user.name || "User";

document.getElementById("email").innerHTML =
user.email || "";

let balanceVisible = true;

const walletEl =
document.getElementById("wallet");

async function loadWallet(){

const snap = await db
.collection("users")
.doc(user.uid)
.get();

if(snap.exists){

const data = snap.data();

walletEl.innerHTML =
"₦" + (data.wallet || 0);

}

}

loadWallet();

function toggleBalance(){

if(balanceVisible){

walletEl.innerHTML = "₦******";

balanceVisible = false;

}else{

loadWallet();

balanceVisible = true;

}

}

function logoutUser(){

localStorage.removeItem("user");

window.location.href =
"login.html";

}

</script>

</body>
</html>

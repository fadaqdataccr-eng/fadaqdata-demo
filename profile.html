<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding:40px 0 120px;
}

.logo{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:40px;
}

.profile-card{
    background:#e60000;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.avatar{
    font-size:100px;
    margin-bottom:15px;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.email{
    font-size:18px;
    margin-bottom:30px;
}

.balance-box{
    background:#d10000;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
}

.balance-title{
    font-size:20px;
    margin-bottom:20px;
}

.balance{
    font-size:60px;
    font-weight:bold;
}

.eye{
    cursor:pointer;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#6b0000;
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
}

.nav-btn{
    background:white;
    color:#6b0000;
    padding:18px 35px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        FadaqData
    </div>

    <div class="profile-card">

        <div class="avatar">
            👤
        </div>

        <div class="name" id="profileName">
            User Name
        </div>

        <div class="email" id="profileEmail">
            user@email.com
        </div>

        <div class="balance-box">

            <div class="balance-title">
                Wallet Balance
                <span class="eye"
                    onclick="toggleBalance()">
                    👁️
                </span>
            </div>

            <div class="balance"
                id="walletBalance">
                ₦0
            </div>

        </div>

        <button class="btn"
            onclick="window.location.href='history.html'">
            📜 Transaction History
        </button>

        <button class="btn"
            onclick="logout()">
            🚪 Logout
        </button>

    </div>

</div>

<div class="bottom-nav">

    <a href="dashboard.html"
        class="nav-btn">
        🏠 Home
    </a>

    <a href="profile.html"
        class="nav-btn">
        👤 Profile
    </a>

</div>

<script>

/* CHECK LOGIN */
const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
    window.location.href = "login.html";
}

/* GET USERS */
let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND CURRENT USER */
let userIndex = users.findIndex(
    user => user.email === currentUser.email
);

if(userIndex === -1){
    window.location.href = "login.html";
}

/* UPDATED USER */
let updatedUser = users[userIndex];

/* SHOW PROFILE */
document.getElementById("profileName").innerText =
updatedUser.name;

document.getElementById("profileEmail").innerText =
updatedUser.email;

/* BALANCE */
const balanceElement =
document.getElementById("walletBalance");

function updateBalance(){
    balanceElement.innerText =
    "₦" + (updatedUser.balance || 0);
}

updateBalance();

/* TOGGLE BALANCE */
let balanceVisible = true;

function toggleBalance(){

    balanceVisible = !balanceVisible;

    if(balanceVisible){
        balanceElement.innerText =
        "₦" + (updatedUser.balance || 0);
    }else{
        balanceElement.innerText =
        "₦******";
    }
}

/* LOGOUT */
function logout(){

    localStorage.removeItem("currentUser");

    window.location.href = "login.html";
}

/* AUTO REFRESH */
window.addEventListener("focus", () => {

    users =
    JSON.parse(localStorage.getItem("users")) || [];

    userIndex = users.findIndex(
        user => user.email === currentUser.email
    );

    updatedUser = users[userIndex];

    if(balanceVisible){
        updateBalance();
    }
});

</script>

</body>
</html>

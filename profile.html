<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.card{
background:red;
padding:25px;
border-radius:25px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
text-align:center;
}

.avatar{
font-size:100px;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.email{
font-size:20px;
margin-top:10px;
}

.balance{
background:#c40000;
padding:20px;
border-radius:20px;
margin-top:25px;
}

.balance h2{
margin:0;
font-size:22px;
}

.balance h1{
font-size:60px;
margin:15px 0;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:22px;
font-weight:bold;
color:#6b0000;
text-decoration:none;
text-align:center;
box-sizing:border-box;
margin-top:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#6b0000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">FadaqData</div>

<div class="card">

<div class="avatar">👤</div>

<div class="name" id="name">
User Name
</div>

<div class="email" id="email">
user@email.com
</div>

<div class="balance">

<h2>Wallet Balance 👁️</h2>

<h1 id="balance">
₦0
</h1>

</div>

<a href="history.html" class="btn">
📜 Transaction History
</a>

<button class="btn" onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="nav-btn">
🏠 Home
</a>

<a href="profile.html" class="nav-btn">
👤 Profile
</a>

</div>

<script>

const user =
JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){

window.location.href = "login.html";

}

document.getElementById("name").innerText =
user.name;

document.getElementById("email").innerText =
user.email;

let balance =
localStorage.getItem("walletBalance");

if(balance === null){

balance = 0;

localStorage.setItem(
"walletBalance",
0
);

}

document.getElementById("balance").innerText =
"₦" + Number(balance).toLocaleString();

function logout(){

localStorage.removeItem("loggedInUser");

window.location.href = "login.html";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
background:#7b0000;
font-family:Arial;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:30px;
}

.card{
background:#b31200;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.welcome{
font-size:25px;
font-weight:bold;
line-height:45px;
}

.stats{
display:flex;
gap:15px;
margin-bottom:25px;
}

.stat-box{
flex:1;
background:#b31200;
padding:20px;
border-radius:25px;
text-align:center;
}

.stat-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.stat-value{
font-size:55px;
font-weight:bold;
word-break:break-word;
}

.balance-title{
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.balance{
font-size:50px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
word-break:break-word;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.yellow{
background:gold;
color:black;
}

.red{
background:red;
color:white;
}

.service-title{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
margin-bottom:25px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#7b0000;
box-sizing:border-box;
}

.nav-btn{
flex:1;
}

.container{
padding-bottom:120px;
}

.transaction{
font-size:18px;
margin-top:10px;
word-break:break-word;
}

@media(max-width:600px){

.logo{
font-size:42px;
}

.balance{
font-size:42px;
}

.stat-value{
font-size:42px;
}

button{
font-size:18px;
padding:16px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">
<div class="welcome" id="welcomeText">
Welcome,<br>User
</div>
</div>

<div class="stats">

<div class="stat-box">
<div class="stat-title">
Total Funding
</div>

<div class="stat-value">
₦<span id="totalFunding">0</span>
</div>
</div>

<div class="stat-box">
<div class="stat-title">
Transactions
</div>

<div class="stat-value" id="transactionCount">
0
</div>
</div>

</div>

<div class="card">

<div class="balance-title">
Wallet Balance
</div>

<div class="balance">
₦<span id="walletBalance">0.00</span>
</div>

<button class="yellow" onclick="fundWallet()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="yellow"
onclick="window.location.href='buydata.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="yellow">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div id="transactionList">
• No transaction yet
</div>

</div>

<button class="red" onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<button class="yellow nav-btn">
🏠 Home
</button>

<button class="yellow nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

let email =
localStorage.getItem("userEmail");

if(email === null || email === ""){
email = "User";
}

document.getElementById("welcomeText").innerHTML =
"Welcome,<br>" + email;

let balance =
parseFloat(localStorage.getItem("walletBalance")) || 0;

document.getElementById("walletBalance").innerHTML =
balance.toFixed(2);

document.getElementById("totalFunding").innerHTML =
balance;

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

document.getElementById("transactionCount").innerHTML =
transactions.length;

if(transactions.length > 0){

let html = "";

transactions.forEach(item => {

html += "<div class='transaction'>• " + item + "</div>";

});

document.getElementById("transactionList").innerHTML =
html;

}

function fundWallet(){

let amount =
prompt("Enter amount to fund");

if(amount === null || amount === ""){
return;
}

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){
alert("Enter valid amount");
return;
}

window.location.href =
"fundwallet.html?amount=" + amount;

}

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "index.html";

}

</script>

</body>
</html>

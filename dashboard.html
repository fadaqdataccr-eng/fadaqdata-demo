<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#4b0000;
color:white;
padding-bottom:120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:20px;
margin-bottom:30px;
}

.card{
background:#8b1300;
padding:25px;
border-radius:25px;
margin-top:25px;
}

.top-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.small-card{
background:#8b1300;
padding:20px;
border-radius:20px;
text-align:center;
}

.small-card h2{
margin:0;
font-size:22px;
}

.small-card h1{
font-size:60px;
margin-top:20px;
}

.balance-title{
font-size:28px;
font-weight:bold;
margin-top:30px;
}

.balance{
font-size:75px;
font-weight:bold;
text-align:center;
margin-top:25px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
margin-top:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.yellow-btn{
background:gold;
color:black;
}

.red-btn{
background:red;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#4b0000;
display:flex;
padding:10px;
gap:10px;
}

.nav-btn{
flex:1;
background:gold;
color:black;
padding:18px;
text-align:center;
border-radius:18px;
font-size:24px;
font-weight:bold;
}

.history{
margin-top:30px;
font-size:22px;
}

</style>

</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">
<h1 id="welcome">
Welcome
</h1>
</div>

<div class="top-grid">

<div class="small-card">
<h2>Total Funding</h2>
<h1 id="funding">₦0</h1>
</div>

<div class="small-card">
<h2>Transactions</h2>
<h1 id="transactions">0</h1>
</div>

</div>

<div class="balance-title">
Wallet Balance
</div>

<div class="balance" id="balance">
₦0.00
</div>

<div class="card">

<h1>Fund Wallet</h1>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button
class="yellow-btn"
onclick="payNow()">

Proceed Payment

</button>

</div>

<div class="card">

<h1>Buy Data</h1>

<p>Purchase affordable data instantly</p>

<button class="yellow-btn">
Buy Now
</button>

</div>

<div class="card">

<h1>Airtime</h1>

<p>Recharge instantly</p>

<button class="yellow-btn">
Buy Now
</button>

</div>

<div class="card">

<h1>Transactions</h1>

<p>Recent activities</p>

<button class="yellow-btn">
View
</button>

</div>

<div class="card">

<button
class="red-btn"
onclick="logout()">

Logout

</button>

</div>

<div class="history">
• No transaction yet
</div>

<div class="bottom-nav">

<div class="nav-btn">
🏠 Home
</div>

<div class="nav-btn">
👤 Profile
</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

let walletBalance = 0;
let totalFunding = 0;
let totalTransactions = 0;

auth.onAuthStateChanged(function(user){

if(user){

document.getElementById("welcome").innerHTML =
"Welcome, " + user.email;

}else{

window.location.href = "login.html";

}

});

function payNow(){

let amount =
document.getElementById("amount").value;

if(amount === ""){

alert("Enter amount");

return;

}

let user = auth.currentUser;

if(!user){

alert("User not logged in");

return;

}

let handler = PaystackPop.setup({

key: 'pk_test_1b3f9a355adc3a08d52a861a5577200edad434b8',

email: user.email,

amount: amount * 100,

currency: 'NGN',

callback: function(response){

walletBalance += Number(amount);

totalFunding += Number(amount);

totalTransactions += 1;

document.getElementById("balance").innerHTML =
"₦" + walletBalance.toFixed(2);

document.getElementById("funding").innerHTML =
"₦" + totalFunding;

document.getElementById("transactions").innerHTML =
totalTransactions;

document.getElementById("amount").value = "";

alert("Payment Successful");

},

onClose: function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}

function logout(){

auth.signOut()

.then(function(){

window.location.href = "login.html";

});

}

</script>

</body>
</html>

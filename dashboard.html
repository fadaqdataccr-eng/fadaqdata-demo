<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:60px;
font-weight:bold;
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.welcome{
font-size:28px;
font-weight:bold;
line-height:1.5;
}

.stats{
display:flex;
gap:15px;
}

.stat-box{
flex:1;
background:#c00000;
padding:20px;
border-radius:25px;
text-align:center;
}

.stat-title{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.stat-value{
font-size:40px;
font-weight:bold;
}

.wallet-title{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.balance{
font-size:80px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
word-break:break-word;
}

.yellow{
width:100%;
padding:22px;
border:none;
border-radius:20px;
background:#f1f1f1;
font-size:24px;
font-weight:bold;
color:#7a0000;
cursor:pointer;
}

.service-title{
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.service-text{
font-size:18px;
margin-bottom:25px;
}

.red{
width:100%;
padding:22px;
border:none;
border-radius:20px;
background:red;
color:white;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
}

.transaction-item{
font-size:16px;
margin-bottom:15px;
line-height:1.5;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:10px;
}

.eye{
cursor:pointer;
font-size:30px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">
<div class="welcome" id="welcomeText">
Welcome,<br>User
</div>
</div>

<div class="stats">

<div class="stat-box">
<div class="stat-title">
Total Funding
</div>

<div class="stat-value" id="totalFunding">
₦0.00
</div>
</div>

<div class="stat-box">
<div class="stat-title">
Transactions
</div>

<div class="stat-value" id="totalTransactions">
0
</div>
</div>

</div>

<div class="card">

<div class="wallet-title">
Wallet Balance
<span class="eye" onclick="toggleBalance()" id="eyeBtn">👁️</span>
</div>

<div class="balance" id="walletBalance">
₦0.00
</div>

<button class="yellow" onclick="fundWallet()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="yellow" onclick="buyData()">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="yellow" onclick="buyAirtime()">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div id="transactionHistory">
No transaction yet
</div>

</div>

<button class="red" onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<button class="yellow nav-btn">
🏠 Home
</button>

<button class="yellow nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

let email = localStorage.getItem("userEmail");

if(email === null || email === ""){
email = "User";
}

document.getElementById("welcomeText").innerHTML =
"Welcome,<br>" + email;

let wallet =
parseFloat(localStorage.getItem("walletBalance")) || 0;

let totalFunding =
parseFloat(localStorage.getItem("totalFunding")) || 0;

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

let hidden = false;

updateDashboard();

function updateDashboard(){

document.getElementById("walletBalance").innerHTML =
hidden ? "******" : "₦" + wallet.toFixed(2);

document.getElementById("totalFunding").innerHTML =
"₦" + totalFunding.toFixed(2);

document.getElementById("totalTransactions").innerHTML =
transactions.length;

localStorage.setItem("walletBalance",wallet);
localStorage.setItem("totalFunding",totalFunding);
localStorage.setItem("transactions",
JSON.stringify(transactions));

showTransactions();

}

function toggleBalance(){

hidden = !hidden;

document.getElementById("eyeBtn").innerHTML =
hidden ? "🙈" : "👁️";

updateDashboard();

}

function fundWallet(){

let amount =
prompt("Enter amount to fund");

if(amount === null || amount === ""){
return;
}

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){
alert("Invalid amount");
return;
}

wallet += amount;
totalFunding += amount;

let date =
new Date().toLocaleString();

transactions.unshift(
"💳 Wallet funded with ₦" +
amount +
" <br><small>" +
date +
"</small>"
);

updateDashboard();

alert("Wallet funded successfully");

}

function buyData(){

let number =
prompt("Enter phone number");

if(number === null || number === ""){
return;
}

let amount =
prompt("Enter data amount");

if(amount === null || amount === ""){
return;
}

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){
alert("Invalid amount");
return;
}

if(wallet < amount){
alert("Insufficient balance");
return;
}

wallet -= amount;

let date =
new Date().toLocaleString();

transactions.unshift(
"📶 Bought data for " +
number +
" - ₦" +
amount +
"<br><small>" +
date +
"</small>"
);

updateDashboard();

alert("Data purchase successful");

}

function buyAirtime(){

let number =
prompt("Enter phone number");

if(number === null || number === ""){
return;
}

let amount =
prompt("Enter airtime amount");

if(amount === null || amount === ""){
return;
}

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){
alert("Invalid amount");
return;
}

if(wallet < amount){
alert("Insufficient balance");
return;
}

wallet -= amount;

let date =
new Date().toLocaleString();

transactions.unshift(
"📞 Airtime purchased for " +
number +
" - ₦" +
amount +
"<br><small>" +
date +
"</small>"
);

updateDashboard();

alert("Airtime purchase successful");

}

function showTransactions(){

let history =
document.getElementById("transactionHistory");

if(transactions.length === 0){

history.innerHTML =
"No transaction yet";

return;

}

history.innerHTML = "";

transactions.forEach(function(item){

history.innerHTML +=
'<div class="transaction-item">• ' +
item +
'</div>';

});

}

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "index.html";

}

</script>

</body>
</html>

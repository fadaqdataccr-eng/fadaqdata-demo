<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>
body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding:40px 0 120px;
}

.logo{
    font-size:55px;
    font-weight:bold;
    text-align:center;
    margin-bottom:40px;
}

.card{
    background:#e60000;
    padding:25px;
    border-radius:25px;
    margin-bottom:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.welcome{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.balance-box{
    background:#d10000;
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.balance-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.balance{
    font-size:60px;
    font-weight:bold;
    margin-bottom:30px;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#6b0000;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.service-card{
    background:#e60000;
    padding:30px;
    border-radius:25px;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.service-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

.service-desc{
    font-size:18px;
    margin-bottom:25px;
}

.bottom-nav{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
}

.nav-btn{
    background:white;
    color:#6b0000;
    padding:18px 35px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

.eye{
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">FadaqData</div>

    <div class="card">

        <div class="welcome" id="userName">
            Welcome
        </div>

        <div class="balance-box">

            <div class="balance-title">
                Wallet Balance
                <span class="eye" onclick="toggleBalance()">👁️</span>
            </div>

            <div class="balance" id="walletBalance">
                ₦0
            </div>

            <button class="btn"
                onclick="window.location.href='fund-wallet.html'">
                💳 Fund Wallet
            </button>

        </div>
    </div>

    <div class="service-card">

        <div class="service-title">
            📶 Buy Data
        </div>

        <div class="service-desc">
            Purchase affordable data bundles instantly
        </div>

        <button class="btn"
            onclick="window.location.href='buy-data.html'">
            Buy Now
        </button>

    </div>

    <div class="service-card">

        <div class="service-title">
            📞 Buy Airtime
        </div>

        <div class="service-desc">
            Recharge airtime instantly
        </div>

        <button class="btn"
            onclick="window.location.href='buy-airtime.html'">
            Buy Airtime
        </button>

    </div>

</div>

<div class="bottom-nav">

    <a href="dashboard.html" class="nav-btn">
        🏠 Home
    </a>

    <a href="profile.html" class="nav-btn">
        👤 Profile
    </a>

</div>

<script>

/* CHECK LOGIN */
const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
    window.location.href = "login.html";
}

/* GET USERS */
let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND USER */
let userIndex = users.findIndex(
    user => user.email === currentUser.email
);

if(userIndex === -1){
    window.location.href = "login.html";
}

/* USER DATA */
let updatedUser = users[userIndex];

/* SHOW NAME */
document.getElementById("userName").innerText =
"Welcome, " + updatedUser.name;

/* SHOW BALANCE */
const balanceElement =
document.getElementById("walletBalance");

function updateBalance(){
    balanceElement.innerText =
    "₦" + (updatedUser.balance || 0);
}

updateBalance();

/* TOGGLE BALANCE */
let balanceVisible = true;

function toggleBalance(){

    balanceVisible = !balanceVisible;

    if(balanceVisible){
        balanceElement.innerText =
        "₦" + (updatedUser.balance || 0);
    }else{
        balanceElement.innerText = "₦******";
    }
}

/* AUTO REFRESH BALANCE */
window.addEventListener("focus", () => {

    users =
    JSON.parse(localStorage.getItem("users")) || [];

    userIndex = users.findIndex(
        user => user.email === currentUser.email
    );

    updatedUser = users[userIndex];

    if(balanceVisible){
        updateBalance();
    }
});

</script>

</body>
</html>

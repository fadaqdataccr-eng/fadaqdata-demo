<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
background:#2b160d;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.card{
background:#3b2013;
padding:15px;
border-radius:10px;
margin:15px 0;
}

h1{
text-align:center;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
</style>

<script>

let balance=0;

function updateBalance(){
document.getElementById("balance").innerHTML="₦"+balance+".00";
}

function fundWallet(){
balance +=1000;
updateBalance();
alert("₦1000 added successfully");
}

function buyData(){
if(balance>=500){
balance -=500;
updateBalance();
alert("1GB purchased successfully");
}else{
alert("Insufficient balance");
}
}

function buyAirtime(){
if(balance>=100){
balance -=100;
updateBalance();
alert("₦100 airtime purchased");
}else{
alert("Insufficient balance");
}
}

function viewHistory(){
alert(
"Transaction History:\n\n"+
"Wallet funded\n"+
"Data purchased\n"+
"Airtime purchased"
);
}

</script>

</head>

<body>

<h1>FadaqData Dashboard</h1>

<div class="card">
<h3>Wallet Balance</h3>
<p id="balance">₦0.00</p>
<button onclick="fundWallet()">Fund Wallet</button>
</div>

<div class="card">
<h3>Buy Data</h3>
<button onclick="buyData()">Purchase Data</button>
</div>

<div class="card">
<h3>Airtime</h3>
<button onclick="buyAirtime()">Buy Airtime</button>
</div>

<div class="card">
<h3>Transaction History</h3>
<button onclick="viewHistory()">View History</button>
</div>

</body>
</html>

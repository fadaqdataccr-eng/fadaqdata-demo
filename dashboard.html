<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#4b0000;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:20px;
}

.card{
background:#8b1300;
padding:25px;
border-radius:20px;
margin-top:25px;
}

.balance{
font-size:70px;
font-weight:bold;
text-align:center;
margin-top:20px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
margin-top:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.paybtn{
background:gold;
color:black;
}

.logoutbtn{
background:red;
color:white;
}

</style>

</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">
<h1 id="welcome">
Welcome
</h1>
</div>

<h1>Wallet Balance</h1>

<div class="balance">
₦0.00
</div>

<div class="card">

<h1>Fund Wallet</h1>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button
class="paybtn"
onclick="payNow()">

Proceed Payment

</button>

</div>

<div class="card">

<button
class="logoutbtn"
onclick="logout()">

Logout

</button>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

auth.onAuthStateChanged(function(user){

if(user){

document.getElementById("welcome").innerHTML =
"Welcome, " + user.email;

}else{

window.location.href = "login.html";

}

});

function payNow(){

let amount =
document.getElementById("amount").value;

if(amount == ""){

alert("Enter amount");

return;

}

let user = auth.currentUser;

if(!user){

alert("User not logged in");

return;

}

let handler = PaystackPop.setup({

key: 'pk_test_1b3f9a355adc3a08d52a861a5577200edad434b8',

email: user.email,

amount: amount * 100,

currency: 'NGN',

callback: function(response){

alert("Payment Successful");

},

onClose: function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}

function logout(){

auth.signOut()

.then(function(){

window.location.href = "login.html";

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

.card{
background:#7a0000;
padding:20px;
border-radius:20px;
margin-top:40px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

.balance{
font-size:50px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2 style="text-align:center;">
Wallet Balance
</h2>

<div class="balance">
₦100
</div>

<button onclick="window.location.href='buy-data.html'">
Buy Data
</button>

<button onclick="window.location.href='history.html'">
Transaction History
</button>

<button onclick="logout()">
Logout
</button>

</div>

<script>

if(localStorage.getItem("loggedIn") !== "true"){

window.location.href = "login.html";

}

function logout(){

localStorage.removeItem("loggedIn");

window.location.href = "login.html";

}

</script>

</body>

</html>

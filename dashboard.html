<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:40px;
}

.card{
background:red;
padding:25px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
margin-bottom:25px;
}

.balance-card{
background:#cc0000;
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.balance-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.balance{
font-size:65px;
font-weight:bold;
margin-bottom:20px;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:22px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center;
box-sizing:border-box;
margin-top:15px;
}

.card-title{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.card-text{
font-size:18px;
line-height:1.5;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<!-- WELCOME CARD -->

<div class="card">

<h1 id="welcomeText">
Welcome
</h1>

<div class="balance-card">

<div class="balance-title">
Wallet Balance 👁️
</div>

<div class="balance" id="walletBalance">
₦0
</div>

<a href="fund-wallet.html" class="btn">
💳 Fund Wallet
</a>

</div>

</div>

<!-- BUY DATA -->

<div class="card">

<div class="card-title">
📶 Buy Data
</div>

<div class="card-text">
Purchase affordable data bundles instantly
</div>

<a href="buy-data.html" class="btn">
Buy Data
</a>

</div>

<!-- BUY AIRTIME -->

<div class="card">

<div class="card-title">
📞 Buy Airtime
</div>

<div class="card-text">
Recharge airtime instantly
</div>

<a href="buy-airtime.html" class="btn">
Buy Airtime
</a>

</div>

<!-- TRANSACTION HISTORY -->

<div class="card">

<div class="card-title">
📜 Transaction History
</div>

<div class="card-text">
View all your recent transactions
</div>

<a href="history.html" class="btn">
View History
</a>

</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<a href="dashboard.html" class="nav-btn">
🏠 Home
</a>

<a href="profile.html" class="nav-btn">
👤 Profile
</a>

</div>

<script>

// LOGIN CHECK
const user =
JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){

window.location.href = "login.html";

}

// SHOW USER NAME
document.getElementById("welcomeText").innerText =
"Welcome, " + user.name;

// WALLET BALANCE
let balance =
localStorage.getItem("walletBalance");

if(balance === null){

balance = 0;

localStorage.setItem(
"walletBalance",
0
);

}

document.getElementById("walletBalance").innerText =
"₦" + Number(balance).toLocaleString();

</script>

</body>
</html>

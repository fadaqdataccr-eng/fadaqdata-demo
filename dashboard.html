<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FadaqData Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#2b0000;
color:white;
padding-bottom:100px;
}

.header{
text-align:center;
padding:30px 20px;
}

.header h1{
font-size:55px;
font-weight:bold;
}

.card-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#7a1600;
padding:25px;
border-radius:25px;
text-align:center;
}

.card h3{
margin-bottom:15px;
font-size:22px;
}

.card p{
font-size:40px;
font-weight:bold;
}

.wallet{
padding:20px;
}

.wallet h2{
margin-bottom:20px;
}

.balance{
font-size:70px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:gold;
font-size:30px;
font-weight:bold;
margin-bottom:25px;
cursor:pointer;
}

.section{
background:#7a1600;
margin:20px;
padding:30px;
border-radius:30px;
}

.section h2{
margin-bottom:15px;
}

.section p{
margin-bottom:25px;
font-size:22px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#2b0000;
padding:10px;
gap:10px;
}

.nav-btn{
flex:1;
padding:18px;
background:gold;
border:none;
border-radius:20px;
font-size:28px;
font-weight:bold;
}

.user-box{
background:#7a1600;
margin:20px;
padding:20px;
border-radius:20px;
font-size:22px;
}

.logout-btn{
background:red;
color:white;
}
</style>
</head>

<body>

<div class="header">
<h1>FadaqData</h1>
</div>

<div class="user-box">
<p id="welcome">Loading user...</p>
</div>

<div class="card-grid">

<div class="card">
<h3>Total Funding</h3>
<p>₦0</p>
</div>

<div class="card">
<h3>Transactions</h3>
<p>0</p>
</div>

</div>

<div class="wallet">

<h2>Wallet Balance</h2>

<div class="balance">
₦0.00
</div>

<button class="btn">
Fund Wallet
</button>

</div>

<div class="section">
<h2>Buy Data</h2>
<p>Purchase affordable data</p>
<button class="btn">Buy Now</button>
</div>

<div class="section">
<h2>Airtime</h2>
<p>Recharge instantly</p>
<button class="btn">Buy Now</button>
</div>

<div class="section">
<h2>Transactions</h2>
<p>Recent activities</p>
<button class="btn">View</button>
</div>

<div class="section">
<h2>Logout</h2>
<p>Sign out from account</p>
<button class="btn logout-btn" onclick="logout()">
Logout
</button>
</div>

<div class="bottom-nav">
<button class="nav-btn">🏠 Home</button>
<button class="nav-btn">👤 Profile</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",
authDomain: "fadaqdata-3bd14.firebaseapp.com",
projectId: "fadaqdata-3bd14",
storageBucket: "fadaqdata-3bd14.firebasestorage.app",
messagingSenderId: "609845657857",
appId: "1:609845657857:web:48817ce972c054e203db00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user)=>{

if(user){

document.getElementById("welcome").innerHTML =
"Welcome, " + user.email;

}else{

window.location.href = "login.html";

}

});

window.logout = function(){

signOut(auth)
.then(()=>{

alert("Logged out successfully");

window.location.href = "login.html";

});

}

</script>

</body>
</html>

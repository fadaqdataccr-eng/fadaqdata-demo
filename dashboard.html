<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadaqData Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#7a0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#a80000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.welcome{
font-size:28px;
font-weight:bold;
line-height:1.5;
}

.stats{
display:flex;
gap:15px;
margin-top:20px;
}

.stat-box{
flex:1;
background:#920000;
padding:20px;
border-radius:20px;
text-align:center;
}

.stat-title{
font-size:18px;
margin-bottom:10px;
font-weight:bold;
}

.stat-value{
font-size:40px;
font-weight:bold;
}

.wallet-title{
font-size:24px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.wallet-balance{
font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
word-break:break-word;
}

.eye{
cursor:pointer;
margin-left:10px;
font-size:22px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:active{
transform:scale(0.97);
}

.white{
background:white;
color:#7a0000;
}

.red{
background:#ff1a1a;
color:white;
}

.service-title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
opacity:0.9;
margin-bottom:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#7a0000;
box-sizing:border-box;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:20px;
font-weight:bold;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:white;
color:#7a0000;
padding:15px 25px;
border-radius:15px;
font-size:18px;
font-weight:bold;
display:none;
z-index:999;
}

.loader-box{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:70px;
height:70px;
border:8px solid white;
border-top:8px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loading-text{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:#a80000;
padding:25px;
border-radius:25px;
width:85%;
max-width:400px;
}

.modal-title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

.modal input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
box-sizing:border-box;
margin-bottom:20px;
}

.modal-buttons{
display:flex;
gap:10px;
}

.modal-buttons button{
flex:1;
}

.transaction-card{
background:#920000;
padding:18px;
border-radius:18px;
margin-top:15px;
}

.transaction-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.transaction-type{
font-size:18px;
font-weight:bold;
}

.transaction-status{
background:#00b300;
padding:6px 12px;
border-radius:20px;
font-size:14px;
font-weight:bold;
}

.transaction-amount{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.transaction-date{
font-size:14px;
opacity:0.8;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

</style>
</head>

<body>

<div class="toast" id="toast">
Success
</div>

<div class="loader-box" id="loaderBox">

<div class="loader"></div>

<div class="loading-text">
Processing...
</div>

</div>

<div class="modal" id="fundModal">

<div class="modal-content">

<div class="modal-title">
💳 Fund Wallet
</div>

<input
type="number"
id="fundAmount"
placeholder="Enter Amount">

<div class="modal-buttons">

<button class="red"
onclick="closeModal()">
Cancel
</button>

<button class="white"
onclick="processFunding()">
Continue
</button>

</div>

</div>

</div>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="welcome" id="welcomeText">
Welcome,<br>User
</div>

<div class="stats">

<div class="stat-box">
<div class="stat-title">
Total Funding
</div>

<div class="stat-value" id="totalFunding">
₦0.00
</div>
</div>

<div class="stat-box">
<div class="stat-title">
Transactions
</div>

<div class="stat-value" id="transactionCount">
0
</div>
</div>

</div>

</div>

<div class="card">

<div class="wallet-title">

Wallet Balance

<span class="eye"
id="eyeBtn"
onclick="toggleBalance()">
👁️
</span>

</div>

<div class="wallet-balance"
id="walletBalance">
₦0.00
</div>

<button class="white"
onclick="openModal()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="white"
onclick="window.location.href='buydata.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="white"
onclick="window.location.href='airtime.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div id="transactionList">
</div>

</div>

<button class="red"
onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<button class="nav-btn">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

let email =
localStorage.getItem("userEmail");

if(email === null || email === ""){
email = "User";
}

document.getElementById("welcomeText").innerHTML =
"Welcome,<br>" + email.split("@")[0];

let wallet =
parseFloat(localStorage.getItem("walletBalance")) || 0;

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

document.getElementById("walletBalance").innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById("totalFunding").innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById("transactionCount").innerHTML =
transactions.length;

function renderTransactions(){

let html = "";

if(transactions.length === 0){

html =
"<div class='transaction-card'>No transaction yet</div>";

}else{

transactions.reverse().forEach(function(item){

html += `

<div class="transaction-card">

<div class="transaction-top">

<div class="transaction-type">
💳 Wallet Funding
</div>

<div class="transaction-status">
Success
</div>

</div>

<div class="transaction-amount">
₦${item.amount}
</div>

<div class="transaction-date">
${item.date}
</div>

</div>

`;

});

}

document.getElementById("transactionList").innerHTML =
html;

}

renderTransactions();

let balanceVisible = true;

function toggleBalance(){

let eye =
document.getElementById("eyeBtn");

let balanceText =
document.getElementById("walletBalance");

if(balanceVisible){

balanceText.innerHTML = "******";
eye.innerHTML = "🙈";

balanceVisible = false;

}else{

balanceText.innerHTML =
"₦" + wallet.toFixed(2);

eye.innerHTML = "👁️";

balanceVisible = true;

}

}

function showToast(message){

let toast =
document.getElementById("toast");

toast.innerHTML = message;

toast.style.display = "block";

setTimeout(function(){

toast.style.display = "none";

},3000);

}

function showLoader(){

document.getElementById("loaderBox").style.display =
"flex";

}

function hideLoader(){

document.getElementById("loaderBox").style.display =
"none";

}

function openModal(){

document.getElementById("fundModal").style.display =
"flex";

}

function closeModal(){

document.getElementById("fundModal").style.display =
"none";

}

function processFunding(){

let amount =
document.getElementById("fundAmount").value;

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){

showToast("Enter valid amount");

return;

}

closeModal();

showLoader();

setTimeout(function(){

wallet += amount;

localStorage.setItem(
"walletBalance",
wallet
);

transactions.push({
amount: amount,
date: new Date().toLocaleString()
});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

hideLoader();

showToast("Wallet funded successfully");

setTimeout(function(){

location.reload();

},1500);

},2000);

}

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "index.html";

}

</script>

</body>
</html>

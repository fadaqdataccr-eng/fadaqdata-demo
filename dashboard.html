<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
background:#8B0000;
font-family:Arial;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#cc0000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.welcome{
font-size:28px;
font-weight:bold;
line-height:1.5;
}

.flex{
display:flex;
gap:15px;
margin-top:20px;
}

.small-card{
flex:1;
background:#b30000;
padding:20px;
border-radius:18px;
text-align:center;
}

.small-card h3{
margin:0;
font-size:18px;
}

.small-card p{
font-size:28px;
font-weight:bold;
margin-top:12px;
}

.wallet{
text-align:center;
}

.balance{
font-size:55px;
font-weight:bold;
margin:25px 0;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.white{
background:white;
color:#8B0000;
}

.red{
background:#ff1a1a;
color:white;
}

.service-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
margin-bottom:20px;
}

.bottom-nav{
display:flex;
gap:15px;
margin-top:25px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
background:white;
color:#8B0000;
}

.transaction-card{
background:#b30000;
padding:18px;
border-radius:15px;
margin-bottom:15px;
cursor:pointer;
}

.transaction-title{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.transaction-date{
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="welcome">
Welcome,<br>
<span id="welcomeName">User</span>
</div>

<div class="flex">

<div class="small-card">
<h3>Total Funding</h3>
<p id="fundingAmount">₦0.00</p>
</div>

<div class="small-card">
<h3>Transactions</h3>
<p id="transactionCount">0</p>
</div>

</div>

</div>

<div class="card wallet">

<h2>
Wallet Balance 👁️
</h2>

<div class="balance"
id="walletBalance">
₦0.00
</div>

<button class="btn white"
onclick="fundWallet()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="btn white"
onclick="window.location.href='buydata.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="btn white"
onclick="window.location.href='buyairtime.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div id="transactionList"></div>

</div>

<button class="btn red"
onclick="logout()">
Logout
</button>

<div class="bottom-nav">

<button class="nav-btn">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

let userName =
localStorage.getItem("userName")
|| "User";

document.getElementById(
"welcomeName"
).innerHTML = userName;

let wallet =
Number(localStorage.getItem(
"walletBalance"
)) || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById(
"fundingAmount"
).innerHTML =
"₦" + wallet.toFixed(2);

let transactions =
JSON.parse(localStorage.getItem(
"transactions"
)) || [];

document.getElementById(
"transactionCount"
).innerHTML =
transactions.length;

let transactionList =
document.getElementById(
"transactionList"
);

transactionList.innerHTML = "";

transactions.reverse().forEach(
function(item,index){

let text =
item.text || "Transaction";

let date =
item.date || "No Date";

let transactionCard =
document.createElement("div");

transactionCard.className =
"transaction-card";

transactionCard.innerHTML = `

<div class="transaction-title">
${text}
</div>

<div class="transaction-date">
${date}
</div>

`;

transactionCard.onclick =
function(){

localStorage.setItem(
"selectedTransaction",
JSON.stringify(item)
);

window.location.href =
"receipt.html";

};

transactionList.appendChild(
transactionCard
);

});

function fundWallet(){

let amount =
prompt("Enter amount");

if(amount === null || amount === ""){
return;
}

amount = Number(amount);

wallet += amount;

localStorage.setItem(
"walletBalance",
wallet
);

let transactions =
JSON.parse(localStorage.getItem(
"transactions"
)) || [];

transactions.push({

text:
"💳 Wallet funded with ₦" +
amount,

date:
new Date().toLocaleString(),

amount:amount,

type:"Wallet Funding",

status:"Successful",

id:
"FD" +
Math.floor(Math.random()*100000000)

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

alert("Wallet funded successfully");

location.reload();

}

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>

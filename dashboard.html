<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:25px;
padding-bottom:120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:30px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
}

.welcome{
font-size:28px;
font-weight:bold;
margin-bottom:25px;
line-height:1.5;
}

.stats{
display:flex;
gap:15px;
}

.stat-box{
flex:1;
background:#b00000;
padding:20px;
border-radius:18px;
text-align:center;
}

.stat-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.stat-value{
font-size:28px;
font-weight:bold;
}

.wallet-title{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.wallet-balance{
font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.eye{
cursor:pointer;
font-size:35px;
}

.btn{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.logout-btn{
background:#ff1a1a;
color:white;
}

.service-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
margin-bottom:25px;
}

.transaction-item{
background:#b00000;
padding:18px;
border-radius:18px;
margin-bottom:15px;
cursor:pointer;
}

.transaction-text{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.transaction-date{
font-size:15px;
opacity:0.9;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="welcome">

Welcome,<br>

<span id="username">
Loading...
</span>

</div>

<div class="stats">

<div class="stat-box">

<div class="stat-title">
Wallet Balance
</div>

<div class="stat-value"
id="walletTop">
₦0.00
</div>

</div>

<div class="stat-box">

<div class="stat-title">
Transactions
</div>

<div class="stat-value"
id="transactionCount">
0
</div>

</div>

</div>

</div>

<div class="card">

<div class="wallet-title">

Wallet Balance

<span class="eye"
id="eyeIcon"
onclick="toggleBalance()">
👁
</span>

</div>

<div class="wallet-balance"
id="walletAmount">
₦0.00
</div>

<button class="btn"
onclick="window.location.href='fundwallet.html'">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="btn"
onclick="window.location.href='buydata.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Buy Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="btn"
onclick="window.location.href='buyairtime.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div id="transactionList">
</div>

</div>

<button class="btn logout-btn"
onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<button class="nav-btn">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjT",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let walletVisible = true;

window.toggleBalance =
function(){

let walletText =
document.getElementById(
"walletAmount"
);

let eye =
document.getElementById(
"eyeIcon"
);

if(walletVisible){

walletText.innerHTML =
"******";

eye.innerHTML = "🙈";

walletVisible = false;

}

else{

walletText.innerHTML =
walletText.dataset.real;

eye.innerHTML = "👁";

walletVisible = true;

}

};

onAuthStateChanged(auth,
async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

document.getElementById(
"username"
).innerHTML =
data.name;

let wallet =
data.wallet || 0;

document.getElementById(
"walletAmount"
).innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById(
"walletAmount"
).dataset.real =
"₦" + wallet.toFixed(2);

document.getElementById(
"walletTop"
).innerHTML =
"₦" + wallet.toFixed(2);

let transactions =
data.transactions || [];

document.getElementById(
"transactionCount"
).innerHTML =
transactions.length;

let transactionList =
document.getElementById(
"transactionList"
);

if(transactions.length === 0){

transactionList.innerHTML =
"No transactions yet";

}

else{

transactions
.slice()
.reverse()
.forEach(function(transaction){

let div =
document.createElement("div");

div.className =
"transaction-item";

div.innerHTML =

'<div class="transaction-text">' +
(transaction.text || "Transaction") +
'</div>' +

'<div class="transaction-date">' +
(transaction.date || "") +
'</div>';

div.onclick = function(){

localStorage.setItem(
"selectedTransaction",
JSON.stringify(transaction)
);

window.location.href =
"receipt.html";

};

transactionList.appendChild(div);

});

}

}

});

window.logout =
async function(){

await signOut(auth);

window.location.href =
"login.html";

};

</script>

</body>
</html>

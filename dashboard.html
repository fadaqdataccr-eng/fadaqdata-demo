<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Dashboard</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#4b0000;
color:white;
padding-bottom:120px;
}

.header{
padding:30px 20px;
text-align:center;
font-size:50px;
font-weight:bold;
}

.container{
padding:15px;
}

.welcome{
background:#8b1300;
padding:25px;
border-radius:20px;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
word-break:break-word;
}

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
}

.stat-card{
flex:1;
background:#8b1300;
padding:25px 15px;
border-radius:20px;
text-align:center;
}

.stat-card h3{
font-size:20px;
margin-bottom:10px;
}

.stat-card p{
font-size:50px;
font-weight:bold;
}

.wallet{
background:#8b1300;
padding:25px;
border-radius:20px;
margin-bottom:20px;
text-align:center;
}

.wallet h2{
font-size:32px;
margin-bottom:20px;
}

.balance{
font-size:70px;
font-weight:bold;
margin-bottom:25px;
}

.input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
margin-top:20px;
margin-bottom:20px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.yellow{
background:gold;
color:black;
}

.red{
background:red;
color:white;
}

.card{
background:#8b1300;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.card h2{
font-size:30px;
margin-bottom:10px;
}

.card p{
font-size:18px;
margin-bottom:20px;
}

.transaction-box{
background:#8b1300;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#3a0000;
padding:15px;
display:flex;
gap:10px;
}

.nav-btn{
flex:1;
background:gold;
padding:15px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:black;
}

</style>

</head>

<body>

<div class="header">
FadaqData
</div>

<div class="container">

<div class="welcome" id="welcomeUser">
Welcome
</div>

<div class="stats">

<div class="stat-card">
<h3>Total Funding</h3>
<p id="totalFunding">₦0</p>
</div>

<div class="stat-card">
<h3>Transactions</h3>
<p id="transactions">0</p>
</div>

</div>

<div class="wallet">

<h2>Wallet Balance</h2>

<div class="balance" id="balance">
₦0.00
</div>

<button
class="btn yellow"
onclick="toggleFunding()">
Fund Wallet
</button>

<div id="fundSection" style="display:none;">

<input
type="number"
id="amount"
class="input"
placeholder="Enter Amount">

<button
class="btn yellow"
onclick="payWithPaystack()">
Proceed Payment
</button>

</div>

</div>

<div class="card">

<h2>Buy Data</h2>

<p>Purchase affordable data bundles instantly</p>

<button class="btn yellow">
Buy Now
</button>

</div>

<div class="card">

<h2>Airtime</h2>

<p>Recharge airtime instantly</p>

<button class="btn yellow">
Buy Now
</button>

</div>

<div class="transaction-box">

<h2>Transactions</h2>

<ul>
<li>No transaction yet</li>
</ul>

</div>

<button
class="btn red"
onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<div class="nav-btn">
🏠 Home
</div>

<div class="nav-btn">
👤 Profile
</div>

</div>

<script>

let email =
localStorage.getItem("userEmail");

if(!email){

email = "User";

}

document.getElementById("welcomeUser")
.innerHTML =
"Welcome,<br>" + email;

let balance =
Number(localStorage.getItem("walletBalance")) || 0;

document.getElementById("balance")
.innerHTML =
"₦" + balance.toFixed(2);

document.getElementById("totalFunding")
.innerHTML =
"₦" + balance;

function toggleFunding(){

let section =
document.getElementById("fundSection");

if(section.style.display === "none"){

section.style.display = "block";

}else{

section.style.display = "none";

}

}

function payWithPaystack(){

let amount =
document.getElementById("amount").value;

if(amount === ""){

alert("Enter Amount");

return;

}

let handler = PaystackPop.setup({

key: "pk_test_1b3f9a355adc3a08d52a861a5577200edad434b8",

email: email,

amount: amount * 100,

currency: "NGN",

callback: function(response){

let oldBalance =
Number(localStorage.getItem("walletBalance")) || 0;

let newBalance =
oldBalance + Number(amount);

localStorage.setItem(
"walletBalance",
newBalance
);

document.getElementById("balance")
.innerHTML =
"₦" + newBalance.toFixed(2);

document.getElementById("totalFunding")
.innerHTML =
"₦" + newBalance;

document.getElementById("transactions")
.innerHTML = "1";

document.getElementById("amount").value = "";

document.getElementById("fundSection").style.display = "none";

alert("Payment Successful");

},

onClose: function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "login.html";

}

</script>

</body>
</html>

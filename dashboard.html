<!DOCTYPE html>
<html>
<head>

<title>FadaqData</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>FadaqData</h1>

<div class="stats">

<div class="stat-box">
<h3>Total Funding</h3>
<p id="fundingStat">₦0</p>
</div>

<div class="stat-box">
<h3>Transactions</h3>
<p id="transactionStat">0</p>
</div>

</div>

<div class="card">

<h2>Wallet Balance</h2>

<h1 id="balance">₦0.00</h1>

<button onclick="openFunding()">
Fund Wallet
</button>

</div>

<div class="grid">

<div class="small-card">
<h3>Buy Data</h3>
<p>Purchase affordable data</p>

<button onclick="buyData()">
Buy Now
</button>
</div>

<div class="small-card">
<h3>Airtime</h3>
<p>Recharge instantly</p>

<button onclick="buyAirtime()">
Buy Now
</button>
</div>

<div class="small-card">
<h3>Profile</h3>
<p>Manage account</p>

<button onclick="showProfile()">
Open
</button>
</div>

<div class="small-card">
<h3>Transactions</h3>
<p>Recent activities</p>

<button onclick="scrollToHistory()">
View
</button>
</div>

</div>

<div class="card" id="historySection">

<h2>Transaction History</h2>

<div id="historyList">
<p>No transaction yet</p>
</div>

</div>

<div class="bottom-nav">

<div onclick="window.scrollTo(0,0)">
🏠 Home
</div>

<div onclick="showProfile()">
👤 Profile
</div>

</div>

<div class="popup" id="fundPopup">

<div class="popup-box">

<h2>Fund Wallet</h2>

<input
type="number"
id="fundAmount"
placeholder="Enter amount">

<button onclick="fundWallet()">
Add Money
</button>

<button
class="close-btn"
onclick="closeFunding()">
Close
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

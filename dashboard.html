<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadaqData Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#7a0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#a80000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.welcome{
font-size:28px;
font-weight:bold;
line-height:1.5;
}

.stats{
display:flex;
gap:15px;
margin-top:20px;
}

.stat-box{
flex:1;
background:#920000;
padding:20px;
border-radius:20px;
text-align:center;
}

.stat-title{
font-size:18px;
margin-bottom:10px;
font-weight:bold;
}

.stat-value{
font-size:40px;
font-weight:bold;
}

.wallet-title{
font-size:24px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.wallet-balance{
font-size:60px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
word-break:break-word;
}

.eye{
cursor:pointer;
margin-left:10px;
font-size:20px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.white{
background:white;
color:#7a0000;
}

.red{
background:#ff1a1a;
color:white;
}

.service-title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
opacity:0.9;
margin-bottom:20px;
}

.transaction-item{
font-size:17px;
margin-top:12px;
word-break:break-word;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
gap:10px;
padding:10px;
background:#7a0000;
box-sizing:border-box;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="welcome" id="welcomeText">
Welcome,<br>User
</div>

<div class="stats">

<div class="stat-box">
<div class="stat-title">
Total Funding
</div>

<div class="stat-value" id="totalFunding">
₦0
</div>
</div>

<div class="stat-box">
<div class="stat-title">
Transactions
</div>

<div class="stat-value" id="transactionCount">
0
</div>
</div>

</div>

</div>

<div class="card">

<div class="wallet-title">

Wallet Balance

<span class="eye" id="eyeBtn"
onclick="toggleBalance()">
👁️
</span>

</div>

<div class="wallet-balance" id="walletBalance">
₦0.00
</div>

<button class="white"
onclick="fundWallet()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="white"
onclick="window.location.href='buydata.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="white"
onclick="window.location.href='airtime.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div id="transactionList">
</div>

</div>

<button class="red"
onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<button class="nav-btn">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

let email =
localStorage.getItem("userEmail");

if(email === null || email === ""){
email = "User";
}

document.getElementById("welcomeText").innerHTML =
"Welcome,<br>" + email.split("@")[0];

let wallet =
parseFloat(localStorage.getItem("walletBalance")) || 0;

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

document.getElementById("walletBalance").innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById("totalFunding").innerHTML =
"₦" + wallet.toFixed(2);

document.getElementById("transactionCount").innerHTML =
transactions.length;

let transactionHTML = "";

if(transactions.length === 0){

transactionHTML =
"<div class='transaction-item'>• No transaction yet</div>";

}else{

transactions.reverse().forEach(function(item){

transactionHTML +=
"<div class='transaction-item'>• " + item + "</div>";

});

}

document.getElementById("transactionList").innerHTML =
transactionHTML;

let balanceVisible = true;

function toggleBalance(){

let eye =
document.getElementById("eyeBtn");

let balanceText =
document.getElementById("walletBalance");

if(balanceVisible){

balanceText.innerHTML = "******";
eye.innerHTML = "🙈";

balanceVisible = false;

}else{

balanceText.innerHTML =
"₦" + wallet.toFixed(2);

eye.innerHTML = "👁️";

balanceVisible = true;

}

}

function fundWallet(){

let amount =
prompt("Enter amount to fund");

if(amount === null || amount === ""){
return;
}

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){

alert("Enter valid amount");

return;

}

wallet += amount;

localStorage.setItem(
"walletBalance",
wallet
);

transactions.push(
"Wallet funded successfully with ₦" + amount
);

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

alert("Wallet funded successfully");

location.reload();

}

function logout(){

localStorage.removeItem("userEmail");

window.location.href = "index.html";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.card{
background:red;
padding:25px;
border-radius:25px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
margin-bottom:30px;
}

.balance-card{
background:#c40000;
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.balance-card h2{
font-size:22px;
margin:0;
}

.balance-card h1{
font-size:70px;
margin:15px 0;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:22px;
font-weight:bold;
color:#6b0000;
text-decoration:none;
text-align:center;
box-sizing:border-box;
margin-top:20px;
}

.desc{
font-size:18px;
margin-top:10px;
line-height:1.5;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#6b0000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">FadaqData</div>

<div class="card">

<h1 id="welcomeText">Welcome</h1>

<div class="balance-card">

<h2>Wallet Balance 👁️</h2>

<h1 id="balance">₦0</h1>

<a href="fund-wallet.html" class="btn">
💳 Fund Wallet
</a>

</div>

</div>

<div class="card">

<h1>📶 Buy Data</h1>

<p class="desc">
Purchase affordable data bundles instantly
</p>

<a href="buy-data.html" class="btn">
Buy Now
</a>

</div>

<div class="card">

<h1>📞 Buy Airtime</h1>

<p class="desc">
Recharge airtime instantly
</p>

<a href="buy-airtime.html" class="btn">
Buy Airtime
</a>

</div>

<div class="card">

<h1>📜 Transaction History</h1>

<p class="desc">
View all your recent transactions
</p>

<a href="history.html" class="btn">
View History
</a>

</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="nav-btn">
🏠 Home
</a>

<a href="profile.html" class="nav-btn">
👤 Profile
</a>

</div>

<script>

const user =
JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){

window.location.href = "login.html";

}

document.getElementById("welcomeText").innerText =
"Welcome, " + user.name;

let balance =
localStorage.getItem("walletBalance");

if(balance === null){

balance = 0;

localStorage.setItem(
"walletBalance",
0
);

}

document.getElementById("balance").innerText =
"₦" + Number(balance).toLocaleString();

</script>

</body>
</html>

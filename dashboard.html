<!DOCTYPE html>
<html>
<head>
  <title>FadaqData</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1>FadaqData</h1>

  <div class="stats">

    <div class="stat-box">
      <h3>Total Funding</h3>
      <p id="fundingStat">₦0</p>
    </div>

    <div class="stat-box">
      <h3>Transactions</h3>
      <p id="transactionStat">0</p>
    </div>

  </div>

  <div class="wallet-card">
    <h2>Wallet Balance</h2>

    <h1 id="balance">₦0.00</h1>

    <button onclick="fundWallet()">
      Fund Wallet
    </button>
  </div>

  <div class="cards">

    <div class="card">
      <h3>Buy Data</h3>
      <p>Purchase affordable data</p>

      <button onclick="buyData()">
        Buy Now
      </button>
    </div>

    <div class="card">
      <h3>Airtime</h3>
      <p>Recharge instantly</p>

      <button onclick="buyAirtime()">
        Buy Now
      </button>
    </div>

    <div class="card">
      <h3>Profile</h3>
      <p>Manage account</p>

      <button onclick="showProfile()">
        Open
      </button>
    </div>

    <div class="card">
      <h3>Transactions</h3>
      <p>Recent activities</p>

      <button onclick="scrollToHistory()">
        View
      </button>
    </div>

  </div>

  <div class="history" id="historySection">

    <h2>Transaction History</h2>

    <ul id="historyList">
      <li>No transaction yet</li>
    </ul>

  </div>

  <div class="bottom-nav">

    <button>
      🏠 Home
    </button>

    <button onclick="showProfile()">
      👤 Profile
    </button>

  </div>

  <script>

    let balance = 0;

    let totalFunding = 0;

    let totalTransactions = 0;

    const historyList =
      document.getElementById("historyList");

    function updateBalance(){

      document.getElementById("balance")
      .innerText =
      "₦" + balance.toFixed(2);

    }

    function updateStats(){

      document.getElementById("fundingStat")
      .innerText =
      "₦" + totalFunding;

      document.getElementById("transactionStat")
      .innerText =
      totalTransactions;

    }

    function addHistory(text){

      if(historyList.innerHTML.includes(
        "No transaction yet"
      )){

        historyList.innerHTML = "";

      }

      const li =
      document.createElement("li");

      li.innerText = text;

      historyList.prepend(li);

    }

    function fundWallet(){

      let amount =
      prompt("Enter amount to fund");

      amount = Number(amount);

      if(amount > 0){

        balance += amount;

        totalFunding += amount;

        totalTransactions++;

        updateBalance();

        updateStats();

        addHistory(
          "Wallet funded ₦" + amount
        );

        alert(
          "Wallet funded successfully"
        );

      }

    }

    function buyData(){

      if(balance < 500){

        alert("Insufficient balance");

        return;

      }

      balance -= 500;

      totalTransactions++;

      updateBalance();

      updateStats();

      addHistory(
        "1GB purchased - ₦500"
      );

      alert("1GB purchased");

    }

    function buyAirtime(){

      if(balance < 100){

        alert("Insufficient balance");

        return;

      }

      balance -= 100;

      totalTransactions++;

      updateBalance();

      updateStats();

      addHistory(
        "Airtime purchased - ₦100"
      );

      alert("₦100 airtime purchased");

    }

    function showProfile(){

      alert(
        "Username: Fadaq User\nEmail: user@fadaqdata.com"
      );

    }

    function scrollToHistory(){

      document.getElementById("historySection")
      .scrollIntoView({
        behavior:"smooth"
      });

    }

  </script>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",
      authDomain: "fadaqdata-3bd14.firebaseapp.com",
      projectId: "fadaqdata-3bd14",
      storageBucket: "fadaqdata-3bd14.firebasestorage.app",
      messagingSenderId: "609845657857",
      appId: "1:609845657857:web:48817ce972c054e203db00"
    };

    const app = initializeApp(firebaseConfig);

  </script>

</body>
</html>

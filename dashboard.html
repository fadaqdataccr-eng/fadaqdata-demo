<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#4b0000;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:20px;
}

.card{
background:#8b1300;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.balance{
font-size:65px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
margin-top:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
background:gold;
}

.logout{
background:red;
color:white;
}

</style>

</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">

<h2 id="welcome">
Welcome
</h2>

</div>

<h1>Wallet Balance</h1>

<div class="balance" id="balance">
₦0.00
</div>

<div class="card">

<h2>Fund Wallet</h2>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button onclick="payNow()">
Proceed Payment
</button>

</div>

<div class="card">

<button
class="logout"
onclick="logout()">
Logout
</button>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.firestore();

let currentUser = null;

auth.onAuthStateChanged(async(user)=>{

if(user){

currentUser = user;

document.getElementById("welcome").innerHTML =
"Welcome, " + user.email;

const userRef =
db.collection("users").doc(user.uid);

const docSnap =
await userRef.get();

if(docSnap.exists){

const data = docSnap.data();

document.getElementById("balance").innerHTML =
"₦" + Number(data.wallet || 0).toFixed(2);

}else{

await userRef.set({
wallet:0
});

}

}else{

window.location.href = "login.html";

}

});

function logout(){

auth.signOut();

window.location.href = "login.html";

}

function payNow(){

if(!currentUser){

alert("Login required");

return;

}

let amount =
document.getElementById("amount").value;

if(amount == ""){

alert("Enter Amount");

return;

}

amount = Number(amount);

let handler = PaystackPop.setup({

key:"pk_test_1b3f9a355adc3a08d52a861a5577200edad434b8",

email:currentUser.email,

amount:amount * 100,

currency:"NGN",

callback:function(response){

alert("Payment Successful");

const userRef =
db.collection("users").doc(currentUser.uid);

userRef.get().then((doc)=>{

let oldBalance = 0;

if(doc.exists){

oldBalance =
doc.data().wallet || 0;

}

let newBalance =
oldBalance + amount;

userRef.update({
wallet:newBalance
});

document.getElementById("balance").innerHTML =
"₦" + newBalance.toFixed(2);

document.getElementById("amount").value = "";

});

},

onClose:function(){

alert("Transaction Cancelled");

}

});

handler.openIframe();

}

</script>

</body>
</html>

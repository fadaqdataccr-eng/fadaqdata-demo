<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<style>

body{
background:#2b160d;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:40px 15px 15px 15px;
}

.container{
max-width:400px;
margin:auto;
}

h1{
text-align:center;
margin-top:30px;
margin-bottom:20px;
font-size:30px;
}

.card{
background:#4a2313;
padding:18px;
border-radius:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
background:gold;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

p,h3{
margin:5px 0;
}

</style>

<script>

let balance=0;

function updateBalance(){
document.getElementById("balance").innerHTML="₦"+balance+".00";
}

function fundWallet(){
balance+=1000;
updateBalance();
alert("₦1000 added successfully");
}

function buyData(){
if(balance>=500){
balance-=500;
updateBalance();
alert("1GB purchased successfully");
}else{
alert("Insufficient balance");
}
}

function buyAirtime(){
if(balance>=100){
balance-=100;
updateBalance();
alert("₦100 airtime purchased");
}else{
alert("Insufficient balance");
}
}

function viewHistory(){
alert(
"Transaction History\n\n"+
"Wallet funded\n"+
"Data purchased\n"+
"Airtime purchased"
);
}

</script>

</head>

<body>

<div class="container">

<h1>FadaqData Dashboard</h1>

<div class="card">
<h3>Wallet Balance</h3>
<p id="balance">₦0.00</p>
<button onclick="fundWallet()">Fund Wallet</button>
</div>

<div class="card">
<h3>Buy Data</h3>
<button onclick="buyData()">Purchase Data</button>
</div>

<div class="card">
<h3>Airtime</h3>
<button onclick="buyAirtime()">Buy Airtime</button>
</div>

<div class="card">
<h3>Transaction History</h3>
<button onclick="viewHistory()">View History</button>
</div>

</div>

</body>
</html>

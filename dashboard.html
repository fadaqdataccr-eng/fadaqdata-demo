<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Dashboard</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#3b0000;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:50px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

.card{
background:#8b1300;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.balance{
font-size:60px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
margin-top:15px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.yellow{
background:gold;
color:black;
}

.red{
background:red;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<h2 id="welcome">
Welcome
</h2>

</div>

<h1>Wallet Balance</h1>

<div class="balance" id="balance">
₦0.00
</div>

<div class="card">

<h2>Fund Wallet</h2>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button class="btn yellow" onclick="payNow()">
Proceed Payment
</button>

</div>

<div class="card">

<button class="btn red" onclick="logout()">
Logout
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser = user;

document.getElementById("welcome").innerHTML =
"Welcome, " + user.email;

const userRef = doc(db,"users",user.uid);

const snap = await getDoc(userRef);

if(!snap.exists()){

await setDoc(userRef,{
wallet:0
});

}else{

const data = snap.data();

document.getElementById("balance").innerHTML =
"₦" + Number(data.wallet || 0).toFixed(2);

}

}else{

window.location.href = "login.html";

}

});

window.logout = async function(){

await signOut(auth);

window.location.href = "login.html";

}

window.payNow = async function(){

const amount =
document.getElementById("amount").value;

if(amount == ""){

alert("Enter Amount");

return;

}

const handler = PaystackPop.setup({

key: "pk_test_1b3f9a355adc3a08d52a861a5577200edad434b8",

email: currentUser.email,

amount: Number(amount) * 100,

currency: "NGN",

ref: "FDQ" + Date.now(),

callback: async function(response){

alert("Payment Successful");

const userRef = doc(db,"users",currentUser.uid);

const snap = await getDoc(userRef);

let oldBalance = 0;

if(snap.exists()){

oldBalance = snap.data().wallet || 0;

}

let newBalance =
oldBalance + Number(amount);

await updateDoc(userRef,{
wallet:newBalance
});

document.getElementById("balance").innerHTML =
"₦" + newBalance.toFixed(2);

document.getElementById("amount").value = "";

},

onClose: function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}

</script>

</body>
</html>

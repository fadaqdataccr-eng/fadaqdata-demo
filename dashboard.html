<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
background:#8B0000;
font-family:Arial;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:30px;
margin-bottom:30px;
}

.card{
background:#cc0000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.welcome{
font-size:28px;
font-weight:bold;
line-height:1.5;
}

.flex{
display:flex;
gap:15px;
margin-top:20px;
}

.small-card{
flex:1;
background:#b30000;
padding:20px;
border-radius:18px;
text-align:center;
}

.small-card h3{
margin:0;
font-size:18px;
}

.small-card p{
font-size:28px;
font-weight:bold;
margin-top:12px;
}

.wallet{
text-align:center;
}

.wallet h2{
font-size:22px;
margin-bottom:20px;
}

.balance{
font-size:60px;
font-weight:bold;
margin-bottom:25px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.white{
background:white;
color:#8B0000;
}

.red{
background:#ff1a1a;
color:white;
}

.service-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
opacity:0.9;
margin-bottom:20px;
}

.bottom-nav{
display:flex;
gap:15px;
margin-top:25px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
background:white;
color:#8B0000;
}

.transactions-list{
margin-top:20px;
}

</style>
</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="welcome">
Welcome,<br>
<span id="welcomeName">User</span>
</div>

<div class="flex">

<div class="small-card">
<h3>Total Funding</h3>
<p id="fundingAmount">₦0.00</p>
</div>

<div class="small-card">
<h3>Transactions</h3>
<p id="transactionCount">0</p>
</div>

</div>

</div>

<div class="card wallet">

<h2>
Wallet Balance 👁️
</h2>

<div class="balance" id="walletBalance">
₦0.00
</div>

<button class="btn white"
onclick="fundWallet()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles instantly
</div>

<button class="btn white"
onclick="window.location.href='buydata.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
📞 Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="btn white"
onclick="window.location.href='airtime.html'">
Buy Now
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Transactions
</div>

<div class="transactions-list"
id="transactionList">
</div>

</div>

<button class="btn red"
onclick="logout()">
Logout
</button>

<div class="bottom-nav">

<button class="nav-btn">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<!-- RECEIPT POPUP -->

<div id="receiptPopup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:white;
width:85%;
padding:25px;
border-radius:20px;
color:#8B0000;
">

<h2 style="text-align:center;">
🧾 Transaction Receipt
</h2>

<p id="receiptDetails"></p>

<button onclick="closeReceipt()"
style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#8B0000;
color:white;
font-size:18px;
font-weight:bold;
margin-top:20px;
">
Close
</button>

</div>

</div>

<script>

let userName =
localStorage.getItem("userName") || "User";

document.getElementById("welcomeName")
.innerHTML = userName;

let wallet =
Number(localStorage.getItem("walletBalance")) || 0;

document.getElementById("walletBalance")
.innerHTML = "₦" + wallet.toFixed(2);

document.getElementById("fundingAmount")
.innerHTML = "₦" + wallet.toFixed(2);

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

document.getElementById("transactionCount")
.innerHTML = transactions.length;

let transactionList =
document.getElementById("transactionList");

transactionList.innerHTML = "";

transactions.reverse().forEach((item)=>{

let text =
typeof item === "string"
? item
: item.text || "Transaction";

let date =
item.date || "No date";

let div = document.createElement("div");

div.style.background = "#b30000";
div.style.padding = "15px";
div.style.borderRadius = "12px";
div.style.marginBottom = "15px";
div.style.cursor = "pointer";

div.innerHTML = `

<div style="
font-size:18px;
font-weight:bold;
">
${text}
</div>

<div style="
margin-top:8px;
font-size:14px;
opacity:0.8;
">
${date}
</div>

`;

div.onclick = function(){

document.getElementById("receiptPopup")
.style.display = "flex";

document.getElementById("receiptDetails")
.innerHTML = `

<p><b>Transaction:</b><br>
${text}
</p>

<p><b>Date:</b><br>
${date}
</p>

<p>
<b>Status:</b>
<span style="color:green;">
Successful
</span>
</p>

<p>
<b>Transaction ID:</b><br>
FD${Math.floor(Math.random()*999999999)}
</p>

`;

};

transactionList.appendChild(div);

});

function closeReceipt(){

document.getElementById("receiptPopup")
.style.display = "none";

}

function fundWallet(){

let amount = prompt("Enter amount to fund");

if(amount === null || amount === ""){
return;
}

amount = Number(amount);

let wallet =
Number(localStorage.getItem("walletBalance")) || 0;

wallet += amount;

localStorage.setItem("walletBalance", wallet);

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

transactions.push({
text:"💳 Wallet funded with ₦" + amount,
date:new Date().toLocaleString()
});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

alert("Wallet funded successfully");

location.reload();

}

function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href = "login.html";

}

</script>

</body>
</html>

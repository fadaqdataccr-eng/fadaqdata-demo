<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#2b0d00;
color:white;
padding:20px;
padding-bottom:100px;
}

h1{
text-align:center;
font-size:50px;
margin-bottom:30px;
}

.card{
background:#6b1f08;
padding:20px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.balance{
font-size:60px;
font-weight:bold;
margin:10px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.small-card{
background:#6b1f08;
padding:20px;
border-radius:25px;
text-align:center;
}

.small-card h2{
margin-top:0;
}

.small-card p{
color:#ddd;
font-size:14px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:gold;
font-weight:bold;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.history-item{
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:22px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1a0800;
display:flex;
justify-content:space-around;
padding:18px 0;
font-size:22px;
}

.bottom-nav div{
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-box{
background:#6b1f08;
padding:25px;
border-radius:20px;
width:80%;
max-width:400px;
}

.popup-box h2{
margin-top:0;
text-align:center;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
}

.close-btn{
margin-top:15px;
background:red;
color:white;
}

</style>

</head>

<body>

<h1>FadaqData</h1>

<div class="card">

<h2>Wallet Balance</h2>

<div class="balance" id="balance">₦0.00</div>

<button onclick="openPopup('fundPopup')">
Fund Wallet
</button>

</div>

<div class="grid">

<div class="small-card">
<h2>Buy Data</h2>
<p>Purchase affordable data</p>

<button onclick="buyData()">
Buy Now
</button>
</div>

<div class="small-card">
<h2>Airtime</h2>
<p>Recharge instantly</p>

<button onclick="buyAirtime()">
Buy Now
</button>
</div>

<div class="small-card">
<h2>Profile</h2>
<p>Manage your account</p>

<button onclick="showProfile()">
Open
</button>
</div>

<div class="small-card">
<h2>Transactions</h2>
<p>View recent activities</p>

<button onclick="scrollToHistory()">
View
</button>
</div>

</div>

<div class="card">

<h2>Transaction History</h2>

<div id="history">

<div class="history-item">
No transaction yet
</div>

</div>

</div>

<div class="bottom-nav">
<div>Home</div>
<div>Profile</div>
</div>

<!-- FUND POPUP -->

<div class="popup" id="fundPopup">

<div class="popup-box">

<h2>Fund Wallet</h2>

<input type="number" id="fundAmount" placeholder="Enter amount">

<button onclick="fundWallet()">
Add Money
</button>

<button class="close-btn" onclick="closePopup('fundPopup')">
Close
</button>

</div>

</div>

<script>

let balance = localStorage.getItem("balance") || 0;
balance = Number(balance);

let history = JSON.parse(localStorage.getItem("history")) || [];

updateBalance();
renderHistory();

function updateBalance(){

document.getElementById("balance").innerHTML =
"₦" + balance.toFixed(2);

localStorage.setItem("balance", balance);

}

function addHistory(text){

history.unshift(text);

localStorage.setItem("history",
JSON.stringify(history));

renderHistory();

}

function renderHistory(){

let historyBox =
document.getElementById("history");

if(history.length === 0){

historyBox.innerHTML =
'<div class="history-item">No transaction yet</div>';

return;

}

historyBox.innerHTML = "";

history.forEach(function(item){

historyBox.innerHTML +=
'<div class="history-item">' + item + '</div>';

});

}

function openPopup(id){

document.getElementById(id).style.display = "flex";

}

function closePopup(id){

document.getElementById(id).style.display = "none";

}

function fundWallet(){

let amount =
Number(document.getElementById("fundAmount").value);

if(amount <= 0){

alert("Enter valid amount");

return;

}

balance += amount;

updateBalance();

addHistory(
"Wallet funded ₦" + amount
);

document.getElementById("fundAmount").value = "";

closePopup("fundPopup");

alert("Wallet funded successfully");

}

function buyData(){

if(balance < 500){

alert("Insufficient balance");

return;

}

balance -= 500;

updateBalance();

addHistory(
"1GB purchased - ₦500"
);

alert("1GB data purchased");

}

function buyAirtime(){

if(balance < 100){

alert("Insufficient balance");

return;

}

balance -= 100;

updateBalance();

addHistory(
"Airtime purchased - ₦100"
);

alert("₦100 airtime purchased");

}

function showProfile(){

alert(
"Username: Fadaq User\nEmail: user@fadaqdata.com"
);

}

function scrollToHistory(){

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding:40px 0 120px;
}

.logo{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:40px;
}

.welcome{
    background:#e60000;
    padding:25px;
    border-radius:25px;
    margin-bottom:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.balance-box{
    background:#d10000;
    padding:25px;
    border-radius:22px;
    text-align:center;
    margin-top:20px;
}

.balance-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.balance{
    font-size:70px;
    font-weight:bold;
    margin-bottom:25px;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#6b0000;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.card{
    background:#e60000;
    padding:30px;
    border-radius:25px;
    margin-bottom:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card h2{
    font-size:32px;
    margin-bottom:15px;
}

.card p{
    font-size:18px;
    margin-bottom:25px;
    line-height:1.5;
}

.bottom-nav{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
}

.nav-btn{
    background:white;
    color:#6b0000;
    padding:18px 35px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        FadaqData
    </div>

    <div class="welcome">

        <h1 id="welcomeText">
            Welcome
        </h1>

        <div class="balance-box">

            <div class="balance-title">
                Wallet Balance 👁️
            </div>

            <div class="balance"
                id="walletBalance">
                ₦0
            </div>

            <button class="btn"
                onclick="window.location.href='fund-wallet.html'">

                💳 Fund Wallet

            </button>

        </div>

    </div>

    <!-- BUY DATA -->

    <div class="card">

        <h2>
            📶 Buy Data
        </h2>

        <p>
            Purchase affordable data bundles instantly
        </p>

        <button class="btn"
            onclick="window.location.href='buy-data.html'">

            Buy Now

        </button>

    </div>

    <!-- BUY AIRTIME -->

    <div class="card">

        <h2>
            📞 Buy Airtime
        </h2>

        <p>
            Recharge airtime instantly
        </p>

        <button class="btn"
            onclick="window.location.href='buy-airtime.html'">

            Buy Airtime

        </button>

    </div>

    <!-- TRANSACTION HISTORY -->

    <div class="card">

        <h2>
            📜 Transaction History
        </h2>

        <p>
            View all your recent transactions
        </p>

        <button class="btn"
            onclick="window.location.href='history.html'">

            View History

        </button>

    </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <a href="dashboard.html"
        class="nav-btn">

        🏠 Home

    </a>

    <a href="profile.html"
        class="nav-btn">

        👤 Profile

    </a>

</div>

<script>

/* LOGIN CHECK */

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

    window.location.href = "login.html";

}

/* LOAD USERS */

let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND CURRENT USER */

const userIndex = users.findIndex(
    user => user.email === currentUser.email
);

if(userIndex === -1){

    window.location.href = "login.html";

}

const latestUser = users[userIndex];

/* UPDATE CURRENT USER */

localStorage.setItem(
    "currentUser",
    JSON.stringify(latestUser)
);

/* SHOW NAME */

document.getElementById("welcomeText")
.innerText =
"Welcome, " + latestUser.name;

/* SHOW BALANCE */

document.getElementById("walletBalance")
.innerText =
"₦" + (latestUser.balance || 0);

</script>

</body>
</html>

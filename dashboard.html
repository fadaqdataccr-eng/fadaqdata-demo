<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

.card{
background:#7a0000;
padding:20px;
border-radius:20px;
margin-top:40px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.balance{
font-size:50px;
text-align:center;
font-weight:bold;
margin-top:20px;
}

.eye{
text-align:center;
font-size:25px;
cursor:pointer;
margin-top:10px;
}

.title{
text-align:center;
font-size:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
FadaqData Dashboard
</div>

<div
class="eye"
onclick="toggleBalance()"
>
👁️
</div>

<div
class="balance"
id="balance"
>
₦100
</div>

<button onclick="window.location.href='fund-wallet.html'">
Fund Wallet
</button>

<button onclick="window.location.href='buy-data.html'">
Buy Data
</button>

<button onclick="window.location.href='buy-airtime.html'">
Buy Airtime
</button>

<button onclick="window.location.href='history.html'">
Transaction History
</button>

<button onclick="logout()">
Logout
</button>

</div>

<script>

if(localStorage.getItem("loggedIn") !== "true"){

window.location.href =
"login.html";

}

if(!localStorage.getItem("walletBalance")){

localStorage.setItem(
"walletBalance",
"100"
);

}

let hidden = false;

function loadBalance(){

const balance =
localStorage.getItem("walletBalance");

document.getElementById("balance")
.innerHTML = hidden
? "******"
: "₦" + balance;

}

loadBalance();

function toggleBalance(){

hidden = !hidden;

loadBalance();

}

function logout(){

localStorage.removeItem("loggedIn");

window.location.href =
"login.html";

}

</script>

</body>

</html>

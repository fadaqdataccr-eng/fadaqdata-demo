<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<style>

body{
background:#2b160d;
font-family:Arial,sans-serif;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#5a2410;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
margin-top:10px;
cursor:pointer;
font-size:16px;
}

.profile-btn{
width:150px;
margin-bottom:20px;
}

.history{
font-size:14px;
line-height:28px;
}

</style>

<script>

let balance =
localStorage.getItem("balance") || 0;

let historyData =
JSON.parse(
localStorage.getItem("history")
) || [];

function updateScreen(){

document.getElementById("balance")
.innerHTML = "₦" + balance + ".00";

if(historyData.length > 0){

document.getElementById("history")
.innerHTML =
historyData.join("<br>");

}else{

document.getElementById("history")
.innerHTML =
"No transactions yet";

}

}

function saveData(){

localStorage.setItem(
"balance",
balance
);

localStorage.setItem(
"history",
JSON.stringify(historyData)
);

updateScreen();

}

function fundWallet(){

balance = parseInt(balance) + 1000;

historyData.push(
"Wallet funded ₦1000"
);

saveData();

alert(
"Wallet funded successfully"
);

}

function buyData(){

if(balance >= 500){

balance -= 500;

historyData.push(
"1GB purchased - ₦500"
);

saveData();

alert(
"1GB purchased successfully"
);

}else{

alert(
"Insufficient balance"
);

}

}

function buyAirtime(){

if(balance >= 100){

balance -= 100;

historyData.push(
"Airtime purchased - ₦100"
);

saveData();

alert(
"Airtime purchased successfully"
);

}else{

alert(
"Insufficient balance"
);

}

}

window.onload = updateScreen

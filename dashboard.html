<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<style>
body{
background:#2b160d;
font-family:Arial,sans-serif;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#5a2410;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.history{
font-size:14px;
line-height:25px;
}
</style>

<script>

let balance = localStorage.getItem("balance") || 0;

let historyData=
JSON.parse(localStorage.getItem("history")) || [];

function updateScreen(){

document.getElementById("balance")
.innerHTML="₦"+balance+".00";

document.getElementById("history")
.innerHTML=historyData.join("<br>");

}

function fundWallet(){

balance=parseInt(balance)+1000;

historyData.push("Wallet funded ₦1000");

saveData();

alert("Wallet funded successfully");

}

function buyData(){

if(balance>=500){

balance-=500;

historyData.push("1GB purchased - ₦500");

saveData();

alert("1GB purchased");

}

else{

alert("Insufficient balance");

}

}

function buyAirtime(){

if(balance>=100){

balance-=100;

historyData.push("Airtime purchased - ₦100");

saveData();

alert("Airtime purchased");

}

else{

alert("Insufficient balance");

}

}

function saveData(){

localStorage.setItem("balance",balance);

localStorage.setItem(
"history",
JSON.stringify(historyData)
);

updateScreen();

}

window.onload=updateScreen;

</script>

</head>

<body>

<div class="container">

<h1>FadaqData Dashboard</h1>

<div class="card">

<h3>Wallet Balance</h3>

<p id="balance">₦0.00</p>

<button onclick="fundWallet()">
Fund Wallet
</button>

</div>

<div class="card">

<h3>Buy Data</h3>

<button onclick="buyData()">
Purchase Data
</button>

</div>

<div class="card">

<h3>Airtime</h3>

<button onclick="buyAirtime()">
Buy Airtime
</button>

</div>

<div class="card">

<h3>Transaction History</h3>

<div id="history" class="history">
No transactions yet
</div>

</div>

</div>

</body>
</html>

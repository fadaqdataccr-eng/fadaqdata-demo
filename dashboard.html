<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#5b0000;
padding:20px;
color:white;

}

.card{

background:#7a0000;
padding:30px 25px;
border-radius:25px;
margin-top:40px;

box-shadow:
0 0 25px rgba(0,0,0,0.3);

}

.logo{

text-align:center;
font-size:38px;
font-weight:bold;
margin-bottom:10px;

}

.sub{

text-align:center;
opacity:0.8;
margin-bottom:30px;
font-size:15px;

}

.balanceBox{

text-align:center;
margin-bottom:35px;

}

.balanceText{

font-size:18px;
opacity:0.8;
margin-bottom:10px;

}

.balance{

font-size:65px;
font-weight:bold;

}

.btn{

width:100%;
padding:18px;
border:none;
border-radius:18px;
margin-top:18px;
font-size:20px;
font-weight:bold;
background:white;
color:#7a0000;

}

.btn:active{

transform:scale(0.98);

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
FadaqData
</div>

<div class="sub">
Fast & Reliable VTU Services
</div>

<div class="balanceBox">

<div class="balanceText">
Wallet Balance
</div>

<div class="balance"
id="balance">

₦0

</div>

</div>

<button class="btn"
onclick="window.location.href='fund.html'">

Fund Wallet

</button>

<button class="btn"
onclick="window.location.href='buydata.html'">

Buy Data

</button>

<button class="btn"
onclick="window.location.href='buyairtime.html'">

Buy Airtime

</button>

<button class="btn"
onclick="window.location.href='history.html'">

Transaction History

</button>

<button class="btn"
onclick="logout()">

Logout

</button>

</div>

<script>

function loadBalance(){

let wallet =
localStorage.getItem("walletBalance") || 0;

document.getElementById("balance")
innerHTML = "₦" + wallet;

}

loadBalance();

function logout(){

window.location.href = "index.html";

}

</script>

</body>
</html>

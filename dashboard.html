<!DOCTYPE html>
<html>
<head>
<title>FadaqData Dashboard</title>

<style>
body{
background:#2b160d;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:#3b2013;
padding:15px;
border-radius:10px;
margin:15px 0;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
</style>

<script>
function fundWallet(){
alert("Wallet funded successfully: ₦1000");
document.getElementById("balance").innerHTML="₦1000";
}
</script>

</head>

<body>

<h1>FadaqData Dashboard</h1>

<div class="card">
<h3>Wallet Balance</h3>
<p id="balance">₦0.00</p>
<button onclick="fundWallet()">Fund Wallet</button>
</div>

<div class="card">
<h3>Buy Data</h3>
<button>Purchase Data</button>
</div>

<div class="card">
<h3>Airtime</h3>
<button>Buy Airtime</button>
</div>

<div class="card">
<h3>Transaction History</h3>
<button>View History</button>
</div>

</body>
</html>

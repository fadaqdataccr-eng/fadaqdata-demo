<!DOCTYPE html>
<html>
<head>
<title>FadaqData</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>FadaqData</h1>

<div class="stats">

<div class="stat-box">
<h3>Total Funding</h3>
<p id="fundingStat">₦0</p>
</div>

<div class="stat-box">
<h3>Transactions</h3>
<p id="transactionStat">0</p>
</div>

</div>

<div class="card">

<h2>Wallet Balance</h2>

<div class="balance" id="balance">
₦0.00
</div>

<button onclick="fundWallet()">
Fund Wallet
</button>

</div>

<div class="grid">

<div class="small-card">
<h3>Buy Data</h3>
<p>Purchase affordable data</p>

<button onclick="buyData()">
Buy Now
</button>
</div>

<div class="small-card">
<h3>Airtime</h3>
<p>Recharge instantly</p>

<button onclick="buyAirtime()">
Buy Now
</button>
</div>

<div class="small-card">
<h3>Profile</h3>
<p>Manage account</p>

<button onclick="showProfile()">
Open
</button>
</div>

<div class="small-card">
<h3>Transactions</h3>
<p>Recent activities</p>

<button onclick="scrollToHistory()">
View
</button>
</div>

</div>

<div class="history" id="historySection">

<h2>Transaction History</h2>

<div id="historyList">

<div class="history-item">
No transaction yet
</div>

</div>

</div>

<div class="bottom-nav">
<div>🏠 Home</div>
<div>👤 Profile</div>
</div>

<script>

let balance = 0;
let totalFunding = 0;
let transactionCount = 0;

function updateBalance(){
document.getElementById("balance").innerHTML =
"₦" + balance.toFixed(2);

document.getElementById("fundingStat").innerHTML =
"₦" + totalFunding;

document.getElementById("transactionStat").innerHTML =
transactionCount;
}

function addHistory(text){

const history =
document.getElementById("historyList");

if(history.innerHTML.includes("No transaction yet")){
history.innerHTML = "";
}

history.innerHTML =
'<div class="history-item">' +
text +
'</div>' +
history.innerHTML;

transactionCount++;

updateBalance();
}

function fundWallet(){

balance += 1000;
totalFunding += 1000;

updateBalance();

addHistory("Wallet funded ₦1000");

alert("₦1000 added successfully");

}

function buyData(){

if(balance < 500){

alert("Insufficient balance");

return;

}

balance -= 500;

updateBalance();

addHistory("1GB purchased - ₦500");

alert("1GB purchased successfully");

}

function buyAirtime(){

if(balance < 100){

alert("Insufficient balance");

return;

}

balance -= 100;

updateBalance();

addHistory("Airtime purchased - ₦100");

alert("₦100 airtime purchased");

}

function showProfile(){

alert(
"Username: Fadaq User\nEmail: user@fadaqdata.com"
);

}

function scrollToHistory(){

document.getElementById("historySection")
.scrollIntoView({
behavior:"smooth"
});

}

updateBalance();

</script>

</body>
  </html>

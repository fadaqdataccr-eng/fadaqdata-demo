<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FadaqData Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
}

.logo{
font-size:60px;
font-weight:bold;
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.welcome{
font-size:28px;
font-weight:bold;
line-height:1.5;
}

.stats{
display:flex;
gap:15px;
}

.stat-box{
flex:1;
background:#a00000;
padding:20px;
border-radius:20px;
text-align:center;
}

.stat-title{
font-size:18px;
margin-bottom:10px;
font-weight:bold;
}

.stat-value{
font-size:35px;
font-weight:bold;
}

.wallet-title{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.balance{
font-size:65px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
word-break:break-word;
}

.eye{
cursor:pointer;
font-size:30px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.white{
background:white;
color:#8B0000;
}

.red{
background:red;
color:white;
}

.service-title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.service-text{
font-size:18px;
margin-bottom:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
}

.transaction-item{
background:#a00000;
padding:15px;
border-radius:15px;
margin-top:15px;
font-size:16px;
line-height:1.5;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="welcome" id="welcomeText">
Welcome,<br>User
</div>

</div>

<div class="stats">

<div class="stat-box">

<div class="stat-title">
Wallet Balance
</div>

<div class="stat-value"
id="walletBalance">
₦0.00
</div>

</div>

<div class="stat-box">

<div class="stat-title">
Transactions
</div>

<div class="stat-value"
id="transactionCount">
0
</div>

</div>

</div>

<div class="card">

<div class="wallet-title">

Wallet Overview

<span class="eye"
onclick="toggleBalance()"
id="eyeBtn">
👁️
</span>

</div>

<div class="balance"
id="mainBalance">
₦0.00
</div>

<button class="white"
onclick="fundWallet()">
💳 Fund Wallet
</button>

</div>

<div class="card">

<div class="service-title">
📶 Buy Data
</div>

<div class="service-text">
Purchase affordable data bundles
instantly
</div>

<button class="white"
onclick="window.location.href='buydata.html'">
Buy Data
</button>

</div>

<div class="card">

<div class="service-title">
📞 Buy Airtime
</div>

<div class="service-text">
Recharge airtime instantly
</div>

<button class="white"
onclick="window.location.href='buyairtime.html'">
Buy Airtime
</button>

</div>

<div class="card">

<div class="service-title">
🧾 Recent Transactions
</div>

<div id="transactionHistory">
No transaction yet
</div>

</div>

<button class="red"
onclick="logout()">
Logout
</button>

</div>

<div class="bottom-nav">

<button class="white nav-btn">
🏠 Home
</button>

<button class="white nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){

window.location.href = "login.html";

}

let fullname =
localStorage.getItem("userFullname");

let email =
localStorage.getItem("userEmail");

if(fullname == null){

fullname = "User";

}

document.getElementById("welcomeText").innerHTML =
"Welcome,<br>" + fullname;

let wallet =
parseFloat(localStorage.getItem(
"walletBalance"
)) || 0;

let transactions =
JSON.parse(localStorage.getItem(
"transactions"
)) || [];

let hidden = false;

updateDashboard();

function updateDashboard(){

let balanceText =
hidden ? "******" :
"₦" + wallet.toFixed(2);

document.getElementById(
"walletBalance"
).innerHTML = balanceText;

document.getElementById(
"mainBalance"
).innerHTML = balanceText;

document.getElementById(
"transactionCount"
).innerHTML =
transactions.length;

showTransactions();

}

function toggleBalance(){

hidden = !hidden;

document.getElementById(
"eyeBtn"
).innerHTML =
hidden ? "🙈" : "👁️";

updateDashboard();

}

function fundWallet(){

let amount =
prompt("Enter amount");

if(amount == null || amount == ""){
return;
}

amount = parseFloat(amount);

if(isNaN(amount) || amount <= 0){

alert("Invalid amount");

return;

}

wallet += amount;

localStorage.setItem(
"walletBalance",
wallet
);

let date =
new Date().toLocaleString();

transactions.unshift(
"💳 Wallet funded with ₦" +
amount +
"<br><small>" +
date +
"</small>"
);

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

updateDashboard();

alert("Wallet funded successfully");

}

function showTransactions(){

let history =
document.getElementById(
"transactionHistory"
);

if(transactions.length === 0){

history.innerHTML =
"No transaction yet";

return;

}

history.innerHTML = "";

transactions.forEach(function(item){

history.innerHTML +=
'<div class="transaction-item">' +
item +
'</div>';

});

}

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>

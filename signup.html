<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:400px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
}

.title{
font-size:30px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:20px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.link{
text-align:center;
margin-top:20px;
font-size:16px;
}

.link a{
color:white;
font-weight:bold;
text-decoration:none;
}

.toast{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:white;
color:#7a0000;
padding:18px 25px;
border-radius:15px;
font-size:18px;
font-weight:bold;
display:none;
z-index:99999;
}

</style>

</head>

<body>

<div class="toast"
id="toast">
Account Created ✅
</div>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
Create Account
</div>

<input type="text"
id="name"
placeholder="Full Name">

<input type="email"
id="email"
placeholder="Email Address">

<input type="password"
id="password"
placeholder="Password">

<button onclick="signup()">
Create Account
</button>

<div class="link">

Already have account?

<a href="login.html">
Login
</a>

</div>

</div>

</div>

<script>

function showToast(message){

let toast =
document.getElementById(
"toast"
);

toast.innerHTML = message;

toast.style.display =
"block";

setTimeout(function(){

toast.style.display =
"none";

},3000);

}

function signup(){

let name =
document.getElementById(
"name"
).value;

let email =
document.getElementById(
"email"
).value;

let password =
document.getElementById(
"password"
).value;

if(
name === "" ||
email === "" ||
password === ""
){

showToast(
"Fill all fields"
);

return;

}

let user = {

name:name,
email:email,
password:password

};

localStorage.setItem(
"user",
JSON.stringify(user)
);

localStorage.setItem(
"walletBalance",
"0"
);

localStorage.setItem(
"transactions",
JSON.stringify([])
);

showToast(
"Account Created ✅"
);

setTimeout(function(){

window.location.href =
"login.html";

},1500);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding-top:80px;
padding-bottom:80px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:40px;
}

.card{
background:red;
padding:35px 25px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:18px;
margin-bottom:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.bottom-text{
text-align:center;
margin-top:25px;
font-size:18px;
}

.bottom-text a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
Signup
</div>

<input
type="text"
id="name"
placeholder="Full Name"
>

<input
type="email"
id="email"
placeholder="Email Address"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button id="signupBtn">
Create Account
</button>

<div class="bottom-text">
Already have an account?
<a href="login.html">
Login
</a>
</div>

</div>

</div>

<script>

// SIGNUP BUTTON
document.getElementById("signupBtn")
.addEventListener("click", signupUser);

// SIGNUP FUNCTION
function signupUser(){

const name =
document.getElementById("name").value.trim();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

// EMPTY CHECK
if(!name || !email || !password){

alert("Please fill all fields");
return;

}

// GET USERS
let users =
JSON.parse(localStorage.getItem("users")) || [];

// CHECK EXISTING
const existingUser =
users.find(user => user.email === email);

if(existingUser){

alert("Account already exists");
return;

}

// CREATE USER
const newUser = {

name:name,
email:email,
password:password

};

// SAVE USER
users.push(newUser);

localStorage.setItem(
"users",
JSON.stringify(users)
);

// AUTO LOGIN
localStorage.setItem(
"loggedInUser",
JSON.stringify(newUser)
);

// CREATE WALLET
if(
localStorage.getItem("walletBalance")
=== null
){

localStorage.setItem(
"walletBalance",
100
);

}

// SUCCESS
alert("Account Created Successfully");

// REDIRECT
window.location.href =
"dashboard.html";

}

</script>

</body>
</html>

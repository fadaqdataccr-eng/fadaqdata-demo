<!DOCTYPE html>
<html>
<head>
<title>Signup - FadaqData</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#8B0000;
color:white;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:60px;
margin-bottom:40px;
}

.box{
background:#cc0000;
padding:25px;
border-radius:20px;
max-width:400px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:30px;
font-size:32px;
}

input{
width:100%;
padding:18px;
margin-bottom:18px;
border:none;
border-radius:12px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:white;
color:#8B0000;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.link{
text-align:center;
margin-top:20px;
font-size:16px;
}

.link a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<div class="logo">
FadaqData
</div>

<div class="box">

<h2>Create Account</h2>

<input type="text"
id="fullname"
placeholder="Full Name">

<input type="email"
id="email"
placeholder="Email Address">

<input type="password"
id="password"
placeholder="Password">

<button onclick="signup()">
Create Account
</button>

<div class="link">
Already have account?
<a href="login.html">Login</a>
</div>

</div>

<script>

function signup(){

let fullname =
document.getElementById("fullname").value;

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

if(fullname === "" ||
email === "" ||
password === ""){

alert("Fill all fields");
return;

}

localStorage.setItem("userName", fullname);
localStorage.setItem("userEmail", email);
localStorage.setItem("userPassword", password);

alert("Account created successfully");

window.location.href = "login.html";

}

</script>

</body>
</html>

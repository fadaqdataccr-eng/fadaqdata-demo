<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:0;
background:#990000;
font-family:Arial;
color:white;
}

.container{
padding:20px;
padding-bottom:120px;
text-align:center;
}

.logo{
font-size:70px;
font-weight:bold;
margin-top:40px;
}

.card{
background:#cc0000;
padding:25px;
border-radius:25px;
margin-top:30px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.balance{
font-size:60px;
font-weight:bold;
margin:30px 0;
}

input{
width:90%;
padding:20px;
border:none;
border-radius:15px;
font-size:25px;
margin-top:20px;
outline:none;
}

button{
width:90%;
padding:20px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:30px;
font-weight:bold;
margin-top:25px;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#990000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 35px;
border-radius:15px;
font-weight:bold;
color:#660000;
text-decoration:none;
font-size:25px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<h1>
💳 Fund Wallet
</h1>

<div class="balance" id="walletBalance">
₦0
</div>

<input
type="number"
id="amount"
placeholder="Enter Amount"
/>

<button onclick="payNow()">
Fund Wallet
</button>

</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="nav-btn">
🏠 Home
</a>

<a href="profile.html" class="nav-btn">
👤 Profile
</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const user =
JSON.parse(localStorage.getItem("user"));

if(!user){

window.location.href = "login.html";

}

const walletBalance =
document.getElementById("walletBalance");

async function loadWallet(){

const doc = await db
.collection("users")
.doc(user.uid)
.get();

if(doc.exists){

walletBalance.innerHTML =
"₦" + (doc.data().wallet || 0);

}

}

loadWallet();

function payNow(){

const amount =
document.getElementById("amount").value;

if(!amount || amount < 100){

alert("Minimum funding is ₦100");

return;

}

let handler = PaystackPop.setup({

key: "pk_live_10503cfa475d0450ac4b7c990b6f36052734cd7c",

email: user.email,

amount: amount * 100,

currency: "NGN",

callback: async function(response){

const userRef = db
.collection("users")
.doc(user.uid);

const snap = await userRef.get();

let currentBalance = 0;

if(snap.exists){

currentBalance =
snap.data().wallet || 0;

}

const newBalance =
Number(currentBalance) +
Number(amount);

await userRef.set({

wallet: newBalance

}, { merge:true });

await db.collection("transactions").add({

userId: user.uid,

type: "Wallet Funding",

amount: Number(amount),

reference: response.reference,

status: "Successful",

date: new Date().toLocaleString()

});

alert("Wallet Funded Successfully ✅");

loadWallet();

window.location.href =
"dashboard.html";

},

onClose: function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}

</script>

</body>
</html>

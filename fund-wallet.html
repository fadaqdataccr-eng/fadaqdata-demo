<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:40px;
}

.card{
background:red;
padding:25px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.balance-box{
background:#cc0000;
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:25px;
}

.balance-title{
font-size:22px;
margin-bottom:10px;
}

.balance{
font-size:65px;
font-weight:bold;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:18px;
margin-top:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:#660000;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="balance-box">

<div class="balance-title">
Wallet Balance 👁️
</div>

<div
class="balance"
id="walletBalance"
>
₦0
</div>

</div>

<input
type="number"
id="amount"
placeholder="Enter Amount"
>

<button onclick="fundWallet()">
Fund Wallet
</button>

</div>

</div>

<div class="bottom-nav">

<a
href="dashboard.html"
class="nav-btn"
>
🏠 Home
</a>

<a
href="profile.html"
class="nav-btn"
>
👤 Profile
</a>

</div>

<script>

// LOGIN CHECK
const user =
JSON.parse(
localStorage.getItem("loggedInUser")
);

if(!user){

window.location.href =
"login.html";

}

// LOAD BALANCE
let balance =
parseInt(
localStorage.getItem("walletBalance")
) || 100;

document.getElementById(
"walletBalance"
).innerText =
"₦" + balance.toLocaleString();

// FUND WALLET
function fundWallet(){

const amount =
parseInt(
document.getElementById("amount").value
);

if(!amount || amount < 100){

alert("Minimum funding is ₦100");
return;

}

// PAYSTACK
let handler =
PaystackPop.setup({

key:
"pk_live_10503cfa475d0450ac4b7c990b6f36052734cd7c",

email:user.email,

amount:amount * 100,

currency:"NGN",

callback:function(response){

balance += amount;

localStorage.setItem(
"walletBalance",
balance
);

// SAVE TRANSACTION
let transactions =
JSON.parse(
localStorage.getItem("transactions")
) || [];

transactions.unshift({

id:"TRX" + Date.now(),

type:"Wallet Funding",

amount:"₦" + amount,

status:"Successful",

reference:response.reference,

date:new Date().toLocaleString()

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

// UPDATE BALANCE
document.getElementById(
"walletBalance"
).innerText =
"₦" + balance.toLocaleString();

alert(
"Wallet Funded Successfully"
);

window.location.href =
"dashboard.html";

},

onClose:function(){

alert("Transaction Cancelled");

}

});

handler.openIframe();

}

</script>

</body>
</html>

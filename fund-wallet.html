<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#8B0000;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    padding:40px 0 120px;
}

.logo{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-bottom:40px;
}

.card{
    background:#e60000;
    padding:30px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
    font-size:30px;
    font-weight:bold;
    text-align:center;
    margin-bottom:30px;
}

.balance{
    text-align:center;
    font-size:60px;
    font-weight:bold;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:20px;
    border:none;
    border-radius:18px;
    font-size:20px;
    margin-bottom:25px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:white;
    color:#6b0000;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
}

.nav-btn{
    background:white;
    color:#6b0000;
    padding:18px 35px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        FadaqData
    </div>

    <div class="card">

        <div class="title">
            💳 Fund Wallet
        </div>

        <div class="balance"
            id="walletBalance">
            ₦0
        </div>

        <input type="number"
            id="amount"
            placeholder="Enter Amount">

        <button onclick="fundWallet()">
            Fund Wallet
        </button>

    </div>

</div>

<div class="bottom-nav">

    <a href="dashboard.html"
        class="nav-btn">
        🏠 Home
    </a>

    <a href="profile.html"
        class="nav-btn">
        👤 Profile
    </a>

</div>

<script>

/* CHECK LOGIN */
const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
    window.location.href = "login.html";
}

/* GET USERS */
let users =
JSON.parse(localStorage.getItem("users")) || [];

/* FIND USER */
let userIndex = users.findIndex(
    user => user.email === currentUser.email
);

if(userIndex === -1){
    window.location.href = "login.html";
}

/* USER */
let updatedUser = users[userIndex];

/* SHOW BALANCE */
document.getElementById("walletBalance").innerText =
"₦" + (updatedUser.balance || 0);

/* FUND WALLET */
function fundWallet(){

    const amount =
    parseInt(document.getElementById("amount").value);

    if(!amount || amount < 100){
        alert("Minimum amount is ₦100");
        return;
    }

    let handler = PaystackPop.setup({

        key: 'pk_live_10503cfa475d0450ac4b7c990b6f36052734cd7c',

        email: updatedUser.email,

        amount: amount * 100,

        currency: 'NGN',

        callback: function(response){

            /* UPDATE BALANCE */
            updatedUser.balance =
            (updatedUser.balance || 0) + amount;

            /* SAVE TRANSACTION */
            if(!updatedUser.transactions){
                updatedUser.transactions = [];
            }

            updatedUser.transactions.unshift({

                type:"Wallet Funding",

                amount:amount,

                reference:response.reference,

                date:new Date().toLocaleString()

            });

            /* UPDATE USERS */
            users[userIndex] = updatedUser;

            localStorage.setItem(
                "users",
                JSON.stringify(users)
            );

            localStorage.setItem(
                "currentUser",
                JSON.stringify(updatedUser)
            );

            alert("Wallet Funded Successfully ✅");

            window.location.href =
            "dashboard.html";
        },

        onClose:function(){
            console.log("Payment Closed");
        }

    });

    handler.openIframe();
}

</script>

</body>
</html>

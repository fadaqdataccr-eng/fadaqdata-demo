<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:25px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
}

.title{
font-size:35px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.balance{
background:#a00000;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

label{
display:block;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.toast{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:white;
color:#7a0000;
padding:18px 25px;
border-radius:15px;
font-size:18px;
font-weight:bold;
display:none;
z-index:99999;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("loggedIn") !== "true"){

window.location.href =
"login.html";

}

</script>

<div class="toast"
id="toast">
Wallet Funded Successfully ✅
</div>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
💳 Fund Wallet
</div>

<div class="balance"
id="walletBalance">
Wallet: ₦0.00
</div>

<label>Enter Amount</label>

<input type="number"
id="amount"
placeholder="Enter amount">

<button onclick="fundWallet()">
Fund Wallet
</button>

</div>

</div>

<script>

let wallet =
parseFloat(
localStorage.getItem(
"walletBalance"
)
) || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"Wallet: ₦" +
wallet.toFixed(2);

function showToast(message){

let toast =
document.getElementById(
"toast"
);

toast.innerHTML = message;

toast.style.display =
"block";

setTimeout(function(){

toast.style.display =
"none";

},3000);

}

function fundWallet(){

let amount =
parseFloat(
document.getElementById(
"amount"
).value
);

if(isNaN(amount) || amount <= 0){

showToast(
"Enter valid amount"
);

return;

}

wallet += amount;

localStorage.setItem(
"walletBalance",
wallet
);

let transactions =
JSON.parse(
localStorage.getItem(
"transactions"
)
) || [];

transactions.push({

text:
"💳 Wallet funded with ₦" +
amount,

date:
new Date().toLocaleString(),

amount:amount,

type:"Wallet Funding",

status:"Successful",

id:
"FD" +
Math.floor(Math.random()*100000000)

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

showToast(
"Wallet Funded Successfully ✅"
);

setTimeout(function(){

window.location.href =
"dashboard.html";

},1500);

}

</script>

</body>
</html>

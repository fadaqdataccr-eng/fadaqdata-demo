<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
padding:25px;
padding-bottom:100px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-top:30px;
margin-bottom:40px;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
}

.title{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.balance-box{
background:#a00000;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

label{
display:block;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
box-sizing:border-box;
outline:none;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
gap:15px;
}

.nav-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
💳 Fund Wallet
</div>

<div class="balance-box"
id="walletBalance">
Wallet: ₦0.00
</div>

<label>Enter Amount</label>

<input type="number"
id="amount"
placeholder="Enter amount">

<button onclick="payWithPaystack()">
Fund Wallet
</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn"
onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

<button class="nav-btn"
onclick="window.location.href='profile.html'">
👤 Profile
</button>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
arrayUnion
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjT",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser = null;
let currentWallet = 0;

onAuthStateChanged(auth,
async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

currentWallet =
data.wallet || 0;

document.getElementById(
"walletBalance"
).innerHTML =
"Wallet: ₦" +
currentWallet.toFixed(2);

}

});

window.payWithPaystack =
function(){

let amount =
parseFloat(
document.getElementById(
"amount"
).value
);

if(isNaN(amount) || amount <= 0){

alert(
"Enter valid amount"
);

return;

}

let handler =
PaystackPop.setup({

key:
'pk_live_10503cfa475d0450ac4b7c990b6f36052734cd7c',

email:
currentUser.email,

amount:
amount * 100,

currency:
'NGN',

ref:
'FD' +
Math.floor(
(Math.random() * 1000000000) + 1
),

callback:
async function(response){

let newWallet =
currentWallet + amount;

let transaction = {

text:
"💳 Wallet funded with ₦" +
amount,

date:
new Date().toLocaleString(),

amount:amount,

type:"Wallet Funding",

status:"Successful",

id:response.reference

};

await updateDoc(
doc(db,"users",currentUser.uid),
{

wallet:newWallet,

transactions:
arrayUnion(transaction)

}

);

alert(
"Wallet Funded Successfully ✅"
);

window.location.href =
"dashboard.html";

},

onClose:function(){

alert(
"Transaction Cancelled"
);

}

});

handler.openIframe();

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fund Wallet</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:0;
background:#990000;
font-family:Arial;
color:white;
}

.container{
padding:20px;
text-align:center;
}

.card{
background:#cc0000;
padding:20px;
border-radius:20px;
margin-top:30px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.balance{
font-size:60px;
font-weight:bold;
margin:30px 0;
}

input{
width:90%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
margin-top:20px;
outline:none;
}

button{
width:95%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
margin-top:25px;
background:white;
color:#660000;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#990000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 35px;
border-radius:15px;
font-weight:bold;
color:#660000;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1 style="font-size:70px;">FadaqData</h1>

<div class="card">

<h2>💳 Fund Wallet</h2>

<div class="balance" id="walletBalance">₦0</div>

<input
type="number"
id="amount"
placeholder="Enter Amount"
/>

<button onclick="payWithPaystack()">
Fund Wallet
</button>

</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="nav-btn">
🏠 Home
</a>

<a href="profile.html" class="nav-btn">
👤 Profile
</a>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
addDoc,
collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.firebasestorage.app",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

window.location.href = "login.html";

}

const userRef = doc(db,"users",user.uid);

async function loadBalance(){

const snap = await getDoc(userRef);

if(snap.exists()){

const data = snap.data();

document.getElementById("walletBalance").innerHTML =
"₦" + (data.wallet || 0);

}

}

loadBalance();

window.payWithPaystack = async function(){

const amount =
document.getElementById("amount").value;

if(!amount || amount < 100){

alert("Minimum funding is ₦100");

return;

}

let handler = PaystackPop.setup({

key: "pk_live_10503cfa475d0450ac4b7c990b6f36052734cd7c",

email: user.email,

amount: amount * 100,

currency: "NGN",

callback: async function(response){

const snap = await getDoc(userRef);

const oldBalance =
snap.data().wallet || 0;

const newBalance =
Number(oldBalance) + Number(amount);

await updateDoc(userRef,{

wallet:newBalance

});

await addDoc(collection(db,"transactions"),{

uid:user.uid,

type:"Wallet Funding",

amount:Number(amount),

reference:response.reference,

status:"Successful",

date:new Date().toLocaleString()

});

alert(
"Wallet Funded Successfully ✅"
);

window.location.href =
"dashboard.html";

},

onClose:function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}

</script>

</body>
</html>

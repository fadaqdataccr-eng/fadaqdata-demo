<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin:30px 0;
}

.card{
background:#c00000;
padding:30px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.title{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

.balance{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:18px;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#8B0000;
padding:15px;
display:flex;
justify-content:space-around;
}

.navbtn{
background:white;
padding:15px 30px;
border-radius:18px;
color:#7a0000;
font-weight:bold;
text-decoration:none;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<div class="title">
💳 Fund Wallet
</div>

<div class="balance"
id="balance">
₦0
</div>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button onclick="payNow()">
Fund Wallet
</button>

</div>

</div>

<div class="bottomnav">

<a href="dashboard.html"
class="navbtn">
🏠 Home
</a>

<a href="profile.html"
class="navbtn">
👤 Profile
</a>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser;
let wallet = 0;

onAuthStateChanged(auth,
async(user)=>{

if(user){

currentUser = user;

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

wallet =
docSnap.data().wallet || 0;

document.getElementById(
"balance"
).innerText =
"₦" + wallet;

}

}else{

window.location.href =
"login.html";

}

});

window.payNow =
function(){

const amount =
document.getElementById(
"amount"
).value;

if(amount < 100){

alert(
"Minimum funding is ₦100"
);

return;

}

let handler =
PaystackPop.setup({

key:
"pk_live_10503cfa475d0450ac4b7c990b6f36052734cd7c",

email:
currentUser.email,

amount:
amount * 100,

currency:
"NGN",

callback:
async function(response){

wallet =
parseInt(wallet) +
parseInt(amount);

const docRef =
doc(db,"users",currentUser.uid);

const docSnap =
await getDoc(docRef);

let transactions =
docSnap.data().transactions || [];

transactions.push({

type:"Wallet Funding",

network:"Paystack",

phone:"Wallet",

amount:amount,

date:new Date().toLocaleString()

});

await updateDoc(docRef,{

wallet:wallet,

transactions:transactions

});

localStorage.setItem(
"receipt",
JSON.stringify({
type:"Wallet Funding",
network:"Paystack",
phone:"Wallet",
amount:amount,
date:new Date().toLocaleString()
})
);

window.location.href =
"receipt.html";

},

onClose:function(){

alert(
"Transaction Cancelled"
);

}

});

handler.openIframe();

};

</script>

</body>
</html>

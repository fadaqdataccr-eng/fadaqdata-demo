<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:20px 0;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin:30px 0;
}

.card{
background:#c00000;
padding:25px;
border-radius:25px;
}

.balance{
font-size:45px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-top:20px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#7a0000;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
FadaqData
</div>

<div class="card">

<h2>
Wallet Balance
</h2>

<div class="balance"
id="wallet">
₦0.00
</div>

<input type="number"
id="amount"
placeholder="Enter amount">

<button onclick="fundWallet()">
Fund Wallet
</button>

</div>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdVj9N71EKFVo782SeydXqjTRoW24oZs",

authDomain: "fadaqdata-3bd14.firebaseapp.com",

projectId: "fadaqdata-3bd14",

storageBucket: "fadaqdata-3bd14.appspot.com",

messagingSenderId: "609845657857",

appId: "1:609845657857:web:48817ce972c054e203db00"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let currentUser;

onAuthStateChanged(auth,
async(user)=>{

if(user){

currentUser = user;

const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

document.getElementById(
"wallet"
).innerHTML =
"₦" + data.wallet;

}

}else{

window.location.href =
"login.html";

}

});

window.fundWallet =
async function(){

let amount =
parseFloat(
document.getElementById(
"amount"
).value
);

if(!amount || amount <= 0){

alert(
"Enter valid amount"
);

return;

}

const docRef =
doc(db,"users",currentUser.uid);

const docSnap =
await getDoc(docRef);

let currentBalance =
docSnap.data().wallet || 0;

let newBalance =
currentBalance + amount;

await updateDoc(docRef,{
wallet:newBalance
});

alert(
"Wallet Funded Successfully ✅"
);

location.reload();

};

</script>

</body>
</html>

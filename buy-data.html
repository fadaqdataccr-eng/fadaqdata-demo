<script>

// LOAD WALLET BALANCE
let walletBalance =
localStorage.getItem("walletBalance") || 100;

document.getElementById("balance").innerText =
"₦" + walletBalance;

// BUY DATA FUNCTION
async function buyData(){

    const network =
    document.getElementById("network").value;

    const dataPlan =
    document.getElementById("dataPlan").value;

    const phone =
    document.getElementById("phone").value;

    if(!network || !dataPlan || !phone){

        alert("Please fill all fields");
        return;

    }

    document.getElementById("buyBtn").innerText =
    "Processing Purchase...";

    try{

        const response = await fetch(
        "https://fadaqdata-server.onrender.com/buy-data",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                network:network,
                phone:phone,
                data_plan:dataPlan
            })
        });

        const data = await response.json();

        console.log(data);

        // SUCCESS
        if(
            data.status === "success" ||
            data.Status === "successful"
        ){

            // DEDUCT WALLET
            let balance =
            parseInt(
                localStorage.getItem("walletBalance") || 100
            );

            balance -= 100;

            localStorage.setItem(
                "walletBalance",
                balance
            );

            // SAVE HISTORY
            let transactions =
            JSON.parse(
                localStorage.getItem("transactions")
            ) || [];

            transactions.unshift({

                id: "TRX" + Date.now(),

                type: "Data Purchase",

                network:
                network == 1 ? "MTN" :
                network == 2 ? "AIRTEL" :
                network == 3 ? "GLO" :
                "9MOBILE",

                plan: dataPlan,

                phone: phone,

                amount: "₦100",

                status: "Successful",

                message:
                data.message ||
                data.true_response ||
                "Purchase Successful",

                date:
                new Date().toLocaleString()
            });

            localStorage.setItem(
                "transactions",
                JSON.stringify(transactions)
            );

            // SAVE RECEIPT
            localStorage.setItem(
                "lastReceipt",
                JSON.stringify(transactions[0])
            );

            alert(
                data.message ||
                "Data Purchase Successful"
            );

            // REDIRECT TO RECEIPT
            window.location.href =
            "receipt.html";

        }else{

            alert(
                data.message ||
                "Transaction failed"
            );

        }

    }catch(error){

        console.log(error);

        alert("Network Error");

    }

    document.getElementById("buyBtn").innerText =
    "Buy Data";
}
</script>

<!DOCTYPE html>
<html>
<head>

<title>Buy Data</title>

<style>

body{
background:#5b0000;
font-family:Arial;
padding:20px;
color:white;
}

h1{
text-align:center;
margin-top:50px;
}

select,input,button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
}

button{
background:white;
color:#5b0000;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Buy Data</h1>

<select id="network">

<option value="1">MTN</option>
<option value="2">GLO</option>
<option value="4">Airtel</option>
<option value="3">9mobile</option>

</select>

<input
type="number"
id="phone"
placeholder="Phone Number"
/>

<select id="plan">

<option value="85">
MTN 500MB SME - ₦390
</option>

<option value="86">
MTN 1GB SME - ₦480
</option>

<option value="87">
MTN 2GB SME - ₦1500
</option>

<option value="88">
MTN 3.5GB SME - ₦2500
</option>

<option value="89">
MTN 7GB SME - ₦3500
</option>

</select>

<button onclick="buyData()">
Buy Data
</button>

<script>

async function buyData(){

const network =
document.getElementById("network").value;

const phone =
document.getElementById("phone").value;

const data_plan =
document.getElementById("plan").value;

if(!network || !phone || !data_plan){

alert("All fields required");

return;

}

try{

const response = await fetch("/buy-data",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

network,
phone,
data_plan

})

});

const data = await response.json();

console.log(data);

if(data.success){

alert("Transaction successful");

}else{

alert(data.message);

}

}catch(err){

console.log(err);

alert("Network Error");

}

}

</script>

</body>
</html>

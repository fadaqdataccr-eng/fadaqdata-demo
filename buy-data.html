<script>
const API_URL = "https://fadaqdata-server.onrender.com";

async function buyData() {

    const network = document.getElementById("network").value;
    const phone = document.getElementById("phone").value;
    const plan = document.getElementById("plan").value;

    if (!phone || phone.length < 11) {
        alert("Enter valid phone number");
        return;
    }

    try {

        const response = await fetch(`${API_URL}/buy-data`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                network: network,
                phone: phone,
                plan: plan
            })
        });

        const data = await response.json();

        console.log(data);

        if (data.success) {

            let wallet =
                Number(localStorage.getItem("walletBalance")) || 0;

            wallet -= 100;

            localStorage.setItem("walletBalance", wallet);

            document.getElementById("balance").innerText =
                "₦" + wallet;

            let history =
                JSON.parse(localStorage.getItem("transactions")) || [];

            history.unshift({
                network: network,
                phone: phone,
                plan: plan,
                amount: 100,
                date: new Date().toLocaleString()
            });

            localStorage.setItem(
                "transactions",
                JSON.stringify(history)
            );

            alert("Data purchased successfully");

            window.location.href = "history.html";

        } else {

            alert(data.message || "Transaction failed");

        }

    } catch (error) {

        console.log(error);

        alert("Network Error");

    }

}
</script>

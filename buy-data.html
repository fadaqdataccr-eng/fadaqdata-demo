<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Data</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:darkred;
      font-family:Arial;
      color:white;
    }

    .container{
      width:90%;
      margin:30px auto;
      background:#990000;
      padding:20px;
      border-radius:20px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    select,input,button{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      font-size:16px;
    }

    button{
      background:white;
      color:darkred;
      font-weight:bold;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Buy Data</h1>

    <select id="network">

      <option value="">Select Network</option>

      <option value="1">MTN</option>

      <option value="2">Airtel</option>

      <option value="3">Glo</option>

      <option value="4">9mobile</option>

    </select>

    <input
      type="number"
      id="phone"
      placeholder="Enter Phone Number"
    >

    <select id="data_plan">

      <option value="">Select Data Plan</option>

      <option value="1">500MB</option>

      <option value="2">1GB</option>

      <option value="3">2GB</option>

    </select>

    <button id="buyBtn" onclick="buyData()">
      Buy Data
    </button>

  </div>

  <script>

    async function buyData() {

      const network =
        document.getElementById("network").value;

      const phone =
        document.getElementById("phone").value;

      const data_plan =
        document.getElementById("data_plan").value;

      if (!network || !phone || !data_plan) {

        alert("All fields required");
        return;

      }

      const button =
        document.getElementById("buyBtn");

      button.innerHTML = "Processing Purchase...";
      button.disabled = true;

      try {

        const response = await fetch(
          "https://fadaqdata-server.onrender.com/buy-data",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              network: network,
              phone: phone,
              data_plan: data_plan
            })

          }
        );

        const data = await response.json();

        console.log(data);

        if (data.success) {

          alert("Data purchase successful");

          localStorage.setItem(
            "receipt",
            JSON.stringify(data.receipt)
          );

          window.location.href =
            "receipt.html";

        } else {

          alert(data.message || "Transaction failed");

        }

      } catch (error) {

        console.log(error);

        alert("Network Error");

      }

      button.innerHTML = "Buy Data";
      button.disabled = false;

    }

  </script>

</body>
</html>

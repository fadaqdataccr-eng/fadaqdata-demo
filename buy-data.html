<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buy Data</title>

<style>

body{
background:#5b0000;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

.card{
background:#7a0000;
padding:20px;
border-radius:20px;
margin-top:40px;
}

h2{
text-align:center;
}

.balance{
text-align:center;
font-size:35px;
font-weight:bold;
margin-bottom:20px;
}

select,input,button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div
class="balance"
id="balance"
>
₦100
</div>

<h2>Buy Data</h2>

<select id="network">

<option value="1">
MTN
</option>

</select>

<input
type="number"
id="phone"
placeholder="Phone Number"
/>

<select id="plan">

<option value="85">
MTN 500MB SME - ₦100
</option>

</select>

<button onclick="buyData()">
Buy Data
</button>

</div>

<script>

// LOGIN CHECK
if(localStorage.getItem("loggedIn") !== "true"){

window.location.href =
"login.html";

}

// DEFAULT BALANCE
if(!localStorage.getItem("walletBalance")){

localStorage.setItem(
"walletBalance",
"100"
);

}

function loadBalance(){

document.getElementById("balance")
.innerHTML =
"₦" +
localStorage.getItem("walletBalance");

}

loadBalance();

async function buyData(){

const network =
document.getElementById("network").value;

const phone =
document.getElementById("phone").value;

const plan =
document.getElementById("plan").value;

if(!network || !phone || !plan){

alert("All fields required");

return;

}

let wallet =
parseInt(
localStorage.getItem("walletBalance")
);

const amount = 100;

// CHECK BALANCE
if(wallet < amount){

alert("Insufficient balance");

return;

}

// DEDUCT
wallet -= amount;

localStorage.setItem(
"walletBalance",
wallet
);

// SAVE TRANSACTION
const transactions =
JSON.parse(
localStorage.getItem("transactions")
) || [];

transactions.push({

network:"MTN",

phone:phone,

plan:"500MB SME",

amount:amount,

date:new Date().toLocaleString()

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

loadBalance();

alert("Purchase Successful");

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<title>Buy Data</title>

<style>
body{
background:#5c0000;
font-family:Arial;
color:white;
padding:20px;
}

.container{
background:#7a0000;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
margin-top:40px;
}

input,select,button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
}

button{
background:white;
font-weight:bold;
}

h1{
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Buy Data</h1>

<select id="network">
<option value="MTN">MTN</option>
<option value="GLO">GLO</option>
<option value="AIRTEL">AIRTEL</option>
<option value="9MOBILE">9MOBILE</option>
</select>

<input type="text" id="phone" placeholder="Phone Number">

<select id="plan">
<option value="500MB SME">MTN 500MB SME - ₦100</option>
</select>

<button onclick="buyData()">
Buy Data
</button>

</div>

<script>

async function buyData(){

const network =
document.getElementById("network").value;

const phone =
document.getElementById("phone").value;

const plan =
document.getElementById("plan").value;

try{

const response = await fetch(
"https://fadaqdata-server.onrender.com/buydata",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
network,
phone,
plan,
amount:100
})
}
);

const data = await response.json();

alert(data.message);

if(data.status === "success"){

let wallet =
localStorage.getItem("walletBalance") || 0;

wallet = Number(wallet) - 100;

localStorage.setItem(
"walletBalance",
wallet
);

let history =
JSON.parse(
localStorage.getItem("transactions")
) || [];

history.push({
network,
phone,
plan,
amount:100,
date:new Date().toLocaleString()
});

localStorage.setItem(
"transactions",
JSON.stringify(history)
);

window.location.href =
"dashboard.html";

}

}catch(error){

alert("Network Error");

console.log(error);

}

}

</script>

</body>
</html>

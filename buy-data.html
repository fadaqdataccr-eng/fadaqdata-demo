<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Data</title>

<style>

body{
margin:0;
padding:0;
background:#8B0000;
font-family:Arial,sans-serif;
color:white;
}

.container{
width:90%;
max-width:450px;
margin:auto;
padding:40px 0 120px;
}

.logo{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.card{
background:red;
padding:25px;
border-radius:25px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
margin-bottom:30px;
}

.balance{
background:#c40000;
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.balance h2{
margin:0;
font-size:22px;
}

.balance h1{
font-size:65px;
margin:15px 0;
}

select,input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-bottom:18px;
font-size:20px;
box-sizing:border-box;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:22px;
font-weight:bold;
color:#6b0000;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#8B0000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-btn{
background:white;
padding:15px 30px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#6b0000;
text-decoration:none;
}

.loading{
display:none;
text-align:center;
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">FadaqData</div>

<div class="card">

<div class="balance">
<h2>Wallet Balance 👁️</h2>
<h1 id="balance">₦0</h1>
</div>

<select id="network">
<option value="1">MTN</option>
<option value="2">AIRTEL</option>
<option value="3">GLO</option>
<option value="4">9MOBILE</option>
</select>

<select id="plan">

<option value="85">MTN 500MB - ₦400</option>
<option value="86">MTN 1GB - ₦400</option>
<option value="87">MTN 2GB - ₦1455</option>
<option value="88">MTN 3.5GB - ₦2425</option>
<option value="89">MTN 7GB - ₦3395</option>
<option value="91">MTN 10GB - ₦4365</option>

<option value="103">GLO 200MB - ₦150</option>
<option value="108">GLO 500MB - ₦220</option>
<option value="109">GLO 1GB - ₦430</option>
<option value="110">GLO 2GB - ₦860</option>
<option value="111">GLO 3GB - ₦1300</option>

</select>

<input type="number" id="phone" placeholder="Enter Phone Number">

<button onclick="buyData()">Buy Data</button>

<div class="loading" id="loading">
Processing Purchase...
</div>

</div>

</div>

<div class="bottom-nav">
<a href="dashboard.html" class="nav-btn">🏠 Home</a>
<a href="profile.html" class="nav-btn">👤 Profile</a>
</div>

<script>

const API_KEY = "geCAbvc3prhCyC5dtB05wi11q4C9n4zsCHC79DoxFG366xAA3C3aAJ2bBBAf1757076980";

let balance = localStorage.getItem("walletBalance");

if(balance === null){
balance = 0;
localStorage.setItem("walletBalance", balance);
}

document.getElementById("balance").innerText = "₦" + Number(balance).toLocaleString();

function getPlanPrice(plan){

const prices = {

85:400,
86:400,
87:1455,
88:2425,
89:3395,
91:4365,

103:150,
108:220,
109:430,
110:860,
111:1300

};

return prices[plan] || 0;
}

async function buyData(){

const network = document.getElementById("network").value;
const plan = document.getElementById("plan").value;
const phone = document.getElementById("phone").value;

const amount = getPlanPrice(plan);

if(phone.length < 11){
alert("Enter valid phone number");
return;
}

if(Number(balance) < amount){
alert("Insufficient wallet balance");
return;
}

document.getElementById("loading").style.display = "block";

const ref = "DATA" + Date.now();

try{

const response = await fetch("https://fadaqdata.com/api/data/",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Token " + API_KEY
},

body:JSON.stringify({

network:network,
phone:phone,
ref:ref,
data_plan:plan,
ported_number:true

})

});

const data = await response.json();

document.getElementById("loading").style.display = "none";

if(data.status === "success"){

balance = Number(balance) - Number(amount);

localStorage.setItem("walletBalance", balance);

document.getElementById("balance").innerText =
"₦" + balance.toLocaleString();

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

transactions.unshift({

type:"Data Purchase",
phone:phone,
amount:amount,
plan:plan,
date:new Date().toLocaleString(),
status:"Successful",
reference:ref

});

localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);

alert("Data Purchase Successful ✅");

window.location.href = "history.html";

}else{

alert("Purchase Failed ❌");

}

}catch(error){

document.getElementById("loading").style.display = "none";

alert("Network Error");

}

}

</script>

</body>
</html>
